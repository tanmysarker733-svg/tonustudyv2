<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSC Study OS</title>
    <meta name="description" content="Non-functional modular scaffold for the HSC Study OS remake." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@2.3.1/dist/chartjs-plugin-dragdata.min.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore-compat.js"></script>
    <style>
:root {
  color-scheme: dark;
  --bg: #07131b;
  --card-bg: rgba(10, 26, 40, 0.82);
  --nav-bg: rgba(6, 18, 28, 0.9);
  --panel-bg: rgba(11, 29, 43, 0.68);
  --panel-soft: rgba(173, 216, 255, 0.038);
  --text-main: #dceaf6;
  --text-sub: #8da6bb;
  --border: rgba(122, 156, 186, 0.16);
  --accent-blue: #4f97bb;
  --accent-cyan: #0b6e72;
  --accent-violet: #8d47c7;
  --color-done: #10b981;
  --color-running: #f59e0b;
  --color-pending: #ef4444;
  --accent-gradient: linear-gradient(135deg, #155e75 0%, #256d9a 100%);
  --shadow: rgba(1, 8, 15, 0.42);
  --shadow-hover: rgba(1, 8, 15, 0.62);
  --radius-lg: 20px;
  --radius-md: 12px;
  --radius-sm: 8px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

html {
  scroll-behavior: smooth;
  background: var(--bg);
}

body {
  min-width: 320px;
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(circle at 12% 18%, rgba(11, 110, 114, 0.22), transparent 24%),
    radial-gradient(circle at 88% 14%, rgba(79, 151, 187, 0.16), transparent 24%),
    linear-gradient(120deg, rgba(21, 83, 135, 0.18) 0%, rgba(21, 83, 135, 0) 34%),
    linear-gradient(225deg, rgba(37, 109, 154, 0.13) 0%, rgba(37, 109, 154, 0) 42%),
    linear-gradient(180deg, #07131b 0%, #0b1d2b 100%);
  color: var(--text-main);
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 15px;
  line-height: 1.5;
}

body.login-locked {
  overflow: hidden;
}

body.login-locked #app {
  display: none;
}

body:not(.login-locked) .login-gate {
  display: none;
}

.login-gate {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 34px;
  position: relative;
  overflow: hidden;
  isolation: isolate;
  background:
    radial-gradient(circle at 18% 18%, rgba(11, 110, 114, 0.2), transparent 24%),
    radial-gradient(circle at 78% 18%, rgba(79, 151, 187, 0.22), transparent 26%),
    radial-gradient(circle at 52% 42%, rgba(112, 176, 207, 0.12), transparent 38%),
    linear-gradient(180deg, #d7e8f4 0%, #b8d2e3 100%);
}

.login-gate::before,
.login-gate::after {
  content: none;
}

.login-gate::after {
  content: none;
}

.login-cloud {
  display: none;
}

.login-cloud::before,
.login-cloud::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  background: inherit;
}

.login-cloud::before {
  width: 76px;
  height: 76px;
  left: 22px;
  bottom: 8px;
}

.login-cloud::after {
  width: 100px;
  height: 100px;
  right: 12px;
  bottom: -2px;
}

.login-cloud--one {
  left: 8%;
  top: 12%;
}

.login-cloud--two {
  right: 10%;
  top: 8%;
  transform: scale(0.78);
  opacity: 0.58;
}

.login-shell {
  width: min(900px, calc(100vw - 34px));
  min-height: min(560px, calc(100vh - 54px));
  display: grid;
  grid-template-columns: minmax(310px, 0.98fr) minmax(310px, 0.92fr);
  gap: 0;
  border-radius: 40px;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(10, 12, 20, 0.88);
  box-shadow: 0 28px 70px rgba(95, 48, 171, 0.24);
  animation: loginDrop 680ms cubic-bezier(.2, .82, .2, 1) both;
}

.login-panel {
  display: grid;
  align-content: center;
  justify-items: center;
  padding: clamp(28px, 4vw, 54px);
  background:
    radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.07), transparent 25%),
    rgba(13, 15, 22, 0.98);
}

.login-brand {
  display: none;
  align-items: center;
  gap: 10px;
  color: #dbeafe;
  font-size: 0.82rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 34px;
}

.login-brand span {
  width: 13px;
  height: 13px;
  border-radius: 999px;
  background: linear-gradient(135deg, #155e75, #256d9a);
  box-shadow: 0 0 22px rgba(34, 211, 238, 0.52);
}

.login-title {
  width: min(320px, 100%);
  margin: 0 0 34px;
  color: #f8fafc;
  font-size: clamp(1.9rem, 3vw, 2.2rem);
  line-height: 1;
  letter-spacing: 0;
  white-space: nowrap;
}

.login-subtitle {
  display: none;
  max-width: 320px;
  margin: 0 0 20px;
  color: rgba(226, 232, 240, 0.72);
  font-size: 0.9rem;
}

.login-form {
  width: min(320px, 100%);
  display: grid;
  gap: 12px;
}

.login-field {
  display: block;
  position: relative;
  min-height: 50px;
}

.login-field i,
.login-field svg {
  position: absolute;
  left: 19px;
  top: 50%;
  width: 18px;
  height: 18px;
  transform: translateY(-50%);
  color: rgba(226, 232, 240, 0.56);
  pointer-events: none;
  z-index: 1;
}

.login-field input {
  width: 100%;
  min-height: 50px;
  padding: 0 18px 0 52px;
  border: 1px solid rgba(226, 232, 240, 0.22);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.035);
  color: #f8fafc;
  font: inherit;
  font-weight: 700;
  transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}

.login-field input::placeholder {
  color: rgba(226, 232, 240, 0.5);
}

.login-field input:focus {
  border-color: rgba(125, 211, 252, 0.74);
  background: rgba(255, 255, 255, 0.055);
  box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.12);
}

.login-form-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  color: rgba(226, 232, 240, 0.7);
  font-size: 0.78rem;
  padding: 0 4px;
}

.login-remember {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.login-remember input {
  accent-color: #256d9a;
}

.login-link {
  color: #e0e7ff;
  text-decoration: none;
  font-weight: 800;
}

.login-actions {
  display: grid;
  gap: 12px;
  margin-top: 6px;
}

.login-submit,
.login-google,
.login-guest {
  min-height: 50px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border: 0;
  border-radius: 999px;
  font: inherit;
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}

.login-submit {
  color: #fff;
  background: linear-gradient(135deg, #155e75 0%, #256d9a 100%);
  box-shadow: 0 18px 34px rgba(59, 130, 246, 0.28);
}

.login-google {
  color: #0f172a;
  background: #f8fafc;
  box-shadow: 0 14px 30px rgba(15, 23, 42, 0.16);
}

.login-google-mark {
  width: 22px;
  height: 22px;
  display: inline-grid;
  place-items: center;
  border-radius: 50%;
  color: #fff;
  font-size: 0.78rem;
  font-weight: 900;
  background: conic-gradient(from -40deg, #4285f4 0 25%, #34a853 0 50%, #fbbc05 0 75%, #ea4335 0);
}

.login-guest {
  color: #dbeafe;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(226, 232, 240, 0.13);
}

.login-submit:hover,
.login-google:hover,
.login-guest:hover {
  transform: translateY(-2px);
}

.login-submit i,
.login-guest i {
  width: 18px;
  height: 18px;
}

.login-feedback {
  min-height: 16px;
  color: #fca5a5;
  font-size: 0.78rem;
  font-weight: 800;
}

.login-register {
  margin-top: 4px;
  color: rgba(226, 232, 240, 0.62);
  font-size: 0.86rem;
  text-align: center;
}

.login-register strong {
  color: #f8fafc;
}

.login-art {
  position: relative;
  overflow: hidden;
  margin: 18px 18px 18px 0;
  border-radius: 30px;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0)),
    #f3f6ff;
}

.login-art__image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 18px;
  display: block;
  transition: transform 520ms cubic-bezier(.2, .82, .2, 1), filter 520ms ease;
  will-change: transform;
}

.login-art:hover .login-art__image {
  transform: translateY(-8px) scale(1.035);
  filter: drop-shadow(0 18px 24px rgba(37, 37, 90, 0.2));
}

.login-art__video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 520ms cubic-bezier(.2, .82, .2, 1), filter 520ms ease;
  will-change: transform;
}

.login-art:hover .login-art__video {
  transform: scale(1.035);
  filter: drop-shadow(0 18px 24px rgba(37, 37, 90, 0.2));
}

@keyframes loginDrop {
  0% { opacity: 0; transform: translateY(-36px) scale(0.96); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

@media (max-width: 900px) {
  .login-gate {
    padding: 18px;
    align-items: start;
  }

  .login-shell {
    min-height: auto;
    grid-template-columns: 1fr;
    border-radius: 30px;
  }

  .login-panel {
    padding: 34px 22px;
  }

  .login-art {
    min-height: 260px;
    margin: 0 18px 18px;
    border-radius: 26px;
  }

  .login-form-row {
    align-items: flex-start;
    flex-direction: column;
  }
}

@media (max-width: 540px) {
  .login-gate {
    padding: 12px;
  }

  .login-shell {
    border-radius: 24px;
  }

  .login-title {
    font-size: 2.35rem;
  }

  .login-field input,
  .login-submit,
  .login-guest {
    min-height: 54px;
  }
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(148, 163, 184, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148, 163, 184, 0.035) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.78), transparent 82%);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.035) 50%, transparent 100%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 38%);
  opacity: 0.78;
}

button,
input {
  font: inherit;
}

button {
  border: 0;
}

a {
  color: inherit;
  text-decoration: none;
}

h1,
h2,
h3,
h4 {
  font-weight: 800;
  letter-spacing: 0;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.study-shell {
  min-height: 100vh;
  padding-top: 72px;
  padding-bottom: 72px;
}

.background-field {
  position: fixed;
  inset: 0;
  z-index: -3;
  pointer-events: none;
  transform: translate3d(0, var(--scroll-drift, 0), 0);
  background:
    linear-gradient(150deg, rgba(21, 94, 117, 0.12), transparent 48%),
    linear-gradient(25deg, rgba(37, 109, 154, 0.09), transparent 42%),
    linear-gradient(330deg, rgba(112, 176, 207, 0.06), transparent 46%);
  transition: transform 0.2s linear;
}

.background-field::before,
.background-field::after {
  content: "";
  position: absolute;
  left: -8%;
  right: -8%;
  height: 34vh;
  pointer-events: none;
  filter: blur(38px);
  opacity: 0.55;
  transform: rotate(-7deg);
}

.background-field::before {
  top: 12vh;
  background: linear-gradient(90deg, transparent, rgba(79, 151, 187, 0.12), rgba(112, 176, 207, 0.1), transparent);
}

.background-field::after {
  bottom: 10vh;
  background: linear-gradient(90deg, transparent, rgba(15, 111, 120, 0.08), rgba(37, 109, 154, 0.075), transparent);
  transform: rotate(8deg);
}

.quick-action-rail {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1001;
  width: 100%;
  padding: 8px 16px;
  background: rgba(9, 11, 18, 0.9);
  border-bottom: 1px solid rgba(96, 165, 250, 0.14);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.quick-action-track {
  width: min(100%, 1320px);
  min-height: 56px;
  margin: 0 auto;
  padding: 7px 10px;
  display: grid;
  grid-template-columns: repeat(6, minmax(48px, max-content));
  align-items: center;
  justify-items: center;
  justify-content: center;
  gap: clamp(6px, 1.2vw, 16px);
  overflow: visible;
  border: 1px solid rgba(59, 130, 246, 0.22);
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(2, 6, 23, 0.72));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 12px 34px rgba(2, 6, 23, 0.22);
  scrollbar-width: none;
}

.quick-action-track::-webkit-scrollbar {
  display: none;
}

.quick-action {
  min-width: 0;
  width: min(48px, 100%);
  height: 48px;
  padding: 0 13px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  justify-self: center;
  border: 1px solid rgba(15, 23, 42, 0.1);
  border-radius: 999px;
  background: rgba(248, 250, 252, 0.96);
  color: #0f172a;
  box-shadow: 0 10px 24px rgba(2, 6, 23, 0.24);
  cursor: default;
  overflow: hidden;
  white-space: nowrap;
  transform-origin: center;
  will-change: transform;
  transition:
    border-radius 0.38s ease,
    transform 0.42s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.38s ease,
    background 0.38s ease,
    color 0.38s ease;
}

.quick-action:hover,
.quick-action.is-label-visible {
  width: var(--quick-width, 128px);
  border-radius: 999px;
  gap: 8px;
  transform: translateY(-1px) scale(1.01);
  box-shadow: 0 14px 30px rgba(2, 6, 23, 0.3);
}

.quick-action:active {
  transform: translateY(0) scale(0.98);
}

.quick-action svg {
  width: 22px;
  height: 22px;
  flex: 0 0 auto;
}

.quick-action__label {
  display: inline-flex;
  align-items: center;
  max-width: 0;
  opacity: 0;
  overflow: hidden;
  transform: translateX(-6px);
  color: #0f172a;
  font-size: 0.82rem;
  font-weight: 900;
  transition: max-width 0.36s ease, opacity 0.3s ease, transform 0.36s ease;
}

.quick-action:hover .quick-action__label,
.quick-action.is-label-visible .quick-action__label {
  max-width: 86px;
  opacity: 1;
  transform: translateX(0);
}

@media (min-width: 560px) {
  .quick-action:first-child {
    width: var(--quick-width, 128px);
    border-radius: 999px;
    gap: 8px;
  }

  .quick-action:first-child .quick-action__label {
    max-width: 86px;
    opacity: 1;
    transform: translateX(0);
  }
}

@media (min-width: 720px) {
  .quick-action-track {
    grid-template-columns: repeat(6, minmax(48px, max-content));
  }

  .quick-action:nth-child(-n + 2) {
    width: var(--quick-width, 128px);
    border-radius: 999px;
    gap: 8px;
  }

  .quick-action:nth-child(-n + 2) .quick-action__label {
    max-width: 86px;
    opacity: 1;
    transform: translateX(0);
  }
}

@media (min-width: 860px) {
  .quick-action:nth-child(-n + 3) {
    width: var(--quick-width, 128px);
    border-radius: 999px;
    gap: 8px;
  }

  .quick-action:nth-child(-n + 3) .quick-action__label {
    max-width: 86px;
    opacity: 1;
    transform: translateX(0);
  }
}

@media (min-width: 1020px) {
  .quick-action:nth-child(-n + 4) {
    width: var(--quick-width, 128px);
    border-radius: 999px;
    gap: 8px;
  }

  .quick-action:nth-child(-n + 4) .quick-action__label {
    max-width: 86px;
    opacity: 1;
    transform: translateX(0);
  }
}

@media (min-width: 1180px) {
  .quick-action {
    width: var(--quick-width, 128px);
    border-radius: 999px;
    gap: 8px;
  }

  .quick-action .quick-action__label {
    max-width: 86px;
    opacity: 1;
    transform: translateX(0);
  }
}

.top-nav {
  position: sticky;
  top: 72px;
  z-index: 1000;
  display: flex;
  width: 100%;
  height: 60px;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--nav-bg);
  box-shadow: 0 1px 0 var(--border), 0 10px 32px rgba(0, 0, 0, 0.18);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition:
    transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
    height 0.24s ease,
    background 0.24s ease,
    box-shadow 0.24s ease;
}

.top-nav.nav-scrolled {
  height: 54px;
  background: rgba(9, 11, 18, 0.94);
  box-shadow: 0 1px 0 var(--border), 0 16px 38px rgba(0, 0, 0, 0.28);
}

.top-nav.nav-hidden {
  transform: none;
}

.nav-left {
  display: flex;
  min-width: 0;
  flex: 1;
  align-items: center;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}

.nav-left::-webkit-scrollbar {
  display: none;
}

.nav-right {
  display: flex;
  flex-shrink: 0;
  align-items: center;
  gap: 8px;
}

.nav-brand {
  display: inline-flex;
  min-height: 36px;
  align-items: center;
  margin-right: 8px;
  padding: 0 12px;
  border: 1px solid rgba(59, 130, 246, 0.22);
  border-radius: 999px;
  box-shadow: inset 0 0 0 999px rgba(59, 130, 246, 0.08);
  white-space: nowrap;
  background: var(--accent-gradient);
  background-clip: text;
  color: transparent;
  font-size: 1rem;
  font-weight: 900;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-btn {
  display: inline-flex;
  min-height: 36px;
  align-items: center;
  gap: 7px;
  padding: 0 12px;
  border-radius: 8px;
  color: var(--text-sub);
  font-size: 0.82rem;
  font-weight: 700;
  white-space: nowrap;
  transition: background 0.2s, color 0.2s, transform 0.2s;
}

.nav-btn:hover,
.nav-btn.is-active {
  background: var(--panel-bg);
  color: var(--text-main);
  transform: translateY(-1px);
}

.nav-btn.is-active {
  border: 1px solid rgba(59, 130, 246, 0.26);
  box-shadow: inset 0 0 0 1px rgba(59, 130, 246, 0.08);
}

.nav-btn svg,
.icon-button svg {
  width: 17px;
  height: 17px;
}

.icon-button {
  display: inline-grid;
  width: 36px;
  height: 36px;
  place-items: center;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--panel-bg);
  color: var(--text-main);
  transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.2s;
}

.icon-button--accent {
  border-color: rgba(59, 130, 246, 0.45);
  background: var(--accent-gradient);
  color: #fff;
}

.icon-button:disabled {
  cursor: not-allowed;
  opacity: 0.78;
}

.icon-button:hover,
.subject-card .icon-button:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  background: rgba(59, 130, 246, 0.12);
  transform: translateY(-1px);
}

.icon-button--accent:hover {
  color: #fff;
  transform: translateY(-1px);
}

  display: block;
  margin-top: 10px;

/* ── Unit 06 Pomodoro & Stopwatch ─────────────────────────────────────────── */
.pomo-sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.pomo-card, .sw-card {
  background: var(--panel-bg); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
}
.pomo-mode-row { display: flex; gap: 6px; }
.pomo-mode-btn {
  flex: 1; padding: 5px 8px; border-radius: 999px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-sub); font-size: 0.74rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s; font-family: inherit;
}
.pomo-mode-btn.is-active { background: linear-gradient(135deg,#155e75,#256d9a); color:#fff; border-color:transparent; }
.pomo-display, .sw-display { text-align: center; padding: 8px 0; }
.pomo-time {
  font-size: 3.2rem; font-weight: 800; color: var(--text-main);
  letter-spacing: -2px; line-height: 1; font-variant-numeric: tabular-nums;
}
.sw-time {
  font-size: 2.8rem; font-weight: 800; color: var(--text-main);
  letter-spacing: -2px; line-height: 1; font-variant-numeric: tabular-nums;
}
.pomo-label { font-size:0.72rem; color:var(--text-sub); margin-top:5px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; }
.pomo-progress { height:3px; background:rgba(255,255,255,0.07); border-radius:999px; overflow:hidden; }
.pomo-progress__bar { height:100%; background:linear-gradient(90deg,#155e75,#256d9a); border-radius:999px; transition:width 1s linear; }
.pomo-controls, .sw-controls { display:flex; gap:10px; justify-content:center; align-items:center; }
.pomo-btn {
  width:40px; height:40px; border-radius:50%; border:1px solid var(--border);
  background:rgba(255,255,255,0.05); color:var(--text-main); cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center;
  transition:all 0.18s; font-family:inherit;
}
.pomo-btn svg { width:18px; height:18px; }
.pomo-btn:hover { background:rgba(255,255,255,0.12); transform:scale(1.06); }
.pomo-btn:active { transform:scale(0.96); }
.pomo-btn--play {
  width:50px; height:50px;
  background:linear-gradient(135deg,#155e75,#256d9a); border-color:transparent;
  color:#fff; box-shadow:0 8px 20px rgba(21,94,117,0.35);
}
.pomo-btn--play svg { width:20px; height:20px; }
.pomo-sessions { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; }
.pomo-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.1); transition:background 0.3s; }
.pomo-dot.done { background:var(--color-done); }
.pomo-dot.active { background:var(--color-running); }
.sw-laps { max-height:130px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; scrollbar-width:thin; }
.sw-lap-item { display:flex; justify-content:space-between; align-items:center; padding:5px 10px; border-radius:var(--radius-sm); background:rgba(255,255,255,0.04); font-size:0.78rem; font-weight:600; color:var(--text-sub); }
.sw-lap-item strong { color:var(--text-main); font-variant-numeric:tabular-nums; }
/* Timer ctrl bar in top rail */
.timer-ctrl-bar {
  width:100%; padding:6px 10px 8px;
  display:flex; align-items:center; justify-content:center; gap:5px; flex-wrap:wrap;
  border-top:1px solid rgba(59,130,246,0.14);
}
.timer-ctrl-bar[hidden] { display:none; }
.timer-adj-btn {
  padding:3px 10px; border-radius:999px; border:1px solid var(--border);
  background:rgba(255,255,255,0.06); color:var(--text-main);
  font:inherit; font-size:0.72rem; font-weight:800; cursor:pointer;
  transition:all 0.15s;
}
.timer-adj-btn:hover { background:rgba(255,255,255,0.13); }
.timer-adj-btn--track {
  background:linear-gradient(135deg,#155e75,#256d9a);
  border-color:transparent; color:#fff;
  display:inline-flex; align-items:center; gap:5px;
}
.adj-pipe { width:1px; height:14px; background:var(--border); margin:0 2px; flex-shrink:0; }
/* Track dialog */
.track-dialog[hidden] { display:none; }
.track-dialog { position:fixed; inset:0; z-index:2000; display:grid; place-items:center; padding:20px; }
.track-dialog__backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px); cursor:pointer; }
.track-dialog__card {
  position:relative; z-index:1; width:min(500px,100%);
  background:rgba(8,18,30,0.98); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:24px;
  display:flex; flex-direction:column; gap:16px;
  box-shadow:0 24px 60px rgba(0,0,0,0.55);
  animation:loginDrop 280ms cubic-bezier(.2,.82,.2,1) both;
}
.track-dialog__head { display:flex; align-items:center; justify-content:space-between; }
.track-dialog__head h3 { font-size:1rem; display:flex; align-items:center; gap:8px; color:var(--text-main); }
.track-stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.track-stat { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:var(--radius-md); padding:10px 12px; text-align:center; }
.track-stat strong { display:block; font-size:1.3rem; color:var(--text-main); font-weight:800; }
.track-stat span { font-size:0.68rem; color:var(--text-sub); font-weight:600; text-transform:uppercase; letter-spacing:0.07em; }
.track-log-list { max-height:220px; overflow-y:auto; display:flex; flex-direction:column; gap:5px; scrollbar-width:thin; }
.track-log-item { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; padding:9px 12px; border-radius:var(--radius-md); background:rgba(255,255,255,0.035); border:1px solid var(--border); font-size:0.8rem; }
.tl-label { font-weight:700; color:var(--text-main); }
.tl-dur { color:var(--accent-blue); font-weight:800; font-variant-numeric:tabular-nums; }
.tl-time { color:var(--text-sub); font-size:0.7rem; }
.track-empty { text-align:center; color:var(--text-sub); font-size:0.82rem; padding:24px; opacity:0.7; }
/* Timer dialog card overrides */
.timer-dialog__card {
  max-width: 720px !important;
  width: min(720px, calc(100vw - 40px)) !important;
}
.timer-adj-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
/* Per-card adjustment rows */
.card-adj-row {
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
  padding: 10px 12px 4px;
  border-top: 1px solid rgba(255,255,255,0.06);
  margin-top: 4px;
}
.card-adj-label {
  font-size: 0.65rem; font-weight: 800; color: var(--text-sub);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-right: 2px; min-width: 22px;
}
.card-adj-btn {
  padding: 4px 11px; border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(239,68,68,0.12); color: #f87171;
  font: inherit; font-size: 0.75rem; font-weight: 800;
  cursor: pointer; transition: all 0.15s;
}
.card-adj-btn:hover { background: rgba(239,68,68,0.22); transform: scale(1.05); }
.card-adj-btn:active { transform: scale(0.95); }
.card-adj-btn--pos {
  background: rgba(21,94,117,0.18); color: #67e8f9;
  border-color: rgba(103,232,249,0.2);
}
.card-adj-btn--pos:hover { background: rgba(21,94,117,0.32); }
.card-adj-pos-group {
  flex: 0 0 100%;
  display: flex;
  justify-content: center;
  gap: 5px;
}
@media (max-width:640px) {
  .pomo-sw-grid { grid-template-columns:1fr; }
  .pomo-time { font-size:2.6rem; }
  .sw-time { font-size:2.4rem; }
}

.account-card {
  overflow: hidden;
  border: 1px solid rgba(15, 23, 42, 0.08);
  border-radius: 24px;
  background: rgba(248, 250, 252, 0.94);
  color: #111827;
  box-shadow: 0 22px 62px rgba(2, 6, 23, 0.18);
}

.account-card__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 20px 14px;
  border-bottom: 1px solid rgba(15, 23, 42, 0.08);
  background: rgba(255, 255, 255, 0.72);
}

.account-card__head strong {
  display: block;
  font-size: 1rem;
}

.account-card__head span,
.account-field span,
.account-feed-empty,
.account-feed-item__meta {
  color: #64748b;
  font-size: 0.82rem;
}

.account-form {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  padding: 14px 20px 20px;
}

.account-login-card {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 14px;
  margin: 0 0 12px;
  padding: 14px;
  border: 1px solid rgba(21, 94, 117, 0.28);
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(21, 94, 117, 0.1), rgba(37, 109, 154, 0.055));
}

.account-login-card strong {
  display: block;
  color: #0f172a;
  font-size: 0.95rem;
}

.account-login-card span {
  display: block;
  margin-top: 3px;
  color: #64748b;
  font-size: 0.8rem;
}

.account-login-card--compact {
  grid-template-columns: 1fr;
  text-align: left;
}

.account-login-card--compact strong {
  color: #f8fafc;
}

.account-login-card--compact span {
  color: #94a3b8;
}

.account-login-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
}

.account-login-actions .btn-small {
  min-height: 36px;
  white-space: nowrap;
}

.account-field {
  display: grid;
  grid-template-columns: minmax(160px, 0.38fr) minmax(0, 1fr);
  align-items: center;
  gap: 18px;
  padding: 16px 0;
  border-bottom: 1px dashed rgba(15, 23, 42, 0.16);
}

.account-field--wide {
  grid-column: auto;
}

.account-field__label {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: #111827;
  font-size: 0.9rem;
  font-weight: 800;
}

.account-field__label svg {
  width: 20px;
  height: 20px;
  color: var(--account-field-color, #6366f1);
}

.account-field input,
.account-field select {
  width: 100%;
  min-height: 48px;
  padding: 0 14px;
  border: 1px solid rgba(15, 23, 42, 0.1);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.78);
  color: #111827;
  font: inherit;
}

.account-field select {
  cursor: pointer;
}

.account-field input:focus,
.account-field select:focus {
  border-color: rgba(37, 99, 235, 0.48);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
}

.account-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  padding-top: 18px;
}

.account-actions .btn-small {
  flex: 1 1 240px;
  justify-content: center;
  min-height: 48px;
}

.account-feedback {
  min-height: 20px;
  color: #2563eb;
  font-size: 0.84rem;
  font-weight: 700;
}

.account-privacy-note {
  display: inline-flex;
  grid-column: 1 / -1;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 8px 0 0;
  color: #64748b;
  font-size: 0.82rem;
}

.account-privacy-note svg {
  width: 16px;
  height: 16px;
}

.account-feed {
  display: grid;
  gap: 12px;
  max-height: 560px;
  overflow-y: auto;
  padding: 16px;
}

.account-feed-item {
  padding: 14px 16px;
  border-radius: 18px;
  border: 1px solid rgba(15, 23, 42, 0.08);
  background: rgba(255, 255, 255, 0.72);
}

.account-feed-item__meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.account-feed-item__body {
  color: #111827;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}

.account-feed-empty {
  padding: 22px;
  text-align: center;
  border-radius: 18px;
  border: 1px dashed rgba(15, 23, 42, 0.16);
  background: rgba(255, 255, 255, 0.72);
}

.backup-timeline {
  display: grid;
  gap: 12px;
  width: min(100%, 1200px);
  margin: 0 auto;
}

@media (max-width: 1180px) {
  .subject-grid {
    grid-template-columns: repeat(2, minmax(300px, 1fr));
  }

  .account-shell {
    grid-template-columns: 1fr;
  }

  .content-grid {
    gap: 28px;
  }
}

@media (max-width: 980px) {
  .hero-strip h1 {
    font-size: 3rem;
  }

  .nav-btn span {
    display: none;
  }

  .nav-btn {
    min-width: 38px;
    justify-content: center;
    padding: 0 10px;
  }

  .nav-brand {
    max-width: 190px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dash-body,
  .settings-grid {
    grid-template-columns: 1fr;
  }

  .dash-stats-col:first-child {
    border-right: 0;
    border-bottom: 1px solid var(--border);
  }

  .dash-stats-col:last-child {
    border-left: 0;
    border-top: 1px solid var(--border);
  }

  .gauge-container {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .dash-stats-col {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0 18px;
  }

  .stat-item + .stat-item {
    border-top: 0;
  }
}

@media (max-width: 720px) {
  .study-shell {
    padding-top: 66px;
  }

  .quick-action-rail {
    padding: 7px 10px;
  }

  .quick-action-track {
    min-height: 52px;
    padding: 6px 8px;
    grid-template-columns: repeat(6, minmax(44px, max-content));
    justify-content: center;
    gap: 5px;
  }

  .quick-action {
    width: min(44px, 100%);
    height: 44px;
    padding: 0 11px;
  }

  .quick-action svg {
    width: 20px;
    height: 20px;
  }

  .quick-action:hover {
    width: min(44px, 100%);
    gap: 0;
    transform: translateY(-1px) scale(1.035);
  }

  .quick-action:hover .quick-action__label {
    max-width: 0;
    opacity: 0;
    transform: translateX(-6px);
  }

  .top-nav {
    top: 66px;
    height: 58px;
    padding: 0 12px;
    gap: 8px;
  }

  .top-nav.nav-scrolled {
    height: 54px;
  }

  .nav-left {
    gap: 4px;
    scroll-snap-type: x proximity;
  }

  .nav-btn {
    min-width: 36px;
    scroll-snap-align: center;
  }

  .nav-right .icon-button:not(.icon-button--accent) {
    display: none;
  }

  .nav-brand {
    max-width: 126px;
    padding: 0 10px;
    font-size: 0.9rem;
  }

  .hero-strip {
    min-height: 280px;
    padding: 28px 14px 26px;
  }

  .hero-strip h1 {
    font-size: 2.25rem;
  }

  .hero-strip p {
    font-size: 0.95rem;
  }

  .hero-strip__content {
    padding: 22px 16px;
    border-radius: 22px;
  }

  .hero-scoreboard {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .content-grid {
    padding: 0 14px;
  }

  .unit-section__header,
  .chart-shell__head,
  .dash-top {
    flex-direction: column;
    align-items: flex-start;
  }

  .unit-section__actions {
    width: 100%;
  }

  .dash-top-right {
    align-items: flex-start;
  }

  .subject-grid,
  .two-column,
  .account-form {
    grid-template-columns: 1fr;
  }

  .subject-card {
    min-height: auto;
    padding: 18px;
  }

  .dash-stats-col {
    grid-template-columns: 1fr;
  }

  .stat-item + .stat-item {
    border-top: 1px solid var(--border);
  }

  .subject-card__footer,
  .chat-toolbar,
  .chat-compose__row,
  .chat-compose__footer {
    grid-template-columns: 1fr;
  }

  .subject-card__footer,
  .chat-toolbar,
  .chat-compose__row,
  .chat-compose__footer {
    display: grid;
  }

  .chat-settings-panel,
  .chat-item {
    grid-template-columns: 1fr;
  }

  .account-field {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .account-login-card {
    grid-template-columns: 1fr;
  }

  .account-login-actions {
    justify-content: stretch;
  }

  .account-login-actions .btn-small {
    flex: 1 1 130px;
  }

  .account-dialog {
    align-items: start;
    padding: 12px;
  }

  .account-dialog__card {
    max-height: calc(100vh - 24px);
    border-radius: 18px;
  }

  .account-dialog__head {
    gap: 12px;
  }

  .account-dialog .account-shell {
    grid-template-columns: 1fr;
  }

  .chat-item__serial {
    width: 42px;
  }

  .chart-placeholder {
    min-height: 240px;
  }

  .analytics-panel,
  .plain-panel,
  .account-card,
  .chat-shell,
  .settings-group,
  .backup-timeline > div {
    border-radius: 16px;
  }

  .settings-modal-card {
    border-radius: 18px;
  }

  .settings-body {
    max-height: none;
    padding: 12px;
  }

  .settings-tab {
    min-width: 82px;
  }

  .backup-shell__grid,
  .backup-stats,
  .backup-actions {
    grid-template-columns: 1fr;
  }

  .backup-card {
    padding: 14px;
    border-radius: 18px;
  }

  .backup-card__head {
    margin-bottom: 10px;
  }

  .backup-vault-item__head,
  .backup-vault-item__foot,
  .backup-settings-row {
    align-items: flex-start;
    flex-direction: column;
  }

  .settings-row {
    align-items: flex-start;
    flex-direction: column;
    gap: 8px;
  }

  .settings-row > *:last-child,
  .settings-input,
  .cfg-stepper {
    width: 100%;
  }

  .cfg-val-input {
    flex: 1;
    width: auto;
  }
}

@media (max-width: 460px) {
  .study-shell {
    padding-bottom: 52px;
  }

  .backup-dialog__card {
    padding: 14px;
  }

  .hero-strip h1 {
    font-size: 1.95rem;
  }

  .backup-actions {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .backup-actions .btn-small {
    min-height: 38px;
    padding: 8px 6px;
    font-size: 0.65rem;
  }

  .backup-actions .btn-small svg {
    width: 14px;
    height: 14px;
  }

  .hero-scoreboard {
    gap: 8px;
  }

  .hero-scoreboard span {
    min-height: 52px;
  }

  .hero-pills {
    display: none;
  }

  .dashboard-panel,
  .analytics-panel,
  .status-strip,
  .plain-panel,
  .chat-shell,
  .settings-group,
  .backup-timeline > div,
  .subject-card {
    border-radius: 14px;
  }

  .dash-top,
  .dash-stats-col,
  .analytics-panel {
    padding: 16px;
  }

  .subject-card__identity h3 {
    font-size: 1.05rem;
  }

  .subject-icon {
    width: 42px;
    height: 42px;
  }
}

@media (prefers-reduced-motion: reduce) {
  html {
    scroll-behavior: auto;
  }

  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }

  .reveal-ready,
  .reveal-ready.is-visible,
  .subject-card,
  .hero-strip__content,
  .paper-panel,
  .dashboard-panel,
  .analytics-panel {
    filter: none !important;
    transform: none !important;
  }
}

/* Hero Stats Grid */
.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin: 0 auto 18px;
  max-width: 800px;
}

.stat-box {
  padding: 18px 14px;
  border-radius: 16px;
  background: rgba(30, 41, 59, .6);
  border: 1px solid rgba(71, 85, 105, .25);
  backdrop-filter: blur(10px);
  transition: all .3s cubic-bezier(.16, 1, .3, 1);
  position: relative;
  overflow: hidden;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.stat-box:hover {
  background: rgba(30, 41, 59, .9);
  border-color: rgba(71, 85, 105, .4);
  transform: translateY(-4px);
}

.stat-icon {
  width: 40px;
  height: 40px;
  margin: 0 auto 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(148, 163, 184, .08);
  border-radius: 12px;
  font-size: 20px;
  transition: all .3s;
  position: relative;
}

.stat-box:hover .stat-icon {
  background: rgba(59, 130, 246, .15);
  transform: scale(1.1);
}
.people-icon {
  background:rgba(245,158,11,.16);
  border:1px solid rgba(250,204,21,.28);
  animation: people-days-sync var(--days-pulse, 4.5s) ease-in-out infinite;
}
.people-core {
  width:16px;
  height:16px;
  border-radius:50%;
  background:linear-gradient(135deg,#fef3c7,#f59e0b);
  position:relative;
  margin-top:-5px;
  box-shadow:0 0 16px rgba(245,158,11,.46);
}
.people-core::before {
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:28px;
  height:13px;
  bottom:-15px;
  border-radius:16px 16px 8px 8px;
  background:linear-gradient(135deg,#fde68a,#f59e0b);
  box-shadow:0 4px 12px rgba(245,158,11,.28);
}
.ratio-icon {
  background:
    radial-gradient(circle at 68% 72%, rgba(254,202,202,.22), transparent 34%),
    rgba(127,29,29,.22);
  border:1px solid rgba(248,113,113,.32);
  overflow:hidden;
  animation: ratio-breathe 2.6s ease-in-out infinite;
}
.ratio-icon::before {
  content:"";
  position:absolute;
  inset:7px;
  background-image:radial-gradient(circle, rgba(254,202,202,.28) 0 1.65px, transparent 1.9px);
  background-size:6.5px 6.5px;
  opacity:.68;
}
.ratio-icon::after {
  content:"";
  position:absolute;
  inset:6px;
  border-radius:10px;
  background:linear-gradient(135deg, transparent 0 42%, rgba(248,113,113,.24) 48%, transparent 55% 100%);
  transform:translateX(-22px);
  animation: ratio-scan 2.6s ease-in-out infinite;
}
.ratio-active-dot {
  position:absolute;
  right:10px;
  bottom:10px;
  z-index:1;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#fecaca;
  border:2px solid #ef4444;
  box-shadow:0 0 0 4px rgba(239,68,68,.18), 0 0 16px rgba(248,113,113,.72);
  animation: ratio-dot 2.6s ease-in-out infinite;
}
@keyframes people-days-sync {
  0%, 100% { transform:translateY(0) scale(1); box-shadow:0 0 0 0 rgba(250,204,21,.2); }
  45% { transform:translateY(-2px) scale(1.06); box-shadow:0 0 0 9px rgba(250,204,21,0); }
  65% { transform:translateY(1px) scale(.98); }
}
@keyframes ratio-breathe {
  0%, 100% { transform:translateY(0) scale(1); box-shadow:0 0 0 0 rgba(248,113,113,.16); }
  50% { transform:translateY(-1px) scale(1.04); box-shadow:0 0 0 8px rgba(248,113,113,0); }
}
@keyframes ratio-scan {
  0%, 28% { transform:translateX(-24px); opacity:0; }
  45%, 70% { opacity:1; }
  100% { transform:translateX(24px); opacity:0; }
}
@keyframes ratio-dot {
  0%, 100% { transform:scale(.92); box-shadow:0 0 0 3px rgba(239,68,68,.12), 0 0 12px rgba(248,113,113,.52); }
  50% { transform:scale(1.16); box-shadow:0 0 0 7px rgba(239,68,68,0), 0 0 20px rgba(248,113,113,.82); }
}

.stat-val {
  font-size: 32px;
  font-weight: 800;
  color: #f1f5f9;
  display: block;
  margin-bottom: 6px;
  letter-spacing: -1px;
}

.stat-label {
  font-size: 12px;
  color: #64748b;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  line-height: 1.4;
}

/* Gold theme - 100K+ */
.stat-box.blue-theme {
  background: linear-gradient(135deg, rgba(245, 158, 11, .12), rgba(250, 204, 21, .045));
  border: 1.5px solid rgba(245, 158, 11, .34);
}

.stat-box.blue-theme:hover {
  background: linear-gradient(135deg, rgba(245, 158, 11, .17), rgba(250, 204, 21, .08));
  border-color: rgba(250, 204, 21, .46);
}

.stat-box.blue-theme .stat-icon {
  background: rgba(245, 158, 11, .16);
  border: 1px solid rgba(250, 204, 21, .26);
}

.stat-box.blue-theme:hover .stat-icon {
  background: rgba(245, 158, 11, .24);
}

.stat-box.blue-theme .stat-val {
  color: #facc15;
}

.stat-box.blue-theme .stat-label {
  color: #f59e0b;
}

/* Green theme - 1% */
.stat-box.green-theme {
  background: linear-gradient(135deg, rgba(239, 68, 68, .1), rgba(127, 29, 29, .06));
  border: 1.5px solid rgba(248, 113, 113, .32);
}

.stat-box.green-theme:hover {
  background: linear-gradient(135deg, rgba(239, 68, 68, .16), rgba(127, 29, 29, .1));
  border-color: rgba(248, 113, 113, .48);
}

.stat-box.green-theme .stat-icon {
  background: rgba(239, 68, 68, .14);
  border: 1px solid rgba(248, 113, 113, .28);
}

.stat-box.green-theme:hover .stat-icon {
  background: rgba(239, 68, 68, .22);
}

.stat-box.green-theme .stat-val {
  color: #fb7185;
}

.stat-box.green-theme .stat-label {
  color: #f87171;
}

/* ETA stat box */
.stat-box.eta-stat {
  background: linear-gradient(135deg, rgba(6, 182, 212, .15), rgba(59, 130, 246, .1));
  border: 1.5px solid rgba(6, 182, 212, .4);
  position: relative;
  overflow: hidden;
}

.stat-box.eta-stat::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(6, 182, 212, .1), transparent);
  animation: eta-glow 4s ease-in-out infinite;
  pointer-events: none;
}

@keyframes eta-glow {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

.eta-icon-wrapper {
  position: relative;
  margin-bottom: 8px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.eta-icon {
  width: 40px;
  height: 40px;
  background: rgba(6, 182, 212, .2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  font-size: 18px;
}

.clock-circle {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid rgba(6, 182, 212, .4);
  position: relative;
  animation: spin-clock 8s linear infinite;
}

@keyframes spin-clock {
  from { transform: rotate(0); }
  to { transform: rotate(360deg); }
}

.clock-hand {
  position: absolute;
  width: 2px;
  height: 14px;
  background: linear-gradient(to top, #06b6d4, transparent);
  left: 50%;
  top: 2px;
  transform-origin: bottom;
  animation: tick-hand 2s steps(60, end) infinite;
  border-radius: 1px;
}

@keyframes tick-hand {
  from { transform: translateX(-50%) rotate(0deg); }
  to { transform: translateX(-50%) rotate(360deg); }
}

.student-badge {
  position: absolute;
  top: -8px;
  right: -8px;
  padding: 4px 8px;
  border-radius: 20px;
  background: #10b981;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
}

.eta-val {
  font-size: 32px;
  font-weight: 800;
  color: #22d3ee;
  display: block;
  margin-bottom: 4px;
  letter-spacing: -1px;
}

.eta-days {
  font-size: 12px;
  color: #94a3b8;
  font-weight: 600;
}

.eta-sub-label {
  font-size: 11px;
  color: #64748b;
  margin-top: 6px;
  display: block;
}

/* Dashboard Modern Styles */
.dashboard-modern { padding: 12px 0; }
.dash-mode-toggle {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  margin-bottom: 8px;
  padding-right: 4px;
}
.toggle-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  color: #888070;
  transition: color .3s;
}
.dashboard-modern.dark .toggle-label { color: #64748b; }
.toggle-track {
  width: 44px;
  height: 24px;
  border-radius: 999px;
  position: relative;
  cursor: pointer;
  background: #d1c9b8;
  transition: background .3s;
  flex-shrink: 0;
}
.dashboard-modern.dark .toggle-track { background: #3b82f6; }
.toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  transition: transform .3s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.dashboard-modern.dark .toggle-thumb { transform: translateX(20px); }

.dash-card {
  border-radius: 20px;
  overflow: hidden;
  transition: background .3s, border .3s;
  background: #faf8f4;
  border: 1px solid #e5e0d5;
}
.dash-card.dark {
  background: rgba(18, 24, 36, .82);
  border: 1px solid rgba(255, 255, 255, .07);
}

.dash-head {
  text-align: center;
  padding: 14px 90px 16px;
  position: relative;
}
.dash-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 5px;
  color: #888070;
  transition: color .3s;
}
.dashboard-modern.dark .dash-eyebrow { color: #64748b; }
.dash-greet {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.1;
  color: #1a1a1a;
  transition: color .3s;
}
.dashboard-modern.dark .dash-greet { color: #f1f5f9; }
.dash-mission {
  font-size: 11px;
  margin-top: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  color: #888070;
  transition: color .3s;
}
.dashboard-modern.dark .dash-mission { color: #64748b; }
.mdot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #d97706;
  flex-shrink: 0;
}

.eta-pill {
  position: absolute;
  top: 14px;
  right: 16px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  background: #fff0f6;
  border: 1.5px solid #f9a8d4;
  color: #be185d;
  transition: background .3s, border .3s, color .3s;
}
.dashboard-modern.dark .eta-pill {
  background: rgba(236, 72, 153, .1);
  border: 1.5px solid rgba(249, 168, 212, .2);
  color: #f472b6;
}
.eta-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #5d7faa;
  animation: pulse-eta 2s infinite;
}
@keyframes pulse-eta {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .4; transform: scale(1.5); }
}
.eta-sub {
  position: absolute;
  top: 40px;
  right: 18px;
  font-size: 10px;
  color: #aaa;
  transition: color .3s;
}
.dashboard-modern.dark .eta-sub { color: #475569; }

.dash-body {
  display: grid;
  grid-template-columns: 1fr 210px 1fr;
  padding: 10px 16px 16px;
  gap: 0;
}
.stats-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 4px 8px;
}
.stat-card {
  padding: 13px 15px;
  border-radius: 12px;
  background: #f0ece3;
  border: 1px solid #e5e0d5;
  transition: background .3s, border .3s;
}
.dashboard-modern.dark .stat-card {
  background: rgba(14, 18, 28, .7);
  border: 1px solid rgba(255, 255, 255, .07);
}
.stat-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 7px;
  color: #888070;
  transition: color .3s;
}
.dashboard-modern.dark .stat-label { color: #64748b; }
.sc-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.stat-val {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
  color: #1a1a1a;
  transition: color .3s;
}
.dashboard-modern.dark .stat-val { color: #f1f5f9; }
.stat-bar {
  height: 3px;
  border-radius: 999px;
  margin-top: 9px;
  overflow: hidden;
  background: #e5e0d5;
  transition: background .3s;
}
.dashboard-modern.dark .stat-bar { background: rgba(255, 255, 255, .08); }
.stat-fill { height: 100%; border-radius: 999px; }
.stat-detail {
  font-size: 11px;
  margin-top: 5px;
  color: #aaa59a;
  transition: color .3s;
}
.dashboard-modern.dark .stat-detail { color: #475569; }

.count-card {
  padding: 13px 15px;
  border-radius: 12px;
  background: #f0ece3;
  border: 1px solid #e5e0d5;
  transition: background .3s, border .3s;
}
.dashboard-modern.dark .count-card {
  background: rgba(14, 18, 28, .7);
  border: 1px solid rgba(255, 255, 255, .07);
}
.count-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
  color: #888070;
  transition: color .3s;
}
.dashboard-modern.dark .count-label { color: #64748b; }
.count-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.count-big {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1;
}
.count-sub {
  font-size: 11px;
  color: #aaa59a;
  transition: color .3s;
}
.dashboard-modern.dark .count-sub { color: #475569; }
.count-bar {
  height: 3px;
  border-radius: 999px;
  margin-top: 8px;
  overflow: hidden;
  background: #e5e0d5;
  transition: background .3s;
}
.dashboard-modern.dark .count-bar { background: rgba(255, 255, 255, .08); }
.count-fill { height: 100%; border-radius: 999px; }

.gauge-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px;
}
.gauge-wrap {
  position: relative;
  width: 180px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}
.gauge-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }

.gb-outer, .gb-inner {
  stroke: rgba(255, 255, 255, .08);
  transition: stroke .3s;
}
.dash-card.light .gb-outer,
.dash-card.light .gb-inner {
  stroke: rgba(0, 0, 0, .08);
}

.gauge-center {
  text-align: center;
  z-index: 1;
  position: relative;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(6, 182, 212, .1), rgba(59, 130, 246, .08));
  border: 1.5px solid rgba(6, 182, 212, .3);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
}
.gauge-clabel {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  display: block;
  color: #64748b;
  transition: color .3s;
}
.dashboard-modern.dark .gauge-clabel { color: #64748b; }
.gauge-cval {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, #4f97bb, #70b0cf);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: all .3s;
  line-height: 1;
}
.dashboard-modern.dark .gauge-cval { 
  background: linear-gradient(135deg, #4f97bb, #70b0cf);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.dashboard-modern.dark .gauge-center {
  background: linear-gradient(135deg, rgba(6, 182, 212, .1), rgba(59, 130, 246, .08));
  border-color: rgba(6, 182, 212, .3);
}
.dash-card.light .gauge-center {
  background: linear-gradient(135deg, rgba(6, 182, 212, .12), rgba(59, 130, 246, .1));
  border-color: rgba(6, 182, 212, .4);
}
.gauge-legend {
  display: flex;
  gap: 14px;
  margin-top: 8px;
}
.gleg {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: #888070;
  transition: color .3s;
}
.dashboard-modern.dark .gleg { color: #64748b; }
.gleg-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.dash-foot {
  padding: 12px 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  background: #f0ece3;
  border-top: 1px solid #e5e0d5;
  transition: background .3s, border .3s;
}
.dashboard-modern.dark .dash-foot {
  background: rgba(0, 0, 0, .2);
  border-top: 1px solid rgba(255, 255, 255, .06);
}
.foot-item {
  display: flex;
  align-items: center;
  gap: 8px;
}
.foot-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  white-space: nowrap;
  min-width: 80px;
  color: #888070;
  transition: color .3s;
}
.dashboard-modern.dark .foot-label { color: #64748b; }
.foot-pct {
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
  min-width: 30px;
  color: #1a1a1a;
  transition: color .3s;
}
.dashboard-modern.dark .foot-pct { color: #f1f5f9; }
.foot-track {
  flex: 1;
  height: 5px;
  border-radius: 999px;
  overflow: hidden;
  background: #e5e0d5;
  transition: background .3s;
}
.dashboard-modern.dark .foot-track { background: rgba(255, 255, 255, .08); }
.foot-fill { height: 100%; border-radius: 999px; }

/* ── Syllabus Chapter Rows & Plates ── */
.paper-section {
  margin-bottom: 13px;
  padding: 10px;
  border-radius: 14px;
  background: rgba(15,23,42,.25);
  border: 1px solid rgba(148,163,184,.065);
}
.paper-section__title {
  width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px;
  font-family: inherit; font-size: .69rem; font-weight: 800; letter-spacing: .04em;
  text-transform: uppercase; color: #e2e8f0;
  padding: 1px 0 8px; border: 0; margin-bottom: 0;
  background: transparent; cursor: pointer; text-align: left;
  transition: color .18s ease, opacity .18s ease;
}
.paper-section__title:hover,
.paper-section__title:focus-visible { color: #f8fafc; opacity: .95; outline: none; }
.paper-section.is-open .paper-section__title { color: #f8fafc; }
.paper-section__chevron { flex: 0 0 auto; color: var(--subject-accent, #64748b); transition: transform .22s ease, color .18s ease; }
.paper-section.is-open .paper-section__chevron { transform: rotate(180deg); color: var(--subject-accent, #64748b); }
.chapter-list { display: flex; flex-direction: column; gap: 8px; padding-top: 10px; }
.chapter-list[hidden] { display: none; }
.ch-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 13px; border-radius: 12px; cursor: pointer;
  background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.045);
  transition: background .18s, border-color .18s, transform .18s; user-select: none;
}
.ch-row:hover { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.08); transform: translateY(-1px); }
.ch-row.is-open {
  background: color-mix(in srgb, var(--subject-accent,#64748b) 10%, rgba(255,255,255,.04));
  border-color: color-mix(in srgb, var(--subject-accent,#64748b) 36%, rgba(255,255,255,.06));
  border-bottom-left-radius:0; border-bottom-right-radius:0;
}
.ch-row__left { display: flex; align-items: center; gap: 9px; }
.ch-row__right { display: flex; align-items: center; gap: 6px; }
.ch-name { font-size: .82rem; font-weight: 500; color: #e2e8f0; }
.ch-pct { font-size: .75rem; color: #94a3b8; font-variant-numeric: tabular-nums; }
.ch-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ch-dot--done { background: #10b981; }
.ch-dot--run  { background: #f59e0b; }
.ch-dot--pending { background: #334155; border: 1.5px solid #475569; }
.ch-chevron { color: #475569; transition: transform .22s ease; }
.ch-row.is-open .ch-chevron { transform: rotate(180deg); }
.ch-plate {
  background: linear-gradient(180deg, rgba(8,13,28,.82), rgba(8,13,28,.66));
  border: 1px solid color-mix(in srgb, var(--subject-accent,#334155) 30%, rgba(255,255,255,.07));
  border-top: none; border-radius: 0 0 14px 14px; padding: 14px; margin-top: -8px; margin-bottom: 2px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.028), 0 12px 28px rgba(2,6,23,.18);
  animation: plateIn .2s ease;
}
@keyframes plateIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
.ch-plate__inner { display: flex; flex-direction: column; gap: 12px; }
.ch-plate__label { font-size:.7rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#64748b; }
.ch-meta-row { display:grid; grid-template-columns:minmax(0,1fr) auto; align-items:center; gap:10px; }
.ch-name-edit {
  width:100%; min-width:0; border:1px solid rgba(255,255,255,.075); border-radius:11px;
  background:rgba(255,255,255,.045); color:#f8fafc; padding:8px 10px;
  font:600 .84rem/1.2 inherit; outline:none; transition:border-color .16s, background .16s;
}
.ch-name-edit:focus { border-color:var(--subject-accent,#38bdf8); background:rgba(255,255,255,.085); }
.ch-style-switch {
  display:flex; align-items:center; gap:3px; padding:3px; border-radius:12px;
  background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.07);
}
.ch-style-option {
  border:0; border-radius:9px; padding:7px 10px; background:transparent; color:#94a3b8;
  font:700 .68rem/1 inherit; cursor:pointer; white-space:nowrap; transition:background .15s,color .15s;
}
.ch-style-option:hover { color:#e2e8f0; background:rgba(255,255,255,.07); }
.ch-style-option.is-active { color:#0f172a; background:var(--subject-accent,#38bdf8); }
.ch-stepper {
  display: flex; align-items: center; justify-content:center; gap: 12px;
  padding:10px 12px; border-radius:13px;
  background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.06);
}
.ch-btn {
  width:30px; height:30px; border-radius:9px; border:1px solid rgba(255,255,255,.11);
  background:rgba(255,255,255,.055); color:#e2e8f0; font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:background .15s,transform .1s;
}
.ch-btn:hover { background:rgba(255,255,255,.12); }
.ch-btn:active { transform:scale(.92); }
.ch-val { font-size:1.05rem; font-weight:700; color:#f1f5f9; min-width:64px; text-align:center; font-variant-numeric:tabular-nums; }
.ch-val small { font-size:.72rem; font-weight:400; color:#64748b; }
.quick-delta-row {
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:6px;
  width:100%;
  margin-top:7px;
}
.quick-delta-btn {
  min-height:26px;
  border:1px solid rgba(148,163,184,.16);
  border-radius:8px;
  background:rgba(15,23,42,.58);
  color:#cbd5e1;
  font-size:.68rem;
  font-weight:900;
  cursor:pointer;
  transition:background .15s,border-color .15s,color .15s,transform .1s;
}
.quick-delta-btn:hover {
  border-color:color-mix(in srgb, var(--subject-accent,#4f97bb) 48%, rgba(148,163,184,.16));
  background:color-mix(in srgb, var(--subject-accent,#4f97bb) 20%, rgba(15,23,42,.72));
  color:#f8fafc;
}
.quick-delta-btn:active { transform:scale(.95); }
.quick-delta-btn--pos {
  color:#d9f99d;
}
.ch-track { height:5px; border-radius:99px; background:rgba(255,255,255,.08); overflow:hidden; }
.ch-track__fill { height:100%; border-radius:99px; background:var(--subject-accent,#38bdf8); transition:width .3s ease; }
.ch-slider {
  --slider-pct: 0%;
  --slider-color: var(--subject-accent,#38bdf8);
  width:100%;
  height:22px;
  border-radius:999px;
  padding:0;
  appearance:none;
  -webkit-appearance:none;
  background:transparent;
  cursor:pointer;
}
.ch-slider::-webkit-slider-runnable-track {
  height:8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:
    linear-gradient(90deg, color-mix(in srgb, var(--slider-color) 82%, #155e75), var(--slider-color)) 0/var(--slider-pct) 100% no-repeat,
    linear-gradient(90deg,rgba(241,245,249,.72),rgba(226,232,240,.55));
  box-shadow: inset 0 1px 2px rgba(15,23,42,.16), 0 2px 7px rgba(15,23,42,.16);
}
.ch-slider::-webkit-slider-thumb {
  -webkit-appearance:none;
  appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.88);
  background:linear-gradient(180deg,#ffffff,#eef2ff);
  box-shadow:0 4px 10px rgba(15,23,42,.28), 0 0 0 3px rgba(255,255,255,.08);
  margin-top:-7px;
  transition:transform .14s ease, box-shadow .14s ease;
}
.ch-slider:hover::-webkit-slider-thumb,
.ch-slider:focus-visible::-webkit-slider-thumb {
  transform:scale(1.04);
  box-shadow:0 5px 12px rgba(15,23,42,.32), 0 0 0 4px color-mix(in srgb, var(--slider-color) 14%, transparent);
}
.ch-slider::-moz-range-track {
  height:8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(226,232,240,.62);
  box-shadow: inset 0 1px 2px rgba(15,23,42,.16), 0 2px 7px rgba(15,23,42,.16);
}
.ch-slider::-moz-range-progress {
  height:8px;
  border-radius:999px;
  background:var(--slider-color);
}
.ch-slider::-moz-range-thumb {
  width:20px;
  height:20px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.88);
  background:linear-gradient(180deg,#ffffff,#eef2ff);
  box-shadow:0 4px 10px rgba(15,23,42,.28), 0 0 0 3px rgba(255,255,255,.08);
}
.ch-plate__actions { display:flex; gap:8px; padding-top:2px; }
.ch-pill { padding:6px 13px; border-radius:10px; cursor:pointer; font-size:.73rem; font-weight:700; transition:opacity .15s,transform .1s,background .15s; }
.ch-pill:active { transform:scale(.95); }
.ch-pill--done { background:rgba(16,185,129,.18); color:#10b981; border:1px solid rgba(16,185,129,.3); }
.ch-pill--done:hover { background:rgba(16,185,129,.28); }
.ch-pill--reset { background:rgba(239,68,68,.12); color:#f87171; border:1px solid rgba(239,68,68,.2); }
.ch-pill--reset:hover { background:rgba(239,68,68,.22); }
.subj-prog-ring { position:relative; display:flex; align-items:center; justify-content:center; }
.ring-pct { position:absolute; font-size:.58rem; font-weight:700; color:#94a3b8; }
.paper-meter__track {
  height: 4px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(148,163,184,.18);
}
.paper-meter__track b {
  display: block;
  height: 100%;
  width: 0;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--subject-accent,#4f97bb), color-mix(in srgb, var(--subject-accent,#4f97bb) 72%, #70b0cf));
}
.paper-section__right {
  display: flex;
  align-items: center;
  gap: 9px;
  flex: 0 0 auto;
}
.paper-meter {
  width: 108px;
  display: grid;
  gap: 4px;
  padding: 5px 8px;
  border-radius: 10px;
  background: rgba(255,255,255,.035);
  border: 1px solid rgba(255,255,255,.06);
}
.paper-meter__top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  color: #94a3b8;
  font-size: .58rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: none;
}
.paper-meter__top strong {
  color: #e2e8f0;
  font-size: .66rem;
}

/* Track checkboxes */
.track-checks {
  display:flex; flex-wrap:wrap; gap:7px; padding:9px;
  border-radius:13px; background:rgba(255,255,255,.032); border:1px solid rgba(255,255,255,.055);
}
.track-chk {
  display:flex; align-items:center; gap:6px; font-size:.76rem; color:#94a3b8; cursor:pointer; user-select:none;
  padding:6px 8px; border-radius:10px; background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.045);
  transition:background .15s,color .15s,border-color .15s;
}
.track-chk:hover { color:#e2e8f0; background:rgba(255,255,255,.07); border-color:rgba(255,255,255,.09); }
.track-chk input { accent-color:var(--subject-accent,#38bdf8); cursor:pointer; }

/* Class slider rows */
.cls-row {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:10px 11px; border-radius:13px;
  background:rgba(255,255,255,.032); border:1px solid rgba(255,255,255,.055);
}
.cls-label { font-size:.75rem; color:#94a3b8; }
.cls-total-val { color:#475569; font-size:.7rem; }

.chapter-bar-tip {
  position:absolute;
  left:50%;
  bottom:calc(100% + 10px);
  z-index:20;
  width:max-content;
  min-width:142px;
  max-width:190px;
  padding:10px 12px;
  border-radius:10px;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 14px 30px rgba(2,6,23,.34);
  color:#f8fafc;
  opacity:0;
  pointer-events:none;
  transform:translate(-50%,6px) scale(.96);
  transition:opacity .14s ease, transform .14s ease;
}
.chapter-bar-tip::after {
  content:"";
  position:absolute;
  left:50%;
  bottom:-6px;
  width:10px;
  height:10px;
  border-right:1px solid rgba(255,255,255,.08);
  border-bottom:1px solid rgba(255,255,255,.08);
  background:#111827;
  transform:translateX(-50%) rotate(45deg);
}

  opacity:1;
  transform:translate(-50%,0) scale(1);
  transition-delay:.42s;
}
.chapter-bar-container:focus-visible .chapter-bar-tip,
.chapter-bar-container.is-tip-open .chapter-bar-tip {
  opacity:1;
  transform:translate(-50%,0) scale(1);
  transition-delay:0s;
}
.chapter-bar-container:first-child .chapter-bar-tip {
  left:0;
  transform:translate(0,6px) scale(.96);
}
.chapter-bar-container:first-child:hover .chapter-bar-tip {
  transform:translate(0,0) scale(1);
  transition-delay:.42s;
}
.chapter-bar-container:first-child:focus-visible .chapter-bar-tip,

  transform:translate(0,0) scale(1);
  transition-delay:0s;
}

  left:22px;
}
.chapter-bar-container:last-child .chapter-bar-tip {
  left:auto;
  right:0;
  transform:translate(0,6px) scale(.96);
}
.chapter-bar-container:last-child:hover .chapter-bar-tip {
  transform:translate(0,0) scale(1);
  transition-delay:.42s;
}
.chapter-bar-container:last-child:focus-visible .chapter-bar-tip,
.chapter-bar-container:last-child.is-tip-open .chapter-bar-tip {
  transform:translate(0,0) scale(1);
  transition-delay:0s;
}

  left:auto;
  right:22px;
}

const escapeHtml = (value) =>
  String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");

const icon = (name, label) => `
  <i data-lucide="${escapeHtml(name)}" aria-hidden="true"></i>
  <span class="sr-only">${escapeHtml(label)}</span>
`;

const todoButton = ({ iconName, label, tone = "neutral" }) => `
  <button
    class="icon-button icon-button--${escapeHtml(tone)}"
    type="button"
    disabled
    title="${escapeHtml(label)} - TODO"
    aria-label="${escapeHtml(label)} - TODO"
  >
    ${icon(iconName, label)}
  </button>
`;

const sectionShell = ({ id, eyebrow, title, note, actions = "", body }) => `
  <section class="unit-section" id="${escapeHtml(id)}">
    <div class="unit-section__header">
      <div>
        <p class="eyebrow">${escapeHtml(eyebrow)}</p>
        <h2>${escapeHtml(title)}</h2>
        <p>${escapeHtml(note)}</p>
      </div>
      <div class="unit-section__actions">${actions}</div>
    </div>
    ${body}
  </section>
`;

const USER_SETTINGS_KEY = "hsc-user-settings-v1";

const loadUserSettings = () => {
  try {
    const raw = localStorage.getItem(USER_SETTINGS_KEY);

  } catch(_) {

  const root = document.documentElement;

const modeScopedKey = (baseKey) => currentStudyMode() === "ssc" ? `${baseKey}-ssc-v1` : baseKey;

const CHAT_FIREBASE_CONFIG = {
  apiKey: "AIzaSyBKbWyF4Y1BH6tVSW50y5vQuwrUDVLQKrY",
  authDomain: "tonustudy.firebaseapp.com",

  storageBucket: "tonustudy.firebasestorage.app",
  messagingSenderId: "663585592404",
  appId: "1:663585592404:web:483eb7d56547d0f83dc9c1",
  measurementId: "G-E0PEG9BP5G",
};

const CHAT_COLLECTION = "hsc_group_chat_forever_v1";
const CHAT_PREFS_KEY = "hsc-group-chat-prefs-v1";

const AUTO_BACKUP_STAMP_KEY = "hsc-auto-backup-stamp-v1";

const normalizeChatPrefs = (raw = {}) => ({
  sortOrder: raw.sortOrder === "asc" ? "asc" : "desc",
  defaultVisibility: raw.defaultVisibility === "private" ? "private" : "public",
  isListVisible: !!raw.isListVisible,
  isSettingsOpen: !!raw.isSettingsOpen,
});

const loadChatPrefs = () => {
  try {
    const raw = localStorage.getItem(CHAT_PREFS_KEY);
    return normalizeChatPrefs(raw ? JSON.parse(raw) : {});
  } catch(_) {
    return normalizeChatPrefs();
  }
};

const saveChatPrefs = () => {
  try { localStorage.setItem(CHAT_PREFS_KEY, JSON.stringify(chatState.prefs)); } catch(_) {}
};

const createChatProfile = () => ({
  id: window.crypto?.randomUUID?.() || `chat-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
});

const loadChatProfile = () => {
  try {
    const raw = localStorage.getItem(CHAT_PROFILE_KEY);
    const parsed = raw ? JSON.parse(raw) : null;
    return parsed?.id ? parsed : createChatProfile();
  } catch(_) {
    return createChatProfile();
  }
};

const saveChatProfile = () => {
  try { localStorage.setItem(CHAT_PROFILE_KEY, JSON.stringify(chatState.profile)); } catch(_) {}
};

const chatState = {
  prefs: loadChatPrefs(),
  profile: loadChatProfile(),
  messages: [],
  db: null,
  unsubscribe: null,
  feedbackTone: "",
  feedbackMessage: "Firestore chat is live. Messages stay stored in the cloud.",
  status: "Connecting to Firestore...",
};

const getChatAuthorName = () => {
  const customName = String(scaffoldState?.userSettings?.customName || "").trim();
  return customName || "Student";
};

const setChatFeedback = (message, tone = "") => {
  chatState.feedbackMessage = message;
  chatState.feedbackTone = tone;
  const node = document.getElementById("chatFeedback");
  if (!node) return;
  node.textContent = message;
  node.classList.toggle("is-error", tone === "error");
  node.classList.toggle("is-success", tone === "success");
};

const getChatStatusTone = () => {
  if (!chatState.db) return chatState.status.includes("error") ? "error" : "";
  return "live";
};

const getVisibleChatMessages = () =>
  chatState.messages.filter((message) =>
    message.visibility !== "private" || message.authorId === chatState.profile.id
  );

const formatChatTime = (message) => {
  const stamp = message.createdAt?.toDate?.() || (message.createdAtMs ? new Date(message.createdAtMs) : null);
  if (!stamp || Number.isNaN(stamp.getTime())) return "Saving...";
  return stamp.toLocaleString("en-US", {
    month: "short",
    day: "2-digit",
    hour: "numeric",
    minute: "2-digit",
  });
};

const escapeChatBody = (text) => escapeHtml(String(text || "")).replace(/\n/g, "<br>");

const getAccountMessages = () =>
  chatState.messages.filter((message) => message.authorId === chatState.profile.id);

const renderAccountMessageFeed = () => {
  const feed = document.getElementById("accountMessageFeed");
  const count = document.getElementById("accountMessageCount");
  if (!feed) return;
  const messages = getAccountMessages();
  if (count) count.textContent = `${messages.length} post${messages.length === 1 ? "" : "s"}`;
  if (!messages.length) {
    feed.innerHTML = `<div class="account-feed-empty">No messages from this account yet. Send something from Chatbox and it will appear here.</div>`;
    return;
  }
  feed.innerHTML = messages.map((message) => `
    <article class="account-feed-item">
      <div class="account-feed-item__meta">
        <span>${escapeHtml(formatChatTime(message))}</span>
        <span class="${message.visibility === "private" ? "chat-visibility-pill chat-visibility-pill--private" : "chat-visibility-pill"}">${escapeHtml(message.visibility || "public")}</span>
      </div>
      <div class="account-feed-item__body">${escapeChatBody(message.text)}</div>
    </article>
  `).join("");
};

const renderChatMessages = () => {
  const feed = document.getElementById("chatFeed");
  const count = document.getElementById("chatMessageCount");
  const status = document.getElementById("chatLiveStatus");
  const statusDot = document.getElementById("chatLiveDot");
  if (status) status.textContent = chatState.status;
  if (statusDot) {
    statusDot.classList.remove("is-live", "is-error");
    const tone = getChatStatusTone();
    if (tone === "live") statusDot.classList.add("is-live");
    if (tone === "error") statusDot.classList.add("is-error");
  }
  const visible = getVisibleChatMessages();
  if (count) count.textContent = `${visible.length} message${visible.length === 1 ? "" : "s"}`;
  if (!feed) return;
  if (!visible.length) {
    feed.innerHTML = `<div class="chat-empty-note">No messages yet. Open the composer below and send the first one.</div>`;
    renderAccountMessageFeed();
    return;
  }
  feed.innerHTML = visible.map((message, index) => {
    const isSelf = message.authorId === chatState.profile.id;
    const visibilityClass = message.visibility === "private" ? "chat-visibility-pill chat-visibility-pill--private" : "chat-visibility-pill";
    return `
      <article class="chat-item ${isSelf ? "chat-item--self" : ""}">

const syncChatUi = () => {
  const settingsPanel = document.getElementById("chatSettingsPanel");
  const feedShell = document.getElementById("chatFeedShell");
  const sortSelect = document.getElementById("chatSortOrder");
  const defaultVisibility = document.getElementById("chatDefaultVisibility");
  const composerIdentity = document.getElementById("chatComposerIdentity");
  const composerMode = document.getElementById("chatComposerMode");
  const toggleButtons = document.querySelectorAll("[data-chat-list-toggle]");
  if (settingsPanel) settingsPanel.hidden = !chatState.prefs.isSettingsOpen;
  if (feedShell) feedShell.hidden = !chatState.prefs.isListVisible;
  if (sortSelect) sortSelect.value = chatState.prefs.sortOrder;
  if (defaultVisibility) defaultVisibility.value = chatState.prefs.defaultVisibility;
  if (composerIdentity) composerIdentity.textContent = getChatAuthorName();
  if (composerMode) composerMode.textContent = `Post visibility from settings: ${chatState.prefs.defaultVisibility}`;
  toggleButtons.forEach((button) => {
    button.textContent = chatState.prefs.isListVisible ? "Hide messages" : "Show messages";
  });
  setChatFeedback(chatState.feedbackMessage, chatState.feedbackTone);
  renderChatMessages();
};

const startChatListener = () => {
  if (!chatState.db) return;
  chatState.unsubscribe?.();
  chatState.status = `Live sync: ${chatState.prefs.sortOrder === "asc" ? "oldest first" : "newest first"}`;
  chatState.unsubscribe = chatState.db
    .collection(CHAT_COLLECTION)
    .orderBy("createdAt", chatState.prefs.sortOrder)
    .limit(300)
    .onSnapshot((snapshot) => {
      chatState.messages = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
      renderChatMessages();
    }, (error) => {
      chatState.status = `Firestore error: ${error.message}`;
      setChatFeedback("Chat sync failed. Check your Firestore rules or network.", "error");
      renderChatMessages();
    });
};

const initGroupChat = () => {
  saveChatProfile();
  syncChatUi();
  if (chatState.db || !window.firebase?.firestore) {
    if (!window.firebase?.firestore && !chatState.db) {
      chatState.status = "Firestore scripts unavailable";
      setChatFeedback("Firebase failed to load. The chat cannot sync right now.", "error");
      renderChatMessages();
    }
    return;
  }
  try {
    const app = window.firebase.apps?.length
      ? window.firebase.app()
      : window.firebase.initializeApp(CHAT_FIREBASE_CONFIG);
    chatState.db = window.firebase.firestore(app);
    chatState.status = "Connected to Firestore";
    setChatFeedback("Firestore chat is live. Messages stay stored in the cloud.", "success");
    startChatListener();
  } catch (error) {
    chatState.status = `Firestore error: ${error.message}`;
    setChatFeedback("Could not initialize Firestore chat.", "error");
    renderChatMessages();
  }
};

const applyChatPreference = (key, value) => {
  chatState.prefs[key] = value;
  saveChatPrefs();
  syncChatUi();
  if (key === "sortOrder" && chatState.db) startChatListener();
};

const sendChatMessage = async () => {
  const textarea = document.getElementById("chatMessageInput");
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text) {
    setChatFeedback("Write a message before sending.", "error");
    return;
  }
  if (!chatState.db) {
    setChatFeedback("Firestore is not ready yet. Wait a moment and try again.", "error");
    return;
  }
  const visibility = chatState.prefs.defaultVisibility === "private" ? "private" : "public";
  const authorName = getChatAuthorName();
  setChatFeedback("Sending message...", "");
  try {
    await chatState.db.collection(CHAT_COLLECTION).add({
      text,
      visibility,
      authorId: chatState.profile.id,
      authorName,
      account: {
        collegeName: scaffoldState.userSettings.collegeName || "",
        sscBatch: scaffoldState.userSettings.sscBatch || "",
        hscBatch: scaffoldState.userSettings.hscBatch || "",
        sscRoll: scaffoldState.userSettings.sscRoll || "",
        sscReg: scaffoldState.userSettings.sscReg || "",
        hscRoll: scaffoldState.userSettings.hscRoll || "",
        hscReg: scaffoldState.userSettings.hscReg || "",
      },
      createdAt: window.firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMs: Date.now(),
    });
    textarea.value = "";
    chatState.prefs.defaultVisibility = visibility;
    saveChatPrefs();
    setChatFeedback("Message stored in Firestore.", "success");
    syncChatUi();
  } catch (error) {
    setChatFeedback(`Send failed: ${error.message}`, "error");
  }
};

// Dashboard Calculations
const calculateSyllabusPercentage = (syllabus) => {
  let totalDone = 0, totalAll = 0;
  syllabus.forEach(subject => {
    const chapters = subject.hasPapers 
      ? subject.papers.flatMap(p => p.chapters)
      : subject.chapters;
    chapters.forEach(ch => {
      totalAll += ch.isPerc ? 100 : (ch.totalDL || 1);
      totalDone += ch.isPerc ? ch.donePerc : ch.doneDL;
    });
  });
  return totalAll > 0 ? Math.round((totalDone / totalAll) * 100) : 0;
};

const calculateTimePercentage = (missionStart, missionEnd) => {
  const start = new Date(missionStart);
  const end = new Date(missionEnd);
  const now = new Date();
  const total = end - start;
  const elapsed = now - start;
  return Math.min(100, Math.max(0, Math.round((elapsed / total) * 100)));
};

const calculateChaptersLeft = (syllabus) => {
  let total = 0, done = 0;
  syllabus.forEach(subject => {
    const chapters = subject.hasPapers 
      ? subject.papers.flatMap(p => p.chapters)
      : subject.chapters;
    total += chapters.length;
    done += chapters.filter(ch => ch.isPerc ? ch.donePerc === 100 : ch.doneDL === ch.totalDL).length;
  });
  return { done, left: total - done, total };
};

const calculateClassesLeft = (syllabus) => {
  let total = 0, done = 0;
  syllabus.forEach(subject => {
    const chapters = subject.hasPapers 
      ? subject.papers.flatMap(p => p.chapters)
      : subject.chapters;
    chapters.forEach(ch => {
      if (!ch.isPerc && ch.tracks && ch.tracks.frb) {
        total++;
        if (ch.doneFRB === ch.totalFRB) done++;
      }
    });
  });
  return { done, left: total - done, total };
};

const calculateETA = (syllabusPerc, missionStart, missionEnd) => {
  if (syllabusPerc === 0) return "N/A";
  const start = new Date(missionStart);
  const end = new Date(missionEnd);
  const now = new Date();
  const daysElapsed = Math.round((now - start) / (1000 * 60 * 60 * 24));
  const daysRemaining = Math.round((end - now) / (1000 * 60 * 60 * 24));
  if (syllabusPerc >= 100) return "Complete!";
  const pace = daysElapsed / syllabusPerc;
  const estimatedDaysNeeded = Math.round(pace * 100 - daysElapsed);
  return Math.min(estimatedDaysNeeded, daysRemaining);
};

const toMissionDate = (key) => {
  const [y, m, d] = String(key || "").split("-").map(Number);
  return y && m && d ? new Date(y, m - 1, d) : null;
};

const missionDateKey = (date) => {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
};

  return ch;
};

const chapterPct = (ch) => {
  ch = ensureChapterShape(ch);
  if (ch.viewStyle === 'perc') return Math.round(ch.donePerc || 0);
  // Use highest-priority active track for pct
  for (const t of TRACK_PRIORITY) {
    if (!ch.tracks[t.key]) continue;
    const total = ch[t.total] || 1;
    return Math.round((ch[t.done] / total) * 100);
  }
  return 0;
};

const chapterStatus = (ch) => {
  const p = chapterPct(ch);
  return p >= 95 ? "done" : p >= 5 ? "run" : "pending";
};

// bar/dot color by threshold
const pctColor = (p) => p >= 95 ? "#10b981" : p >= 5 ? "#f59e0b" : "#ef4444";

const d = (a,si,pi,ci) => `data-action="${a}" data-si="${si}" data-pi="${pi}" data-ci="${ci}"`;
const sliderStyle = (done, total, color = "var(--subject-accent,#38bdf8)") => {
  const safeTotal = Math.max(1, Number(total) || 1);
  const pct = Math.max(0, Math.min(100, Math.round(((Number(done) || 0) / safeTotal) * 100)));
  return `style="--slider-pct:${pct}%;--slider-color:${color}"`;
};
