    <button class="quick-delta-btn quick-delta-btn--pos" ${d(action+'-bump',si,pi,ci)} data-delta="1">+1</button>
    <button class="quick-delta-btn quick-delta-btn--pos" ${d(action+'-bump',si,pi,ci)} data-delta="5">+5</button>
  </div>`;

const classSlider = (label, action, done, total, si, pi, ci) => `

      <span class="cls-val" data-val="${action}-${si}-${pi}-${ci}">${done}</span>
      <button class="ch-btn ch-btn--sm" ${d(action+'-inc',si,pi,ci)}>+</button>

      <button class="ch-btn ch-btn--sm cls-total-dec" title="Total -" ${d(action+'-total-dec',si,pi,ci)}>T-</button>
    </div>
    ${quickDeltaButtons(action, si, pi, ci)}
  </div>
  <input class="ch-slider" type="range" min="0" max="${total}" value="${done}" ${d(action+'-slide',si,pi,ci)} ${sliderStyle(done, total)}>`;

  return `
  <div class="ch-plate__inner">
    <div class="ch-meta-row">
      <input class="ch-name-edit" type="text" value="${escapeHtml(ch.name)}" ${d('ch-rename',si,pi,ci)} maxlength="48" spellcheck="false">
      <div class="ch-style-switch" role="group" aria-label="Chapter style">
        <button class="ch-style-option ${isPercView ? 'is-active' : ''}" ${d('set-view-perc',si,pi,ci)}>Percent</button>

    ${isPercView ? `

      </div>
      ${quickDeltaButtons('perc', si, pi, ci)}

const renderChapterRow = (ch, si, pi, ci) => {
  const status = chapterStatus(ch);
  const pct = chapterPct(ch);
  const col = pctColor(pct);
  const uid = `ch-${si}-${pi}-${ci}`;
  return `
  <div class="ch-row ch-row--${status}" data-si="${si}" data-pi="${pi}" data-ci="${ci}" role="button" tabindex="0" aria-expanded="false">
    <div class="ch-row__left">

      <span class="ch-name">${escapeHtml(ch.name)}</span>
    </div>
    <div class="ch-row__right">
      <span class="ch-pct" style="color:${col}">${pct}%</span>
      <svg class="ch-chevron" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,6 8,10 12,6"/></svg>
    </div>
  </div>
  <div class="ch-plate" id="${uid}-plate" hidden>
    ${renderChapterPlate(ch, si, pi, ci)}
  </div>`;
};

const renderChapterBarTip = (ch, index) => {
  ch = ensureChapterShape(ch);
  const rows = [];
  if (ch.viewStyle === "perc") {
    rows.push(["Progress", `${Math.round(ch.donePerc || 0)}%`]);
  } else {
    [
      ["Detailed", "dl", "doneDL", "totalDL"],
      ["Advanced", "adv", "doneAdv", "totalAdv"],
      ["Admission", "adm", "doneAdm", "totalAdm"],
      ["FRB", "frb", "doneFRB", "totalFRB"],
      ["1-Shot", "os", "doneOS", "totalOS"],
    ].forEach(([label, key, doneKey, totalKey]) => {
      if (ch.tracks[key]) rows.push([label, `${ch[doneKey] || 0}/${ch[totalKey] || 1}`]);
    });
  }
  rows.push(["Board Solve", `${ch.solvedQS || 0}/${ch.totalQS || 1}`]);
  return `
    <span class="chapter-bar-tip" role="tooltip">
      <span class="chapter-bar-tip__title">${escapeHtml(ch.name || `Chapter ${index + 1}`)}</span>
      ${rows.map(([label, value]) => `
        <span class="chapter-bar-tip__row">
          <span>${escapeHtml(label)}</span>
          <strong>${escapeHtml(value)}</strong>
        </span>`).join("")}
    </span>`;
};

const renderChapterBars = (chapters) => `
  <div class="chapter-bars">
    ${chapters.map((ch, index) => {
      const pct = chapterPct(ch);
      const status = pct >= 95 ? "done" : pct >= 5 ? "run" : "pending";
      return `<span class="chapter-bar-container" tabindex="0" data-chapter-tip data-ci="${index}" aria-label="${escapeHtml(ch.name)} progress details">
        <span class="chapter-bar chapter-bar--${status}"></span>
        <small>${index + 1}</small>
        ${renderChapterBarTip(ch, index)}
      </span>`;
    }).join('')}
  </div>`;

const paperProgressStats = (chapters = []) => {
  const total = chapters.length;
  const done = chapters.filter(ch => chapterStatus(ch) === "done").length;
  const pct = total ? Math.round(chapters.reduce((sum, ch) => sum + chapterPct(ch), 0) / total) : 0;
  return { total, done, pct };
};

const renderPaperMeter = (paper, si, pi) => {
  const stats = paperProgressStats(paper.chapters);
  return `
    <span class="paper-meter" id="paper-meter-${si}-${pi}" aria-label="${escapeHtml(paper.title || "Paper")} progress ${stats.pct}%">
      <span class="paper-meter__top">
        <span>${stats.done}/${stats.total}</span>
        <strong>${stats.pct}%</strong>
      </span>
      <span class="paper-meter__track"><b style="width:${stats.pct}%"></b></span>
    </span>`;
};

const subjectCard = (subject, index) => {
  const papers = subject.hasPapers
    ? subject.papers
    : [{ title: "Chapters", chapters: subject.chapters }];
  const visual = subjectVisuals[index % subjectVisuals.length];
  const total = countChapters(subject);
  const allChs = papers.flatMap(p => p.chapters);
  const done = allChs.filter(c => chapterStatus(c) === "done").length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  return `
  <article class="subject-card ${subject.hasPapers ? "" : "subject-card--compact"}" data-si="${index}" style="--subject-accent:${visual.accent};--subject-soft:${visual.soft};">
    <div class="subject-card__head">
      <div class="subject-card__identity">
        <span class="subject-icon">${escapeHtml(subject.icon ?? subject.iconLabel)}</span>
        <div>
          <h3 class="subj-title-display" id="subj-title-${index}">${escapeHtml(subject.title)}</h3>
          <p class="subj-prog-text" id="subj-prog-${index}">${done}/${total} chapters · ${pct}%</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="subj-prog-ring">
          <svg viewBox="0 0 36 36" width="40" height="40">
            <circle cx="18" cy="18" r="15" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="3"/>
            <circle cx="18" cy="18" r="15" fill="none" stroke="${visual.accent}" stroke-width="3"
              stroke-dasharray="94.2" stroke-dashoffset="${Math.round(94.2 - (pct / 100) * 94.2)}"
              stroke-linecap="round" transform="rotate(-90 18 18)" id="subj-ring-${index}"/>
          </svg>
          <span class="ring-pct" id="subj-ring-pct-${index}">${pct}%</span>
        </div>
        <button class="subj-settings-btn" data-action="subj-settings-toggle" data-si="${index}" title="Settings">
          ⚙ Settings
        </button>
      </div>
    </div>
    ${subjectSettingsPanel(subject, index)}
    <div class="paper-stack" id="papers-${index}">
      ${papers.map((paper, pi) => renderPaperSection(paper, index, pi)).join("")}
    </div>
  </article>`;
};

const batchOptions = (startYear, endYear, selectedValue) => {
  const normalized = String(selectedValue || "").trim();
  const options = [`<option value="" ${normalized ? "" : "selected"}>N/A</option>`];
  for (let year = startYear; year <= endYear; year += 1) {
    const value = String(year);
    options.push(`<option value="${value}" ${normalized === value ? "selected" : ""}>${value}</option>`);
  }
  return options.join("");
};

const accountField = (id, label, value, placeholder = "") => {
  const meta = ACCOUNT_FIELD_META[id] || { iconName: "circle", color: "#6366f1" };
  const isBatch = id === "sscBatch" || id === "hscBatch";
  const control = isBatch
    ? `<select id="account-${escapeHtml(id)}">${batchOptions(id === "sscBatch" ? 2018 : 2020, 2030, value)}</select>`
    : `<input id="account-${escapeHtml(id)}" type="text" value="${escapeHtml(value || "")}" placeholder="${escapeHtml(placeholder)}" maxlength="80" spellcheck="false">`;
  return `
  <label class="account-field ${id === "customName" || id === "collegeName" ? "account-field--wide" : ""}" style="--account-field-color:${escapeHtml(meta.color)}">
    <span class="account-field__label">${icon(meta.iconName, label)} ${escapeHtml(label)}</span>
    ${control}
  </label>
`;
};

  try {
    return new Date(value).toLocaleString("en-BD", {
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit",
    });
  } catch(_) {
    return String(value);
  }
};

const readVaultBackups = () => {
  try {
    const raw = localStorage.getItem(BACKUP_VAULT_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch(_) {
    return [];
  }
};

const writeVaultBackups = (items) => {
  try { localStorage.setItem(BACKUP_VAULT_KEY, JSON.stringify(items.slice(0, 90))); } catch(_) {}
};

const loadModeSnapshot = (suffix = "") => {
  const modeSuffix = suffix ? `-${suffix}` : "";
  const syl = localStorage.getItem(`${SYL_KEY}${modeSuffix}`);
  const cfg = localStorage.getItem(`${CHRONOS_CFG_KEY}${modeSuffix}`);
  const logs = localStorage.getItem(`${CHRONOS_LOG_KEY}${modeSuffix}`);
  return {
    syllabus: syl ? JSON.parse(syl) : null,
    chronosConfig: cfg ? JSON.parse(cfg) : null,
    studyLogs: logs ? JSON.parse(logs) : null,
  };
};

const createBackupPayload = (reason = "manual") => ({
  version: 1,
  exportedAt: new Date().toISOString(),
  reason,
  app: { ...APP_META },
  activeStudyMode: currentStudyMode(),
  userSettings: scaffoldState.userSettings,
  chatPrefs: chatState.prefs,
  chatProfile: chatState.profile,
  localLogin: readRenderableLoginSession(),
  modes: {
    hsc: loadModeSnapshot(""),
    ssc: loadModeSnapshot("ssc-v1"),
  },
});

const downloadJsonFile = (payload, filenamePrefix = "study-os-backup") => {
  const text = JSON.stringify(payload, null, 2);
  const blob = new Blob([text], { type: "application/json;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${filenamePrefix}-${dateKey(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

const showBackupBanner = (title, detail = "") => {
  if (!scaffoldState.userSettings.autoBackupNotif) return;
  const node = document.getElementById("backupBanner");
  if (!node) return;
  node.hidden = false;
  node.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(detail)}</span>`;
  clearTimeout(showBackupBanner.timer);
  showBackupBanner.timer = setTimeout(() => {
    node.hidden = true;
  }, 3400);
};

const pushVaultEntry = (payload, source = "manual") => {
  const items = readVaultBackups();
  const entry = {
    id: window.crypto?.randomUUID?.() || `vault-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
    createdAt: payload.exportedAt,
    source,
    studyMode: payload.activeStudyMode,
    payload,
  };
  writeVaultBackups([entry, ...items]);
  return entry;
};

const persistBackupSnapshot = (reason = "manual", options = {}) => {
  const payload = createBackupPayload(reason);
  const entry = pushVaultEntry(payload, options.source || reason);
  if (options.downloadJson) downloadJsonFile(payload, "hsc-study-os-backup");
  if (options.showBanner !== false) {
    showBackupBanner(
      options.downloadJson ? "Backup downloaded" : "Vault snapshot saved",
      `${backupDateLabel(entry.createdAt)} • ${entry.studyMode.toUpperCase()} mode`
    );
  }
  return entry;
};

const applyBackupPayload = (payload) => {
  if (!payload || typeof payload !== "object") throw new Error("Invalid backup file.");
  if (!payload.userSettings || !payload.modes?.hsc || !payload.modes?.ssc) throw new Error("Backup structure is incomplete.");
  localStorage.setItem(USER_SETTINGS_KEY, JSON.stringify({ ...defaultUserSettings, ...payload.userSettings }));
  localStorage.setItem(CHAT_PREFS_KEY, JSON.stringify(normalizeChatPrefs(payload.chatPrefs || {})));
  localStorage.setItem(CHAT_PROFILE_KEY, JSON.stringify(payload.chatProfile?.id ? payload.chatProfile : createChatProfile()));
  if (payload.localLogin) {
    localStorage.setItem(LOCAL_LOGIN_KEY, JSON.stringify(payload.localLogin));
    sessionStorage.removeItem(LOCAL_LOGIN_KEY);
  }
  const writeMode = (suffix, modePayload) => {
    const modeSuffix = suffix ? `-${suffix}` : "";
    if (modePayload?.syllabus) localStorage.setItem(`${SYL_KEY}${modeSuffix}`, JSON.stringify(modePayload.syllabus));
    if (modePayload?.chronosConfig) localStorage.setItem(`${CHRONOS_CFG_KEY}${modeSuffix}`, JSON.stringify(modePayload.chronosConfig));
    if (modePayload?.studyLogs) localStorage.setItem(`${CHRONOS_LOG_KEY}${modeSuffix}`, JSON.stringify(modePayload.studyLogs));
  };
  writeMode("", payload.modes.hsc);
  writeMode("ssc-v1", payload.modes.ssc);
  scaffoldState.userSettings = loadUserSettings();
  chatState.prefs = loadChatPrefs();
  chatState.profile = loadChatProfile();
  scaffoldState.graphConfig = { ...defaultGraphConfig };
  scaffoldState.syllabus = createDefaultSyllabus(scaffoldState.userSettings.studyMode);
  restoreSavedSyllabus();
  loadChronosConfig();
  loadStudyLogs();
  mountApp();
};

// ── shared/visual-effects.js ──────────────────────────────────────────────────
const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
const prefersReducedMotion = () => window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const canUseHoverTilt = () => window.matchMedia("(hover: hover) and (pointer: fine)").matches;

const attachCardTilt = () => {
  if (prefersReducedMotion() || !canUseHoverTilt()) return;
  const cards = document.querySelectorAll(".interactive-card");
  cards.forEach((card) => {
    let frame = 0;
    card.addEventListener("pointermove", (event) => {
      if (frame) cancelAnimationFrame(frame);
      frame = requestAnimationFrame(() => {
        const rect = card.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const rotateX = clamp(((y - rect.height / 2) / rect.height) * -10, -7, 7);
        const rotateY = clamp(((x - rect.width / 2) / rect.width) * 10, -7, 7);
        const glowX = clamp((x / rect.width) * 100, 0, 100);
        const glowY = clamp((y / rect.height) * 100, 0, 100);
        card.style.setProperty("--tilt-x", `${rotateX}deg`);
        card.style.setProperty("--tilt-y", `${rotateY}deg`);
        card.style.setProperty("--glow-x", `${glowX}%`);
        card.style.setProperty("--glow-y", `${glowY}%`);
        card.classList.add("is-hovering");
      });
    });
    card.addEventListener("pointerleave", () => {
      if (frame) cancelAnimationFrame(frame);
      frame = 0;
      card.classList.remove("is-hovering");
      card.style.removeProperty("--tilt-x");
      card.style.removeProperty("--tilt-y");
      card.style.removeProperty("--glow-x");
      card.style.removeProperty("--glow-y");
    });

};

const attachScrollReveal = () => {
  const revealNodes = document.querySelectorAll(
    ".hero-strip__content, .unit-section__header, .dashboard-panel, .status-strip, .plain-panel, .analytics-panel, .subject-card, .settings-group, .chat-shell, .account-card, .backup-timeline > div"
  );
  revealNodes.forEach((node, index) => {
    node.classList.add("reveal-ready");
    node.style.setProperty("--reveal-delay", `${Math.min(index * 28, 220)}ms`);
  });
  if (prefersReducedMotion()) {
    revealNodes.forEach((node) => node.classList.add("is-visible"));
    return;
  }
  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add("is-visible");
        observer.unobserve(entry.target);
      });
    },
    { rootMargin: "0px 0px -8% 0px", threshold: 0.12 }
  );
  revealNodes.forEach((node) => observer.observe(node));
};

const attachScrollNav = () => {
  const nav = document.querySelector(".top-nav");
  const navLinks = [...document.querySelectorAll("[data-nav-target]")];
  const sections = navLinks.map((link) => document.getElementById(link.dataset.navTarget)).filter(Boolean);
  if (!nav) return;
  let lastY = window.scrollY;
  let ticking = false;
  const updateNav = () => {
    const currentY = window.scrollY;
    const scrollingDown = currentY > lastY;
    const shouldHide = scrollingDown && currentY > 360 && currentY - lastY > 4;
    nav.classList.toggle("nav-scrolled", currentY > 16);
    nav.classList.toggle("nav-hidden", shouldHide);
    document.documentElement.style.setProperty("--scroll-drift", `${Math.round(currentY * -0.035)}px`);
    let activeId = sections[0]?.id;
    for (const section of sections) {
      const rect = section.getBoundingClientRect();
      if (rect.top <= 120) activeId = section.id;
    }
    navLinks.forEach((link) => {
      link.classList.toggle("is-active", link.dataset.navTarget === activeId);
    });
    lastY = currentY;
    ticking = false;
  };
  window.addEventListener("scroll", () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(updateNav);
  }, { passive: true });
  updateNav();
};

const attachSmoothAnchorOffset = () => {
  document.querySelectorAll('a[href^="#"]').forEach((link) => {
    link.addEventListener("click", (event) => {
      const id = link.getAttribute("href")?.slice(1);
      const target = id ? document.getElementById(id) : null;
      if (!target) return;
      event.preventDefault();
      target.scrollIntoView({ behavior: prefersReducedMotion() ? "auto" : "smooth", block: "start" });
    });
  });
};

const attachSettingsTabs = () => {
  const tabButtons = [...document.querySelectorAll("[data-settings-tab]")];
  const panes = [...document.querySelectorAll("[data-settings-pane]")];
  if (!tabButtons.length || !panes.length) return;
  tabButtons.forEach((button) => {
    button.addEventListener("click", () => {
      const target = button.dataset.settingsTab;
      tabButtons.forEach((item) => item.classList.toggle("settings-tab--active", item === button));
      panes.forEach((pane) => pane.classList.toggle("settings-pane--active", pane.dataset.settingsPane === target));
    });
  });
};

const attachVisualEffects = () => {
  attachScrollReveal();
  attachScrollNav();
  attachSmoothAnchorOffset();
  attachSettingsTabs();
  attachCardTilt();
};

    const raw = localStorage.getItem(LOCAL_LOGIN_KEY) || sessionStorage.getItem(LOCAL_LOGIN_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(_) {
    return null;
  }
};

const writeLocalLoginSession = (session, remember = true) => {
  try {
    const payload = JSON.stringify(session);
    if (remember) {
      localStorage.setItem(LOCAL_LOGIN_KEY, payload);
      sessionStorage.removeItem(LOCAL_LOGIN_KEY);
    } else {
      sessionStorage.setItem(LOCAL_LOGIN_KEY, payload);
      localStorage.removeItem(LOCAL_LOGIN_KEY);
    }
  } catch(_) {}
};

const clearLocalLoginSession = () => {
  try {
    localStorage.removeItem(LOCAL_LOGIN_KEY);
    sessionStorage.removeItem(LOCAL_LOGIN_KEY);
  } catch(_) {}
};

const getLoginDisplayName = (session) => {
  if (!session) return "";
  if (session.mode === "guest") return "Guest";
  if (session.mode === "google") return "Google User";
  const prefix = String(session.email || "").split("@")[0] || "Student";
  return prefix.replace(/[._-]+/g, " ").replace(/\b\w/g, (char) => char.toUpperCase());
};

const applyLocalLoginSession = (session) => {
  if (!session) return;
  const displayName = getLoginDisplayName(session);
  if (displayName && !String(scaffoldState.userSettings.customName || "").trim()) {
    scaffoldState.userSettings.customName = displayName;
    saveUserSettings();
  }
  document.body.classList.remove("login-locked");
  document.body.classList.add("login-ready");
};

const showLoginFeedback = (message) => {

};

const completeLocalLogin = (session, remember = true) => {
  writeLocalLoginSession(session, remember);
  applyLocalLoginSession(session);
  mountApp();
};

  closeSettingsDialog?.();
  closeAccountDialog?.();
  closeBackupDialog?.();
  document.body.classList.add("login-locked");

  if (saved) {

    mountApp();

const requireTripleWarning = (btn, baseLabel, dangerLabel = "Delete") => {
  const step = Math.min(3, parseInt(btn.dataset.confirmStep || "0", 10) + 1);
  if (step < 3) {
    btn.dataset.confirmStep = String(step);
    btn.textContent = `Warning ${step}/3: ${dangerLabel}?`;
    btn.style.background = "rgba(239,68,68,.24)";
    clearTimeout(btn._warnTimer);
    btn._warnTimer = setTimeout(() => {
      btn.dataset.confirmStep = "0";
      btn.textContent = baseLabel;
      btn.style.background = "";
    }, 3000);
    return false;
  }
  btn.dataset.confirmStep = "0";
  btn.textContent = baseLabel;
  btn.style.background = "";
  return true;
};

const refreshChapterRow = (si, pi, ci, fullRender = false) => {
  const ch = getChapter(si, pi, ci);
  if (!ch) return;
  const status = chapterStatus(ch);
  const pct = chapterPct(ch);
  const row = document.querySelector(`.ch-row[data-si="${si}"][data-pi="${pi}"][data-ci="${ci}"]`);
  if (!row) return;
  row.className = `ch-row ch-row--${status}${row.classList.contains("is-open") ? " is-open" : ""}`;
  const nameEl = row.querySelector(".ch-name");
  if (nameEl) nameEl.textContent = ch.name;
  row.querySelector(".ch-dot").style.background = pctColor(pct);
  const pctEl = row.querySelector(".ch-pct");
  pctEl.textContent = pct + "%";
  pctEl.style.color = pctColor(pct);

  const plate = document.getElementById(`ch-${si}-${pi}-${ci}-plate`);
  if (!plate || plate.hidden) return;

  if (fullRender) {
    // Re-render entire plate (track toggle / view style change)
    plate.innerHTML = renderChapterPlate(ch, si, pi, ci);
    return;
  }

  // Fast-path: just update numbers
  const setV = (sel, val) => { const el = plate.querySelector(sel); if (el) el.textContent = val; };
  setV(`[data-val="dl-${si}-${pi}-${ci}"]`,  ch.doneDL);
  setV(`[data-val="adv-${si}-${pi}-${ci}"]`, ch.doneAdv || 0);
  setV(`[data-val="adm-${si}-${pi}-${ci}"]`, ch.doneAdm || 0);
  setV(`[data-val="frb-${si}-${pi}-${ci}"]`, ch.doneFRB);
  setV(`[data-val="os-${si}-${pi}-${ci}"]`,  ch.doneOS);
  setV(`[data-val="qs-${si}-${pi}-${ci}"]`,  ch.solvedQS);
  setV(`[data-val="perc-${si}-${pi}-${ci}"]`, (ch.donePerc || 0) + "%");
  const fill = plate.querySelector(".ch-track__fill");
  if (fill) { fill.style.width = pct + "%"; fill.style.background = pctColor(pct); }
  // Update slider maxes (in case totals changed)
  plate.querySelectorAll("input[type=range]").forEach(sl => {
    const a = sl.dataset.action;
    if (a === 'dl-slide')  { sl.max = ch.totalDL;  sl.value = ch.doneDL; }
    if (a === 'adv-slide') { sl.max = ch.totalAdv; sl.value = ch.doneAdv; }
    if (a === 'adm-slide') { sl.max = ch.totalAdm; sl.value = ch.doneAdm; }
    if (a === 'frb-slide') { sl.max = ch.totalFRB; sl.value = ch.doneFRB; }
    if (a === 'os-slide')  { sl.max = ch.totalOS;  sl.value = ch.doneOS; }
    if (a === 'perc-slide'){ sl.value = ch.donePerc; }
    syncSliderFill(sl);
  });
  // Update total badges
  const updTotal = (action, val) => {
    plate.querySelectorAll(`[${d(action+'-inc',si,pi,ci).slice(5,d(action+'-inc',si,pi,ci).indexOf('"',6))}]`);
    plate.querySelectorAll(".cls-total-val").forEach(el => {
      const row = el.closest(".cls-row,.bq-row");
      if (!row) return;
      if (row.querySelector(`[data-action="${action}-dec"]`)) el.textContent = `(${val})`;
    });
  };
  // Simpler: re-query total labels by position
  plate.querySelectorAll(".cls-row, .bq-row").forEach(row => {
    const dec = row.querySelector("[data-action]");
    if (!dec) return;
    const act = dec.dataset.action;
    const tv = row.querySelector(".cls-total-val");
    if (!tv) return;
    if (act === 'dl-dec')  tv.textContent = `(${ch.totalDL})`;
    if (act === 'adv-dec') tv.textContent = `(${ch.totalAdv})`;
    if (act === 'adm-dec') tv.textContent = `(${ch.totalAdm})`;
    if (act === 'frb-dec') tv.textContent = `(${ch.totalFRB})`;
    if (act === 'os-dec')  tv.textContent = `(${ch.totalOS})`;
    if (act === 'qs-dec')  tv.textContent = `(${ch.totalQS})`;
  });
  if (ch.viewStyle === 'perc') {
    const v = plate.querySelector(".cls-val");
    if (v) v.textContent = (ch.donePerc || 0) + "%";
  }
};

const refreshSubjectRing = (si) => {
  const subj = scaffoldState.syllabus[si];
  const papers = subj.hasPapers ? subj.papers : [{ chapters: subj.chapters }];
  const allChs = papers.flatMap(p => p.chapters);
  const total = allChs.length;
  const done = allChs.filter(c => chapterStatus(c) === "done").length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const progText = document.getElementById(`subj-prog-${si}`);
  if (progText) progText.textContent = `${done}/${total} chapters · ${pct}%`;
  const ring = document.getElementById(`subj-ring-${si}`);
  if (ring) ring.setAttribute("stroke-dashoffset", Math.round(94.2 - (pct / 100) * 94.2));
  const ringPct = document.getElementById(`subj-ring-pct-${si}`);
  if (ringPct) ringPct.textContent = pct + "%";
  papers.forEach((paper, pi) => {
    const stats = paperProgressStats(paper.chapters);
    const meter = document.getElementById(`paper-meter-${si}-${pi}`);
    if (!meter) return;
    const count = meter.querySelector(".paper-meter__top span");
    const value = meter.querySelector(".paper-meter__top strong");
    const fill = meter.querySelector(".paper-meter__track b");
    if (count) count.textContent = `${stats.done}/${stats.total}`;
    if (value) value.textContent = stats.pct + "%";
    if (fill) fill.style.width = stats.pct + "%";
  });
  // refresh mini bars
  const card = document.querySelector(`.subject-card[data-si="${si}"]`);
  if (card) {
    const bars = card.querySelectorAll(".chapter-bar");
    const containers = card.querySelectorAll(".chapter-bar-container");
    allChs.forEach((ch, i) => {
      if (!bars[i]) return;
      const p = chapterPct(ch);
      bars[i].className = `chapter-bar chapter-bar--${p >= 95 ? 'done' : p >= 5 ? 'run' : 'pending'}`;
      const tip = containers[i]?.querySelector(".chapter-bar-tip");
      if (tip) tip.outerHTML = renderChapterBarTip(ch, parseInt(containers[i].dataset.ci || i));
    });
  }
};

// Restore saved syllabus on boot and mode change
const restoreSavedSyllabus = () => {
  const saved = loadSyllabus();
  if (!saved) return;
  // Merge saved progress into default structure (keeps structure, restores progress)
  saved.forEach((savedSubj, si) => {
    const subj = scaffoldState.syllabus[si];
    if (!subj) {
      scaffoldState.syllabus[si] = savedSubj;
      const added = scaffoldState.syllabus[si];
      const addedPapers = added.hasPapers ? added.papers : [{ chapters: added.chapters }];
      addedPapers.forEach(p => p.chapters?.forEach(ensureChapterShape));
      return;
    }
    if (savedSubj.defaultTracks) subj.defaultTracks = savedSubj.defaultTracks;
    if (savedSubj.title) subj.title = savedSubj.title;
    if (savedSubj.icon) subj.icon = savedSubj.icon;
    if (savedSubj.iconLabel) subj.iconLabel = savedSubj.iconLabel;
    const savedPapers = savedSubj.hasPapers ? savedSubj.papers : [{ chapters: savedSubj.chapters }];
    const livePapers  = subj.hasPapers ? subj.papers : [{ chapters: subj.chapters }];
    savedPapers.forEach((sp, pi) => {
      if (!livePapers[pi]) return;
      sp.chapters?.forEach((sch, ci) => {
        const lch = livePapers[pi].chapters[ci];
        if (!lch) {
          livePapers[pi].chapters[ci] = sch;
          ensureChapterShape(livePapers[pi].chapters[ci]);
          return;
        }
        ensureChapterShape(lch);
        lch.name = sch.name ?? lch.name;
        lch.isPerc = sch.isPerc ?? lch.isPerc;
        lch.viewStyle = sch.viewStyle ?? lch.viewStyle;
        lch.donePerc = sch.donePerc ?? lch.donePerc;
        lch.doneDL  = sch.doneDL  ?? lch.doneDL;  lch.totalDL  = sch.totalDL  ?? lch.totalDL;
        lch.doneAdv = sch.doneAdv ?? lch.doneAdv; lch.totalAdv = sch.totalAdv ?? lch.totalAdv;
        lch.doneAdm = sch.doneAdm ?? lch.doneAdm; lch.totalAdm = sch.totalAdm ?? lch.totalAdm;
        lch.doneFRB = sch.doneFRB ?? lch.doneFRB; lch.totalFRB = sch.totalFRB ?? lch.totalFRB;
        lch.doneOS  = sch.doneOS  ?? lch.doneOS;  lch.totalOS  = sch.totalOS  ?? lch.totalOS;
        lch.solvedQS = sch.solvedQS ?? lch.solvedQS; lch.totalQS = sch.totalQS ?? lch.totalQS;
        if (sch.tracks) lch.tracks = { ...lch.tracks, ...sch.tracks };
      });
    });
  });
};

const renderMissionCalendar = (field) => {
  const ids = missionFieldIds(field);
  const picker = document.getElementById(ids.picker);
  const input = document.getElementById(ids.input);
  if (!picker || !input) return;
  const selected = input.value;
  const selectedDate = toMissionDate(selected) || new Date();
  const viewDate = missionPickerState[field] || new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
  missionPickerState[field] = viewDate;
  const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
  const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
  const visibleDays = Math.ceil((first.getDay() + daysInMonth) / 7) * 7;
  const start = new Date(first);
  start.setDate(first.getDate() - first.getDay());
  const todayKey = missionDateKey(new Date());
  const days = Array.from({ length: visibleDays }, (_, i) => {
    const date = new Date(start);
    date.setDate(start.getDate() + i);
    const key = missionDateKey(date);
    const classes = [
      "mission-day",
      date.getMonth() !== viewDate.getMonth() ? "is-muted" : "",
      key === todayKey ? "is-today" : "",
      key === selected ? "is-selected" : "",
    ].filter(Boolean).join(" ");
    return `<button class="${classes}" type="button" data-action="mission-select-date" data-field="${field}" data-date="${key}">${date.getDate()}</button>`;
  }).join("");
  picker.innerHTML = `
    <div class="mission-picker__head">
      <button class="mission-picker__nav" type="button" data-action="mission-month" data-field="${field}" data-dir="-1">‹</button>
      <div class="mission-picker__title">${escapeHtml(missionMonthLabel(viewDate))}</div>
      <button class="mission-picker__nav" type="button" data-action="mission-month" data-field="${field}" data-dir="1">›</button>
    </div>
    <div class="mission-picker__week">
      ${["Su","Mo","Tu","We","Th","Fr","Sa"].map(day => `<span>${day}</span>`).join("")}
    </div>
    <div class="mission-picker__grid">${days}</div>
    <div class="mission-picker__foot">
      <button class="mission-picker__mini" type="button" data-action="mission-clear" data-field="${field}">Clear</button>
      <button class="mission-picker__mini" type="button" data-action="mission-today" data-field="${field}">Today</button>
    </div>
  `;
};

const openMissionCalendar = (field) => {
  closeMissionCalendars();
  const ids = missionFieldIds(field);
  const input = document.getElementById(ids.input);
  const display = document.getElementById(ids.display);
  const picker = document.getElementById(ids.picker);
  const date = toMissionDate(input?.value) || new Date();
  missionPickerState[field] = new Date(date.getFullYear(), date.getMonth(), 1);
  renderMissionCalendar(field);
  picker?.removeAttribute("hidden");
  display?.classList.add("is-open");
};

document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-action]");
  const action = btn?.dataset?.action;
  const chapterTipTarget = e.target.closest("[data-chapter-tip]");
  if (chapterTipTarget) {
    const wasOpen = chapterTipTarget.classList.contains("is-tip-open");
    document.querySelectorAll(".chapter-bar-container.is-tip-open").forEach(el => {
      if (el !== chapterTipTarget) el.classList.remove("is-tip-open");
    });
    chapterTipTarget.classList.toggle("is-tip-open", !wasOpen);
    return;
  }
  document.querySelectorAll(".chapter-bar-container.is-tip-open").forEach(el => el.classList.remove("is-tip-open"));

  if (action === "mission-toggle-calendar") {
    const field = btn.dataset.field;
    const ids = missionFieldIds(field);
    const picker = document.getElementById(ids.picker);
    if (picker && !picker.hidden) {
      closeMissionCalendars();
    } else {
      openMissionCalendar(field);
    }
    return;
  }

  if (action === "mission-month") {
    const field = btn.dataset.field;
    const dir = parseInt(btn.dataset.dir, 10) || 0;
    const current = missionPickerState[field] || new Date();
    missionPickerState[field] = new Date(current.getFullYear(), current.getMonth() + dir, 1);
    renderMissionCalendar(field);
    return;
  }

  if (action === "mission-select-date") {
    const field = btn.dataset.field;
    setMissionDateValue(field, btn.dataset.date);
    closeMissionCalendars();
    const error = document.getElementById("missionError");
    if (error) error.textContent = "";
    return;
  }

  if (action === "mission-clear") {
    setMissionDateValue(btn.dataset.field, "");
    closeMissionCalendars();
    return;
  }

  if (action === "mission-today") {
    const field = btn.dataset.field;
    setMissionDateValue(field, missionDateKey(new Date()));
    closeMissionCalendars();
    return;
  }

  if (action === "open-mission-settings") {
    const modal = document.getElementById("missionModal");
    const error = document.getElementById("missionError");
    setMissionDateValue("start", scaffoldState.userSettings.missionStart);
    setMissionDateValue("end", scaffoldState.userSettings.missionEnd);
    closeMissionCalendars();
    if (error) error.textContent = "";
    if (modal) modal.hidden = false;
    return;
  }

  if (action === "close-mission-settings") {
    const modal = document.getElementById("missionModal");
    closeMissionCalendars();
    if (modal) modal.hidden = true;
    return;
  }

  if (action === "save-mission-settings") {
    const start = document.getElementById("missionStartInput")?.value;
    const end = document.getElementById("missionEndInput")?.value;
    const error = document.getElementById("missionError");
    if (!start || !end) {
      if (error) error.textContent = "Start and end date are required.";
      return;
    }
    if (new Date(start) > new Date(end)) {
      if (error) error.textContent = "End date must be after start date.";
      return;
    }
    scaffoldState.userSettings.missionStart = start;
    scaffoldState.userSettings.missionEnd = end;
    saveUserSettings();
    mountApp();
    return;
  }

  // Subject settings toggle
  if (action === "subj-settings-toggle") {
    const si = btn.dataset.si;
    const panel = document.getElementById(`subj-settings-${si}`);
    if (panel) { panel.hidden = !panel.hidden; btn.classList.toggle("active", !panel.hidden); }
    return;
  }

  // Add a new subject from main settings
  if (action === "add-subject") {
    const nameInput = document.getElementById("newSubjectName");
    const modeInput = document.getElementById("newSubjectMode");
    const title = (nameInput?.value || "").trim();
    if (!title) {
      btn.textContent = "Name required";
      setTimeout(() => btn.textContent = "Add Subject", 1200);
      return;
    }
    const mode = modeInput?.value || "papers";
    const subject = mode === "single"
      ? createSubject({ title, icon: "S", hasPapers: false, chapters: [createTrackedChapter("Chapter 1")] })
      : createSubject({ title, icon: "S", hasPapers: true, papers: [
          { title: "1st Paper", chapters: [createTrackedChapter("Chapter 1")] },
          { title: "2nd Paper", chapters: [createTrackedChapter("Chapter 1")] },
        ]});
    scaffoldState.syllabus.push(subject);
    saveSyllabus(scaffoldState.syllabus);
    refreshSyllabusGrid();
    nameInput.value = "";
    btn.textContent = "Added";
    setTimeout(() => btn.textContent = "Add Subject", 1200);
    return;
  }

  if (action === "subj-clone") {
    const si = parseInt(btn.dataset.si, 10);
    const subj = scaffoldState.syllabus[si];
    if (!subj) return;
    if (!requireTripleWarning(btn, "Clone subject", "Clone subject")) return;
    scaffoldState.syllabus.splice(si + 1, 0, cloneSubjectData(subj));
    saveSyllabus(scaffoldState.syllabus);
    refreshSyllabusGrid();
    return;
  }

  if (action === "subj-reset-subject") {
    const si = parseInt(btn.dataset.si, 10);
    const subj = scaffoldState.syllabus[si];
    if (!subj) return;
    if (!requireTripleWarning(btn, "Reset subject", "Reset subject")) return;
    getSubjectPapers(subj).forEach(paper => {
      (paper.chapters || []).forEach(resetChapterProgress);
    });
    saveSyllabus(scaffoldState.syllabus);
    refreshSyllabusGrid();
    return;
  }

  if (action === "subj-apply-defaults-all") {
    const si = parseInt(btn.dataset.si, 10);
    const subj = scaffoldState.syllabus[si];
    if (!subj) return;
    if (!requireTripleWarning(btn, "Apply default all", "Apply defaults to subject")) return;
    const def = subj.defaultTracks || { dl: true, adv: false, adm: false, frb: false, os: false };
    getSubjectPapers(subj).forEach((paper, pi) => {
      (paper.chapters || []).forEach((ch, ci) => {
        if (!ch.isPerc) {
          ch.tracks = { ...def };
          refreshChapterRow(si, pi, ci, true);
        }
      });
    });
    saveSyllabus(scaffoldState.syllabus);
    refreshSyllabusGrid();
    return;
  }

  if (action === "subj-delete") {
    const si = parseInt(btn.dataset.si, 10);
    if (scaffoldState.syllabus.length <= 1) {
      btn.textContent = "Keep 1 subject";
      setTimeout(() => { btn.textContent = "Delete subject"; }, 1400);
      return;
    }
    if (!requireTripleWarning(btn, "Delete subject", "Delete subject")) return;
    scaffoldState.syllabus.splice(si, 1);
    saveSyllabus(scaffoldState.syllabus);
    refreshSyllabusGrid();
    return;
  }

  // Apply default tracks to all chapters in a paper
  if (action === "subj-apply-defaults") {
    const si = parseInt(btn.dataset.si), pi = parseInt(btn.dataset.pi);
    const subj = scaffoldState.syllabus[si];
    const def = subj.defaultTracks || { dl: true, adv: false, adm: false, frb: false, os: false };
    const papers = subj.hasPapers ? subj.papers : [{ chapters: subj.chapters }];
    const chs = papers[pi]?.chapters || [];
    chs.forEach((ch, ci) => {
      if (!ch.isPerc) { ch.tracks = { ...def }; refreshChapterRow(si, pi, ci, true); }
    });
    saveSyllabus(scaffoldState.syllabus);
    btn.textContent = "✓ Applied!";
    setTimeout(() => btn.textContent = "Apply defaults", 1500);
    return;
  }

  // Add/remove chapters from subject settings
  if (action === "subj-add-chapter") {
    const si = parseInt(btn.dataset.si), pi = parseInt(btn.dataset.pi);
    const subj = scaffoldState.syllabus[si];
    const paper = getPaper(si, pi);
    if (!subj || !paper) return;
    const next = (paper.chapters?.length || 0) + 1;
    const newChapter = makeChapterLike(paper, `Chapter ${next}`);
    if (!newChapter.isPerc) newChapter.tracks = { ...(subj.defaultTracks || newChapter.tracks) };
    paper.chapters.push(newChapter);
    saveSyllabus(scaffoldState.syllabus);
    refreshSyllabusGrid();
    return;
  }

  if (action === "subj-remove-last-chapter") {
    const si = parseInt(btn.dataset.si), pi = parseInt(btn.dataset.pi);
    const paper = getPaper(si, pi);
    if (!paper?.chapters?.length) return;
    if (paper.chapters.length <= 1) {
      btn.textContent = "Keep 1 chapter";
      setTimeout(() => btn.textContent = "Remove last", 1400);
      return;
    }
    if (!requireTripleWarning(btn, "Remove last", "Remove last chapter")) return;
    paper.chapters.pop();
    saveSyllabus(scaffoldState.syllabus);
    refreshSyllabusGrid();
    return;
  }

  // Toggle paper section open/close
  const paperToggle = e.target.closest("[data-paper-toggle]");
  if (paperToggle) {
    const { si, pi } = paperToggle.dataset;
    const section = paperToggle.closest(".paper-section");
    const list = document.getElementById(`paper-${si}-${pi}-chapters`);
    if (!list) return;
    const opening = list.hidden;
    list.hidden = !opening;
    section?.classList.toggle("is-open", opening);
    paperToggle.setAttribute("aria-expanded", String(opening));
    return;
  }

  // Toggle chapter row open/close
  const row = e.target.closest(".ch-row");
  if (row && !e.target.closest(".ch-plate")) {
    const { si, pi, ci } = row.dataset;
    const plate = document.getElementById(`ch-${si}-${pi}-${ci}-plate`);
    if (!plate) return;
    const opening = plate.hidden;
    plate.hidden = !opening;
    row.classList.toggle("is-open", opening);
    row.setAttribute("aria-expanded", String(opening));
    return;
  }

  if (!btn) return;
  const { si, pi, ci } = btn.dataset;
  const s = parseInt(si), p = parseInt(pi), c = parseInt(ci);

  if (action === "ch-remove") {
    const paper = getPaper(s, p);
    if (!paper?.chapters?.[c]) return;
    if (paper.chapters.length <= 1) {
      btn.textContent = "Keep 1 chapter";
      setTimeout(() => btn.textContent = "Remove Chapter", 1400);
      return;
    }
    const chapterName = paper.chapters[c].name || `Chapter ${c + 1}`;
    if (!requireTripleWarning(btn, "Remove Chapter", `Remove ${chapterName}`)) return;
    paper.chapters.splice(c, 1);
    saveSyllabus(scaffoldState.syllabus);
    refreshSyllabusGrid();
    return;
  }

  if (action.endsWith("-bump")) {
    const base = action.replace("-bump", "");
    const delta = parseInt(btn.dataset.delta || "0", 10) || 0;
    const bumpDone = (doneKey, totalKey) => mutateFull(s,p,c, ch => {
      const total = Math.max(1, Number(ch[totalKey]) || 1);
      ch[doneKey] = Math.max(0, Math.min(total, (Number(ch[doneKey]) || 0) + delta));
    });
    if (base === "dl") bumpDone("doneDL", "totalDL");
    if (base === "adv") bumpDone("doneAdv", "totalAdv");
    if (base === "adm") bumpDone("doneAdm", "totalAdm");
    if (base === "frb") bumpDone("doneFRB", "totalFRB");
    if (base === "os") bumpDone("doneOS", "totalOS");
    if (base === "qs") bumpDone("solvedQS", "totalQS");
    if (base === "perc") mutateFull(s,p,c, ch => {
      ch.donePerc = Math.max(0, Math.min(100, (Number(ch.donePerc) || 0) + delta));
    });
    return;
  }

  // Class counts
  if (action === "dl-inc")  mutateFull(s,p,c, ch => { ch.doneDL  = Math.min(ch.totalDL,  ch.doneDL  + 1); });
  if (action === "dl-dec")  mutateFull(s,p,c, ch => { ch.doneDL  = Math.max(0, ch.doneDL  - 1); });
  if (action === "adv-inc") mutateFull(s,p,c, ch => { ch.doneAdv = Math.min(ch.totalAdv, (ch.doneAdv||0) + 1); });
  if (action === "adv-dec") mutateFull(s,p,c, ch => { ch.doneAdv = Math.max(0, (ch.doneAdv||0) - 1); });
  if (action === "adm-inc") mutateFull(s,p,c, ch => { ch.doneAdm = Math.min(ch.totalAdm, (ch.doneAdm||0) + 1); });
  if (action === "adm-dec") mutateFull(s,p,c, ch => { ch.doneAdm = Math.max(0, (ch.doneAdm||0) - 1); });
  if (action === "frb-inc") mutateFull(s,p,c, ch => { ch.doneFRB = Math.min(ch.totalFRB, ch.doneFRB + 1); });
  if (action === "frb-dec") mutateFull(s,p,c, ch => { ch.doneFRB = Math.max(0, ch.doneFRB - 1); });
  if (action === "os-inc")  mutateFull(s,p,c, ch => { ch.doneOS  = Math.min(ch.totalOS,  ch.doneOS  + 1); });
  if (action === "os-dec")  mutateFull(s,p,c, ch => { ch.doneOS  = Math.max(0, ch.doneOS  - 1); });

  // Total adjustments
  if (action === "dl-total-inc")  mutateFull(s,p,c, ch => { ch.totalDL++; });
  if (action === "dl-total-dec")  mutateFull(s,p,c, ch => { ch.totalDL  = Math.max(1, ch.totalDL  - 1); ch.doneDL  = Math.min(ch.doneDL,  ch.totalDL); });
  if (action === "adv-total-inc") mutateFull(s,p,c, ch => { ch.totalAdv = (ch.totalAdv||0) + 1; });
  if (action === "adv-total-dec") mutateFull(s,p,c, ch => { ch.totalAdv = Math.max(1, (ch.totalAdv||1) - 1); ch.doneAdv = Math.min(ch.doneAdv||0, ch.totalAdv); });
  if (action === "adm-total-inc") mutateFull(s,p,c, ch => { ch.totalAdm = (ch.totalAdm||0) + 1; });
  if (action === "adm-total-dec") mutateFull(s,p,c, ch => { ch.totalAdm = Math.max(1, (ch.totalAdm||1) - 1); ch.doneAdm = Math.min(ch.doneAdm||0, ch.totalAdm); });
  if (action === "frb-total-inc") mutateFull(s,p,c, ch => { ch.totalFRB++; });
  if (action === "frb-total-dec") mutateFull(s,p,c, ch => { ch.totalFRB = Math.max(1, ch.totalFRB - 1); ch.doneFRB = Math.min(ch.doneFRB, ch.totalFRB); });
  if (action === "os-total-inc")  mutateFull(s,p,c, ch => { ch.totalOS++; });
  if (action === "os-total-dec")  mutateFull(s,p,c, ch => { ch.totalOS  = Math.max(1, ch.totalOS  - 1); ch.doneOS  = Math.min(ch.doneOS,  ch.totalOS); });

  // Board Qs
  if (action === "qs-inc")       mutateFull(s,p,c, ch => { ch.solvedQS = Math.min(ch.totalQS, ch.solvedQS + 1); });
  if (action === "qs-dec")       mutateFull(s,p,c, ch => { ch.solvedQS = Math.max(0, ch.solvedQS - 1); });
  if (action === "qs-total-inc") mutateFull(s,p,c, ch => { ch.totalQS++; });
  if (action === "qs-total-dec") mutateFull(s,p,c, ch => { ch.totalQS = Math.max(1, ch.totalQS - 1); ch.solvedQS = Math.min(ch.solvedQS, ch.totalQS); });

  // Percentage steppers (for isPerc chapters)
  if (action === "perc-inc") mutateFull(s,p,c, ch => { ch.donePerc = Math.min(100, (ch.donePerc||0) + 5); });
  if (action === "perc-dec") mutateFull(s,p,c, ch => { ch.donePerc = Math.max(0,   (ch.donePerc||0) - 5); });

  // Toggle view style (class ↔ perc)
  if (action === "toggle-view") mutateStruct(s,p,c, ch => { ch.viewStyle = ch.viewStyle === "perc" ? "class" : "perc"; });
  if (action === "set-view-perc") mutateStruct(s,p,c, ch => { ch.viewStyle = "perc"; ch.isPerc = true; });
  if (action === "set-view-class") mutateStruct(s,p,c, ch => { ensureChapterShape(ch); ch.viewStyle = "class"; ch.isPerc = false; });

  // Track checkboxes — handled in change event below
  // Complete / Reset
  if (action === "ch-complete") mutateFull(s,p,c, ch => {
    ch.doneDL = ch.totalDL; ch.doneAdv = ch.totalAdv; ch.doneAdm = ch.totalAdm;
    ch.doneFRB = ch.totalFRB; ch.doneOS = ch.totalOS; ch.donePerc = 100;
  });
  if (action === "ch-reset") {
    if (btn.dataset.confirm !== "1") {
      btn.dataset.confirm = "1"; btn.textContent = "⚠ Sure? Click again"; btn.style.background = "rgba(239,68,68,.3)";
      setTimeout(() => { if(btn.dataset.confirm==="1"){btn.dataset.confirm="0";btn.textContent="↺ Reset";btn.style.background="";} }, 2500);
    } else {
      mutateFull(s,p,c, ch => { ch.doneDL=0;ch.doneAdv=0;ch.doneAdm=0;ch.doneFRB=0;ch.doneOS=0;ch.donePerc=0;ch.solvedQS=0; });
      btn.dataset.confirm="0"; btn.textContent="↺ Reset"; btn.style.background="";
    }
  }
});

document.addEventListener("change", (e) => {
  const chk = e.target.closest("input[type=checkbox][data-action]");
  if (chk) {
    const { action, si, pi, ci, track } = chk.dataset;
    const keyMap = { 'track-dl':'dl','track-adv':'adv','track-adm':'adm','track-frb':'frb','track-os':'os' };
    if (keyMap[action]) {
      mutateStruct(parseInt(si), parseInt(pi), parseInt(ci), ch => { ch.tracks[keyMap[action]] = chk.checked; });
    } else if (action === "subj-def-track") {
      const subj = scaffoldState.syllabus[parseInt(si)];
      if (!subj.defaultTracks) subj.defaultTracks = { dl:true, adv:false, adm:false, frb:false, os:false };
      subj.defaultTracks[track] = chk.checked;
      saveSyllabus(scaffoldState.syllabus);
    }
  }
});

document.addEventListener("input", (e) => {
  const progressColorInput = e.target.closest("#col_done, #col_run, #col_pend");
  if (progressColorInput) {
    if (progressColorInput.id === "col_done") scaffoldState.userSettings.barColors.done = progressColorInput.value;
    if (progressColorInput.id === "col_run") scaffoldState.userSettings.barColors.running = progressColorInput.value;
    if (progressColorInput.id === "col_pend") scaffoldState.userSettings.barColors.pending = progressColorInput.value;
    applyUserThemeSettings();
    saveUserSettings();
    return;
  }
  // Subject rename
  const inp = e.target.closest("input[data-action='subj-rename']");
  if (inp) {
    const si = parseInt(inp.dataset.si);
    scaffoldState.syllabus[si].title = inp.value;
    const titleEl = document.getElementById(`subj-title-${si}`);
    if (titleEl) titleEl.textContent = inp.value;
    saveSyllabus(scaffoldState.syllabus);
    return;
  }
  // Chapter rename
  const chapterNameInput = e.target.closest("input[data-action='ch-rename']");
  if (chapterNameInput) {
    const { si, pi, ci } = chapterNameInput.dataset;
    mutateCh(parseInt(si), parseInt(pi), parseInt(ci), ch => { ch.name = chapterNameInput.value || "Chapter"; });
    return;
  }
  // Range sliders
  const sl = e.target.closest("input[type=range][data-action]");
  if (!sl) return;
  const { action, si, pi, ci } = sl.dataset;
  const s = parseInt(si), p = parseInt(pi), c = parseInt(ci);
  const v = parseInt(sl.value);
  syncSliderFill(sl);
  if (action === "dl-slide")   mutateFull(s,p,c, ch => { ch.doneDL   = v; });
  if (action === "adv-slide")  mutateFull(s,p,c, ch => { ch.doneAdv  = v; });
  if (action === "adm-slide")  mutateFull(s,p,c, ch => { ch.doneAdm  = v; });
  if (action === "frb-slide")  mutateFull(s,p,c, ch => { ch.doneFRB  = v; });
  if (action === "os-slide")   mutateFull(s,p,c, ch => { ch.doneOS   = v; });
  if (action === "perc-slide") mutateFull(s,p,c, ch => { ch.donePerc = v; });
});

// ── Chronos Analytics Engine ─────────────────────────────────────────────────
const CHRONOS_LOG_KEY = "hsc-chronos-study-logs-v1";
const CHRONOS_CFG_KEY = "hsc-chronos-graph-config-v1";

let studyLogs = {};
let chronosChart = null;
let isGraphEditMode = false;
let chronosLiveVisible = false;
let chronosActiveEdit = null;
const chronosScrollState = {
  hasManualPosition: false,
  scrollLeft: 0,
  isApplying: false,
};

const CHRONOS_SERIES_COLORS = {
  class: "#ef4444",
  total: "#0ea5e9",
};

const chronosDatasets = {
  class: { label: "Online Class", field: "classMins", color: CHRONOS_SERIES_COLORS.class },
  total: { label: "Total Study",  field: "totalMins", color: CHRONOS_SERIES_COLORS.total },
};

const pad2 = (n) => String(n).padStart(2, "0");
const dateKey = (date) => `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
const dateLabel = (key) => {
  const [y, m, d] = key.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("en-US", { month: "short", day: "numeric" });
};
const minsToHours = (mins) => Math.round((mins / 60) * 100) / 100;
const hoursToMins = (hours) => Math.max(0, Math.round((hours * 60) / 5) * 5);
const chronosVisProp = (datasetKey) => `vis${datasetKey[0].toUpperCase()}${datasetKey.slice(1)}`;
const isChronosDatasetVisible = (datasetKey) => scaffoldState.graphConfig[chronosVisProp(datasetKey)] !== false;
const normalizeChronosVisibility = () => {
  ["class", "total"].forEach(key => {
    const prop = chronosVisProp(key);
    if (typeof scaffoldState.graphConfig[prop] !== "boolean") scaffoldState.graphConfig[prop] = true;
  });
};
const formatMins = (mins) => {
  const safe = Math.max(0, Math.round(mins || 0));
  const h = Math.floor(safe / 60);
  const m = safe % 60;
  if (!h) return `${m}m`;
  if (!m) return `${h}h`;
  return `${h}h ${m}m`;
};

const chronosDates = () => {
  const days = Math.max(3, parseInt(scaffoldState.graphConfig.daysToLoad, 10) || 15);
  const end = new Date();
  end.setHours(0, 0, 0, 0);
  return Array.from({ length: days }, (_, i) => {
    const d = new Date(end);
    d.setDate(end.getDate() - (days - 1 - i));
    return dateKey(d);
  });
};

const createSeedLogs = () => {
  const logs = {};
  const keys = chronosDates();
  keys.forEach((key, i) => {
    const classCurve = [0,0,0,0,0,490,675,690,350,0,0,0,0,0,0][Math.max(0, 15 - keys.length + i)] || 0;
    const totalCurve = classCurve ? classCurve + (i % 2 ? 60 : 90) : (i % 6 === 2 ? 120 : 0);
    const classMins = classCurve;
    logs[key] = { classMins, totalMins: totalCurve };
  });
  return logs;
};

const loadChronosConfig = () => {
  try {
    const raw = localStorage.getItem(modeScopedKey(CHRONOS_CFG_KEY));
    if (raw) scaffoldState.graphConfig = { ...scaffoldState.graphConfig, ...JSON.parse(raw) };
  } catch(_) {}
  normalizeChronosVisibility();
};

const saveChronosConfig = () => {
  try { localStorage.setItem(modeScopedKey(CHRONOS_CFG_KEY), JSON.stringify(scaffoldState.graphConfig)); } catch(_) {}
};

const loadStudyLogs = () => {
  try {
    const raw = localStorage.getItem(modeScopedKey(CHRONOS_LOG_KEY));
    studyLogs = raw ? JSON.parse(raw) : createSeedLogs();
  } catch(_) {
    studyLogs = createSeedLogs();
  }
  chronosDates().forEach(key => {
    if (!studyLogs[key]) studyLogs[key] = { classMins: 0, totalMins: 0 };
    delete studyLogs[key].studyMins;
    if (typeof studyLogs[key].classMins !== "number") studyLogs[key].classMins = 0;
    if (typeof studyLogs[key].totalMins !== "number") studyLogs[key].totalMins = 0;
  });
  saveStudyLogs();
};

const saveStudyLogs = () => {
  try { localStorage.setItem(modeScopedKey(CHRONOS_LOG_KEY), JSON.stringify(studyLogs)); } catch(_) {}
};

const setLogMinutes = (key, datasetKey, mins) => {
  if (!studyLogs[key]) studyLogs[key] = { classMins: 0, totalMins: 0 };
  const field = chronosDatasets[datasetKey].field;
  studyLogs[key][field] = Math.max(0, Math.round(mins / 5) * 5);
  saveStudyLogs();
};

const getChronosDataset = (datasetKey, keys) => {
  const cfg = chronosDatasets[datasetKey];
  return {
    label: cfg.label,
    chronosKey: datasetKey,
    data: keys.map(key => minsToHours(studyLogs[key]?.[cfg.field] || 0)),
    borderColor: cfg.color,
    backgroundColor: cfg.color,
    pointBackgroundColor: cfg.color,
    pointBorderColor: "#f8fafc",
    pointBorderWidth: 2,
    pointRadius: 5.2,
    pointHoverRadius: 7,
    pointHitRadius: 26,
    borderWidth: 2.8,
    tension: 0,
    hidden: !isChronosDatasetVisible(datasetKey),
    dragData: true,
  };
};

const updateChronosWidth = () => {
  const wrap = document.getElementById("chronosCanvasWrap");
  if (!wrap) return;
  const days = Math.max(3, parseInt(scaffoldState.graphConfig.daysToLoad, 10) || 15);
  const view = window.innerWidth < 760
    ? Math.max(3, parseInt(scaffoldState.graphConfig.mobDaysView, 10) || 7)
    : Math.max(3, parseInt(scaffoldState.graphConfig.pcDaysView, 10) || 15);
  wrap.style.width = `${Math.max(100, Math.ceil((days / view) * 100))}%`;
};

const applyChronosScrollPosition = (forceLatest = false) => {
  const scroll = document.getElementById("chronosScroll");
  if (!scroll) return;
  requestAnimationFrame(() => {
    const maxScroll = Math.max(0, scroll.scrollWidth - scroll.clientWidth);
    const nextLeft = forceLatest || !chronosScrollState.hasManualPosition
      ? maxScroll
      : Math.min(chronosScrollState.scrollLeft, maxScroll);
    chronosScrollState.isApplying = true;
    scroll.scrollLeft = nextLeft;
    chronosScrollState.scrollLeft = scroll.scrollLeft;
    requestAnimationFrame(() => {
      chronosScrollState.isApplying = false;
    });
  });
};

const attachChronosScrollTracking = () => {
  const scroll = document.getElementById("chronosScroll");
  if (!scroll || scroll.dataset.bound === "true") return;
  scroll.dataset.bound = "true";
  scroll.addEventListener("scroll", () => {
    if (chronosScrollState.isApplying) return;
    chronosScrollState.hasManualPosition = true;
    chronosScrollState.scrollLeft = scroll.scrollLeft;
  }, { passive: true });
};

const buildChronosChartData = () => {
  const keys = chronosDates();
  return {
    keys,
    labels: keys.map(dateLabel),
    datasets: ["class", "total"].map(key => getChronosDataset(key, keys)),
  };
};

const syncChronosLiveState = () => {
  const panel = document.querySelector(".chronos-panel");
  if (!panel) return;
  panel.classList.toggle("is-live", chronosLiveVisible);
  panel.classList.toggle("is-preview", !chronosLiveVisible);
};

const showChronosLive = () => {
  if (chronosLiveVisible) return;
  chronosLiveVisible = true;
  syncChronosLiveState();
  renderChronosChart();
};

const renderChronosChart = () => {
  const canvas = document.getElementById("chronosChart");
  const empty = document.getElementById("chronosEmpty");
  if (!canvas) return;
  syncChronosLiveState();
  if (!chronosLiveVisible) {
    if (empty) empty.style.display = "none";
    if (chronosChart) {
      chronosChart.destroy();
      chronosChart = null;
    }
    return;
  }
  if (!window.Chart) {
    if (empty) empty.style.display = "block";
    return;
  }
  if (empty) empty.style.display = "none";
  updateChronosWidth();
  const built = buildChronosChartData();
  const maxLimit = Math.max(1, parseInt(scaffoldState.graphConfig.maxLimit, 10) || 15);
  const setInput = (id, value) => { const el = document.getElementById(id); if (el) el.value = value; };
  setInput("chronosMaxLimit", scaffoldState.graphConfig.maxLimit);
  setInput("chronosDaysToLoad", scaffoldState.graphConfig.daysToLoad);
  setInput("chronosPcView", scaffoldState.graphConfig.pcDaysView);
  setInput("chronosMobView", scaffoldState.graphConfig.mobDaysView);
  setInput("settingsChronosMaxLimit", scaffoldState.graphConfig.maxLimit);
  setInput("settingsChronosDaysToLoad", scaffoldState.graphConfig.daysToLoad);
  setInput("settingsChronosPcView", scaffoldState.graphConfig.pcDaysView);
  setInput("settingsChronosMobView", scaffoldState.graphConfig.mobDaysView);
  ["class", "total"].forEach(key => {
    document.querySelectorAll(`[data-action="chronos-toggle-dataset"][data-dataset="${key}"]`).forEach((chip) => {
      chip.classList.toggle("is-active", isChronosDatasetVisible(key));
    });
  });
  document.querySelectorAll("[data-action='chronos-apply-preset']").forEach(btn => {
    const active =
      parseInt(btn.dataset.days, 10) === parseInt(scaffoldState.graphConfig.daysToLoad, 10) &&
      parseInt(btn.dataset.pc, 10) === parseInt(scaffoldState.graphConfig.pcDaysView, 10) &&
      parseInt(btn.dataset.mob, 10) === parseInt(scaffoldState.graphConfig.mobDaysView, 10);
    btn.classList.toggle("is-active", active);
  });
  if (chronosChart) chronosChart.destroy();
  chronosChart = new Chart(canvas, {
    type: "line",
    data: { labels: built.labels, datasets: built.datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 220 },
      interaction: { mode: "nearest", intersect: false },
      scales: {
        x: {
          grid: { display: true, color: "rgba(148,163,184,.14)", drawTicks: false },
          ticks: { color: "#64748b", maxRotation: 0, autoSkip: false },
        },
        y: {
          beginAtZero: true,
          suggestedMax: maxLimit,
          max: maxLimit,
          grid: { display: true, color: "rgba(148,163,184,.18)" },
          ticks: { color: "#64748b", stepSize: Math.max(1, Math.round(maxLimit / 6)) },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => `${ctx.dataset.label}: ${formatMins(hoursToMins(ctx.parsed.y || 0))}`,
          },
        },
        dragData: {
          round: 2,
          dragX: false,
          showTooltip: true,
          magnet: {
            to: (value) => Math.min(maxLimit, minsToHours(hoursToMins(value))),
          },
          onDragStart: () => isGraphEditMode,
          onDrag: (event, datasetIndex, index, value) => {
            if (!isGraphEditMode) return false;
            const snapped = Math.min(maxLimit, minsToHours(hoursToMins(value)));
            chronosChart.data.datasets[datasetIndex].data[index] = snapped;
            return snapped;
          },
          onDragEnd: (event, datasetIndex, index, value) => {
            if (!isGraphEditMode) return;
            const datasetKey = chronosChart.data.datasets[datasetIndex].chronosKey;
            const key = built.keys[index];
            setLogMinutes(key, datasetKey, hoursToMins(value));
            renderChronosChart();
            refreshDashboardGauge();
          },
        },
      },
      onClick: (event) => {
        if (!isGraphEditMode) return;
        const points = chronosChart.getElementsAtEventForMode(event, "nearest", { intersect: true }, true);
        let point = points[0];
        if (!point) {
          const indexPoints = chronosChart.getElementsAtEventForMode(event, "index", { intersect: false }, true);
          point = indexPoints.find(p => !chronosChart.data.datasets[p.datasetIndex].hidden) || indexPoints[0];
        }
        if (!point) return;
        openChronosPointEditor(point.datasetIndex, point.index);
      },
    },
  });
  attachChronosScrollTracking();
  applyChronosScrollPosition();
  const daysLabel = document.getElementById("chronosDaysLabel");
  if (daysLabel) daysLabel.textContent = String(scaffoldState.graphConfig.daysToLoad);
};

const setChronosEditMode = (enabled) => {
  isGraphEditMode = enabled;
  const btn = document.getElementById("chronosEditBtn");
  const panel = document.querySelector(".chronos-panel");
  const hint = document.getElementById("chronosHint");
  if (btn) {
    btn.textContent = enabled ? "Stop Editing" : "Start Editing";
    btn.classList.toggle("btn-small--danger", enabled);
    btn.classList.toggle("btn-small--primary", !enabled);
  }
  panel?.classList.toggle("is-editing", enabled);
  const canvas = document.getElementById("chronosChart");
  if (canvas) canvas.style.touchAction = enabled ? "none" : "";
  if (hint) hint.textContent = enabled
    ? "Drag dots vertically to edit in 5-minute steps, or click any point/area to open detailed manual overrides."
    : "Turn editing on to drag dots in 5-minute steps, or click a dot for manual overrides.";
};

const openChronosPointEditor = (datasetIndex, index) => {
  const built = buildChronosChartData();
  const key = built.keys[index];
  const log = studyLogs[key] || {};
  chronosActiveEdit = {
    key,
    classMins: log.classMins || 0,
    totalMins: log.totalMins || 0,
  };
  document.getElementById("chronosModalTitle").textContent = "Edit Class + Total";
  document.getElementById("chronosModalSub").textContent = `${dateLabel(key)} - both series are editable`;
  updateChronosEditorValues();
  document.getElementById("chronosPointModal").hidden = false;
};

const updateChronosEditorValues = () => {
  if (!chronosActiveEdit) return;
  const writeSeries = (series, mins) => {
    const prefix = series === "class" ? "chronosClass" : "chronosTotal";
    document.getElementById(`${prefix}Hours`).textContent = String(Math.floor(mins / 60));
    document.getElementById(`${prefix}Minutes`).textContent = pad2(mins % 60);
    document.getElementById(`${prefix}Summary`).textContent = formatMins(mins);
  };
  writeSeries("class", chronosActiveEdit.classMins);
  writeSeries("total", chronosActiveEdit.totalMins);
  document.getElementById("chronosModalSub").textContent =
    `${dateLabel(chronosActiveEdit.key)} - Class ${formatMins(chronosActiveEdit.classMins)} / Total ${formatMins(chronosActiveEdit.totalMins)}`;
};

const exportChronosCsv = () => {
  const rows = [["date","onlineClassMins","totalStudyMins"]];
  chronosDates().forEach(key => {
    const log = studyLogs[key] || {};
    rows.push([key, log.classMins || 0, log.totalMins || 0]);
  });
  const csv = rows.map(row => row.join(",")).join("\n");
  const url = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8" }));
  const a = document.createElement("a");
  a.href = url;
  a.download = `chronos-study-logs-${dateKey(new Date())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
};

const saveChronosPng = () => {
  if (!chronosChart) return;
  const source = chronosChart.canvas;
  const exportCanvas = document.createElement("canvas");
  exportCanvas.width = source.width;
  exportCanvas.height = source.height;
  const ctx = exportCanvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
  ctx.drawImage(source, 0, 0);
  const a = document.createElement("a");
  a.href = exportCanvas.toDataURL("image/png", 1);
  a.download = `chronos-chart-${dateKey(new Date())}.png`;
  a.click();
};

const initChronosAnalytics = () => {
  loadChronosConfig();
  loadStudyLogs();
  renderChronosChart();
  applyChronosScrollPosition(true);
  setChronosEditMode(false);
  window.addEventListener("resize", () => {
    updateChronosWidth();
    chronosChart?.resize();

  });
};

const syncDialogBodyLock = () => {

  document.body.style.overflow = anyOpen ? "hidden" : "";
};

const openDialog = (id) => {
  const dialog = document.getElementById(id);
  if (!dialog) return;
  dialog.hidden = false;
  syncDialogBodyLock();
  const focusTarget = dialog.querySelector("input, button, select, textarea");
  setTimeout(() => focusTarget?.focus(), 40);
};

const closeDialog = (id) => {
  const dialog = document.getElementById(id);
  if (!dialog) return;
  dialog.hidden = true;
  syncDialogBodyLock();
};

const openAccountDialog = () => openDialog("accountDialog");
const closeAccountDialog = () => closeDialog("accountDialog");

const closeSettingsDialog = () => closeDialog("settingsDialog");
