const closeBackupDialog = () => closeDialog("backupDialog");

const syncBackupSettingControls = () => {
  const map = [
    ["autoBackupToggle", scaffoldState.userSettings.autoBackupEnabled],
    ["backupDialogEnabled", scaffoldState.userSettings.autoBackupEnabled],
    ["backupTimingSelect", scaffoldState.userSettings.backupTiming],
    ["backupDialogTiming", scaffoldState.userSettings.backupTiming],
    ["autoBackupAutoDownload", scaffoldState.userSettings.autoBackupAutoDownload],
    ["backupDialogAutoDownload", scaffoldState.userSettings.autoBackupAutoDownload],
    ["autoBackupNotifToggle", scaffoldState.userSettings.autoBackupNotif],
    ["backupDialogNotif", scaffoldState.userSettings.autoBackupNotif],
  ];
  map.forEach(([id, value]) => {
    const node = document.getElementById(id);
    if (!node) return;
    if (node instanceof HTMLInputElement && node.type === "checkbox") node.checked = !!value;
    else node.value = String(value);
  });
};

const updateBackupSettings = (next) => {
  scaffoldState.userSettings = { ...scaffoldState.userSettings, ...next };
  saveUserSettings();
  syncBackupSettingControls();
};

const runBackupDownload = (source = "manual") => {
  const entry = persistBackupSnapshot(source, {
    source,
    downloadJson: true,
    showBanner: false,
  });
  mountApp();
  showBackupBanner("Backup downloaded", `${backupDateLabel(entry.createdAt)} - ${entry.studyMode.toUpperCase()} mode`);
};

const maybeRunAutoBackup = () => {
  if (!scaffoldState.userSettings.autoBackupEnabled) return;
  const today = new Date().toISOString().slice(0, 10);
  const stamp = localStorage.getItem(AUTO_BACKUP_STAMP_KEY) || "";
  if (scaffoldState.userSettings.backupTiming === "daily" && stamp === today) return;
  const entry = persistBackupSnapshot("auto", {
    source: "auto",
    downloadJson: !!scaffoldState.userSettings.autoBackupAutoDownload,
    showBanner: false,
  });
  if (entry && scaffoldState.userSettings.backupTiming === "daily") {
    localStorage.setItem(AUTO_BACKUP_STAMP_KEY, today);
  }
  if (entry && scaffoldState.userSettings.backupTiming === "everyopen") {
    localStorage.setItem(AUTO_BACKUP_STAMP_KEY, today);
  }
  mountApp();
  showBackupBanner(
    scaffoldState.userSettings.autoBackupAutoDownload ? "Auto backup downloaded" : "Auto vault snapshot saved",
    `${backupDateLabel(entry.createdAt)} - ${entry.studyMode.toUpperCase()} mode`
  );
};

const restoreBackupEntry = (id) => {
  const entry = readVaultBackups().find((item) => item.id === id);
  if (!entry) return;
  applyBackupPayload(entry.payload);
  showBackupBanner("Backup restored", `${backupDateLabel(entry.createdAt)} • ${String(entry.studyMode || "hsc").toUpperCase()} mode`);
};

document.addEventListener("click", (e) => {
  const action = e.target.closest("[data-action]")?.dataset?.action;
  const target = e.target.closest("[data-action]");
  if (!action) return;
  if (action === "open-account-dialog") {
    openAccountDialog();
    return;
  }
  if (action === "close-account-dialog") {
    closeAccountDialog();
    return;
  }
  if (action === "open-settings-dialog") {
    openSettingsDialog();
    return;
  }
  if (action === "close-settings-dialog") {
    closeSettingsDialog();
    return;
  }
  if (action === "open-backup-dialog" || action === "backup-open-dialog") {
    openBackupDialog();
    return;
  }
  if (action === "close-backup-dialog") {
    closeBackupDialog();
    return;
  }
  if (action === "save-account-settings") {
    ["customName", "collegeName", "sscBatch", "sscRoll", "sscReg", "hscBatch", "hscRoll", "hscReg"].forEach((key) => {
      const input = document.getElementById(`account-${key}`);
      if (input) scaffoldState.userSettings[key] = input.value.trim();
    });
    saveUserSettings();
    syncChatUi();
    renderAccountMessageFeed();
    const name = scaffoldState.userSettings.customName || "Student";
    const dashGreet = document.querySelector(".dash-greet");
    if (dashGreet) dashGreet.textContent = `${getGreeting()}, ${name}`;
    const feedback = document.getElementById("accountFeedback");
    if (feedback) feedback.textContent = "Account saved in this browser.";
    return;
  }
  if (action === "account-login-guest") {
    completeLocalLogin({ mode: "guest", createdAt: Date.now() }, true);
    closeAccountDialog();
    closeSettingsDialog();
    return;
  }
  if (action === "account-open-login") {
    returnToLoginScreen();
    return;
  }
  if (action === "account-logout") {
    returnToLoginScreen();
    return;
  }
  if (action === "login-guest") {
    completeLocalLogin({ mode: "guest", createdAt: Date.now() }, true);
    return;
  }
  if (action === "login-google") {
    completeLocalLogin({ mode: "google", createdAt: Date.now() }, true);
    return;
  }
  if (action === "login-forgot") {
    e.preventDefault();
    showLoginFeedback("Password reset will be available after Firebase Auth setup.");
    return;
  }
  if (action === "chat-toggle-list") {
    applyChatPreference("isListVisible", !chatState.prefs.isListVisible);
    return;
  }
  if (action === "chat-toggle-settings") {
    applyChatPreference("isSettingsOpen", !chatState.prefs.isSettingsOpen);
    return;
  }
  if (action === "chat-send") {
    sendChatMessage();
    return;
  }
  if (action === "backup-download-json") {
    runBackupDownload("manual");
    return;
  }
  if (action === "backup-export-png") {
    showChronosLive();
    saveChronosPng();
    showBackupBanner("Chronos image exported", "PNG snapshot downloaded from the current graph.");
    return;
  }
  if (action === "backup-import-trigger") {
    document.getElementById(BACKUP_IMPORT_INPUT_ID)?.click();
    return;
  }
  if (action === "backup-restore-entry") {
    restoreBackupEntry(target?.dataset?.backupId || "");
    return;
  }
  if (action === "backup-download-entry") {
    const entry = readVaultBackups().find((item) => item.id === (target?.dataset?.backupId || ""));
    if (!entry) return;
    downloadJsonFile(entry.payload, "hsc-study-os-vault");
    showBackupBanner("Vault snapshot downloaded", backupDateLabel(entry.createdAt));
    return;
  }
  if (action === "backup-delete-entry") {
    const backupId = target?.dataset?.backupId || "";
    writeVaultBackups(readVaultBackups().filter((item) => item.id !== backupId));
    mountApp();
    showBackupBanner("Vault snapshot removed", "The selected local backup entry was deleted.");
    return;
  }
  if (action === "set-study-mode") {
    const nextMode = target?.dataset?.mode === "ssc" ? "ssc" : "hsc";
    if (scaffoldState.userSettings.studyMode === nextMode) return;
    scaffoldState.userSettings.studyMode = nextMode;
    saveUserSettings();
    scaffoldState.syllabus = createDefaultSyllabus(nextMode);
    scaffoldState.graphConfig = { ...defaultGraphConfig };
    restoreSavedSyllabus();
    loadChronosConfig();
    loadStudyLogs();
    mountApp();
    return;
  }
  if (action === "chronos-toggle-edit") {
    showChronosLive();
    setChronosEditMode(!isGraphEditMode);
    return;
  }
  if (action === "chronos-show-live") {
    showChronosLive();
    return;
  }
  if (action === "chronos-toggle-config") {
    const panel = document.getElementById("chronosConfigPanel");
    if (panel) panel.hidden = !panel.hidden;
    return;
  }
  if (action === "chronos-apply-config") {
    scaffoldState.graphConfig.maxLimit = Math.max(1, parseInt(document.getElementById("chronosMaxLimit").value, 10) || 15);
    scaffoldState.graphConfig.daysToLoad = Math.max(3, parseInt(document.getElementById("chronosDaysToLoad").value, 10) || 15);
    scaffoldState.graphConfig.pcDaysView = Math.max(3, parseInt(document.getElementById("chronosPcView").value, 10) || 15);
    scaffoldState.graphConfig.mobDaysView = Math.max(3, parseInt(document.getElementById("chronosMobView").value, 10) || 7);
    saveChronosConfig();
    loadStudyLogs();
    renderChronosChart();
    return;
  }
  if (action === "settings-chronos-apply-config") {
    scaffoldState.graphConfig.maxLimit = Math.max(1, parseInt(document.getElementById("settingsChronosMaxLimit").value, 10) || 15);
    scaffoldState.graphConfig.daysToLoad = Math.max(3, parseInt(document.getElementById("settingsChronosDaysToLoad").value, 10) || 15);
    scaffoldState.graphConfig.pcDaysView = Math.max(3, parseInt(document.getElementById("settingsChronosPcView").value, 10) || 15);
    scaffoldState.graphConfig.mobDaysView = Math.max(3, parseInt(document.getElementById("settingsChronosMobView").value, 10) || 7);
    saveChronosConfig();
    loadStudyLogs();
    renderChronosChart();
    return;
  }
  if (action === "chronos-apply-preset") {
    scaffoldState.graphConfig.daysToLoad = Math.max(3, parseInt(target.dataset.days, 10) || 15);
    scaffoldState.graphConfig.pcDaysView = Math.max(3, parseInt(target.dataset.pc, 10) || 15);
    scaffoldState.graphConfig.mobDaysView = Math.max(3, parseInt(target.dataset.mob, 10) || 7);
    saveChronosConfig();
    loadStudyLogs();
    renderChronosChart();
    return;
  }
  if (action === "chronos-save-png") {
    showChronosLive();
    return saveChronosPng();
  }
  if (action === "chronos-export-csv") return exportChronosCsv();
  if (action === "chronos-toggle-dataset") {
    const datasetKey = target.dataset.dataset;
    const prop = chronosVisProp(datasetKey);
    const nextVisible = !isChronosDatasetVisible(datasetKey);
    scaffoldState.graphConfig[prop] = nextVisible;
    target.classList.toggle("is-active", nextVisible);
    saveChronosConfig();
    renderChronosChart();
    return;
  }
  if (action === "chronos-close-modal") {
    document.getElementById("chronosPointModal").hidden = true;
    chronosActiveEdit = null;
    return;
  }
  if (action === "chronos-step" && chronosActiveEdit) {
    const series = target.dataset.series;
    const field = series === "total" ? "totalMins" : "classMins";
    const unit = target.dataset.unit;
    const dir = parseInt(target.dataset.dir, 10);
    const delta = unit === "hours" ? 60 : 5;
    const maxMins = (parseInt(scaffoldState.graphConfig.maxLimit, 10) || 15) * 60;
    chronosActiveEdit[field] = Math.max(0, Math.min(maxMins, chronosActiveEdit[field] + dir * delta));
    chronosActiveEdit[field] = Math.round(chronosActiveEdit[field] / 5) * 5;
    updateChronosEditorValues();
    return;
  }
  if (action === "chronos-save-point" && chronosActiveEdit) {
    setLogMinutes(chronosActiveEdit.key, "class", chronosActiveEdit.classMins);
    setLogMinutes(chronosActiveEdit.key, "total", chronosActiveEdit.totalMins);
    document.getElementById("chronosPointModal").hidden = true;
    chronosActiveEdit = null;
    renderChronosChart();
    refreshDashboardGauge();
  }

  // ── Unit 06: Pomodoro & Stopwatch actions ──────────────────────────────────
  if (action === "pomo-play")  { pomoPlay(); return; }
  if (action === "pomo-reset") { pomoReset(); return; }
  if (action === "pomo-skip")  {
    clearInterval(pomoState._timer);
    pomoState.running = false;
    const cycleOrder = ["work","break","work","break","work","break","work","long"];
    pomoSetMode(cycleOrder[(cycleOrder.indexOf(pomoState.mode) + 1) % cycleOrder.length]);
    return;
  }
  if (action === "pomo-mode") { pomoSetMode(btn.dataset.mode); return; }
  if (action === "pomo-adj")  { pomoAdj(parseInt(btn.dataset.delta, 10)); return; }
  if (action === "sw-play")   { swPlay(); return; }
  if (action === "sw-reset")  { swReset(); return; }
  if (action === "sw-lap")    { swLap(); return; }
  if (action === "sw-adj")    { swAdj(parseInt(btn.dataset.delta, 10)); return; }
  if (action === "open-track-dialog")  { openTrackDialog(); return; }
  if (action === "close-track-dialog") { closeTrackDialog(); return; }
  if (action === "track-clear") { writeTrackLog([]); openTrackDialog(); return; }
  if (action === "open-timer-dialog")  {
    const dlg = document.getElementById("timerDialog");
    if (dlg) { dlg.removeAttribute("hidden"); if (window.lucide) window.lucide.createIcons({attrs:{"stroke-width":1.8}}); }
    return;
  }
  if (action === "close-timer-dialog") {
    const dlg = document.getElementById("timerDialog");
    if (dlg) dlg.setAttribute("hidden","");
    return;
  }
});

document.addEventListener("keydown", (event) => {
  if ((event.key === "Enter" || event.key === " ") && event.target?.id === "chronosPreview") {
    event.preventDefault();
    showChronosLive();
    return;
  }
  if (event.key !== "Escape") return;
  closeSettingsDialog();
  closeAccountDialog();
  closeBackupDialog();
  closeTrackDialog();
  const td = document.getElementById("timerDialog"); if (td) td.setAttribute("hidden","");
});

// ── Unit 06: Pomodoro & Stopwatch Engine ──────────────────────────────────────
const POMO_MODES = {
  work:  { label: "Work Session", secs: 25 * 60 },
  break: { label: "Short Break",  secs:  5 * 60 },
  long:  { label: "Long Break",   secs: 15 * 60 },
};
const TRACK_KEY = "hsc-pomo-track-v1";
const readTrackLog  = () => { try { return JSON.parse(localStorage.getItem(TRACK_KEY) || "[]"); } catch { return []; } };
const writeTrackLog = (d) => { try { localStorage.setItem(TRACK_KEY, JSON.stringify(d.slice(0, 200))); } catch {} };

const pomoState = { mode:"work", totalSecs:25*60, remSecs:25*60, running:false, sessionsDone:0, _timer:null };
const swState   = { running:false, ms:0, lapMs:0, laps:[], _baseMs:0, _lapBaseMs:0, _startTime:0, _lapStart:0, _raf:null };

const padZ = (n, w=2) => String(Math.floor(n)).padStart(w, "0");
const fmtPomo = (s) => { const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60; return h>0?`${padZ(h)}:${padZ(m)}:${padZ(sec)}`:`${padZ(m)}:${padZ(sec)}`; };
const fmtSW = (ms) => { const t=Math.floor(ms/100), tenth=t%10, sec=Math.floor(t/10)%60, min=Math.floor(t/600)%60, hr=Math.floor(t/36000); return hr>0?`${padZ(hr)}:${padZ(min)}:${padZ(sec)}.${tenth}`:`${padZ(min)}:${padZ(sec)}.${tenth}`; };

const updatePomoUI = () => {
  const disp=document.getElementById("pomoDisplay"), bar=document.getElementById("pomoBar"),
        lbl=document.getElementById("pomoLabel"), btn=document.getElementById("pomoPlayBtn");
  if (!disp) return;
  disp.textContent = fmtPomo(pomoState.remSecs);
  if (bar) bar.style.width = `${Math.round((pomoState.remSecs/pomoState.totalSecs)*100)}%`;
  if (lbl) lbl.textContent = POMO_MODES[pomoState.mode].label;
  const pauseSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
  const playSVG  = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
  if (btn) btn.innerHTML = pomoState.running ? pauseSVG : playSVG;
  const el = document.getElementById("pomoSessions");
  if (el) el.innerHTML = Array.from({length:4},(_,i)=>`<div class="pomo-dot ${i<pomoState.sessionsDone?"done":i===pomoState.sessionsDone&&pomoState.running?"active":""}"></div>`).join("");
};

const pomoTick = () => {
  if (!pomoState.running) return;
  if (pomoState.remSecs > 0) { pomoState.remSecs--; updatePomoUI(); }
  else {
    clearInterval(pomoState._timer); pomoState.running = false;
    const wasWork = pomoState.mode === "work";
    if (wasWork) {
      pomoState.sessionsDone = Math.min(pomoState.sessionsDone + 1, 4);
      const log = readTrackLog();
      log.unshift({ mode:"work", dur:pomoState.totalSecs, ts:Date.now() });
      writeTrackLog(log);
    }
    const next = wasWork ? (pomoState.sessionsDone >= 4 ? "long" : "break") : "work";
    if (pomoState.sessionsDone >= 4) pomoState.sessionsDone = 0;
    pomoSetMode(next);
    try { if (Notification.permission==="granted") new Notification(wasWork?"Break time! 🎉":"Back to work! 💪",{body:POMO_MODES[next].label}); } catch(_){}
  }
};

const pomoSetMode = (mode) => {
  clearInterval(pomoState._timer); pomoState.running = false;
  pomoState.mode = mode; pomoState.totalSecs = POMO_MODES[mode].secs; pomoState.remSecs = POMO_MODES[mode].secs;
  document.querySelectorAll("[data-action='pomo-mode']").forEach(b => b.classList.toggle("is-active", b.dataset.mode === mode));
  updatePomoUI();
};

const pomoPlay = () => {
  if (pomoState.running) { clearInterval(pomoState._timer); pomoState.running = false; }
  else {
    try { if (Notification.permission==="default") Notification.requestPermission(); } catch(_){}
    pomoState.running = true;
    pomoState._timer = setInterval(pomoTick, 1000);
  }
  updatePomoUI();
};

const pomoReset = () => { clearInterval(pomoState._timer); pomoState.running=false; pomoState.remSecs=pomoState.totalSecs; updatePomoUI(); };
const pomoAdj   = (delta) => { clearInterval(pomoState._timer); pomoState.running=false; pomoState.totalSecs=Math.max(60,pomoState.totalSecs+delta); pomoState.remSecs=Math.max(60,pomoState.remSecs+delta); updatePomoUI(); };

const swPlaySVG  = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
const swPauseSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;

const swTick = () => {
  if (!swState.running) return;
  const now = performance.now();
  swState.ms    = swState._baseMs    + (now - swState._startTime);
  swState.lapMs = swState._lapBaseMs + (now - swState._lapStart);
  const el = document.getElementById("swDisplay");
  if (el) el.textContent = fmtSW(swState.ms);
  swState._raf = requestAnimationFrame(swTick);
};

const swPlay = () => {
  const btn = document.getElementById("swPlayBtn");
  if (swState.running) {
    cancelAnimationFrame(swState._raf); swState.running = false;
    swState._baseMs = swState.ms; swState._lapBaseMs = swState.lapMs;
    if (btn) btn.innerHTML = swPlaySVG;
  } else {
    swState.running = true;
    swState._startTime = performance.now();
    swState._lapStart  = performance.now();
    if (btn) btn.innerHTML = swPauseSVG;
    swState._raf = requestAnimationFrame(swTick);
  }
};

const swLap = () => {
  if (!swState.running) return;
  const lt = swState.lapMs; swState.laps.push(lt);
  swState._lapBaseMs = 0; swState._lapStart = performance.now();
  const el = document.getElementById("swLaps"); if (!el) return;
  const item = document.createElement("div"); item.className = "sw-lap-item";
  item.innerHTML = `<span>Lap ${swState.laps.length}</span><strong>${fmtSW(lt)}</strong><span>${fmtSW(swState.ms)}</span>`;
  el.prepend(item);
};

const swReset = () => {
  cancelAnimationFrame(swState._raf); swState.running=false;
  swState.ms=0; swState.lapMs=0; swState._baseMs=0; swState._lapBaseMs=0; swState.laps=[];
  const d=document.getElementById("swDisplay"); if(d) d.textContent="00:00.0";
  const l=document.getElementById("swLaps"); if(l) l.innerHTML="";
  const b=document.getElementById("swPlayBtn"); if(b) b.innerHTML=swPlaySVG;
};

const swAdj = (deltaMs) => {
  // Offset stopwatch time by deltaMs milliseconds (can be negative)
  const newMs = Math.max(0, swState.ms + deltaMs);
  const diff = newMs - swState.ms;
  swState.ms = newMs;
  swState._baseMs = Math.max(0, swState._baseMs + diff);
  // If running, the rAF loop will update display; if paused, update now
  if (!swState.running) {
    const el = document.getElementById("swDisplay");
    if (el) el.textContent = fmtSW(swState.ms);
  }
};

const openTrackDialog = () => {
  const dlg = document.getElementById("trackDialog"); if (!dlg) return;
  const log = readTrackLog();
  const works = log.filter(e=>e.mode==="work");
  const focusSec = works.reduce((a,e)=>a+e.dur,0);
  const today = works.filter(e=>new Date(e.ts).toDateString()===new Date().toDateString()).length;
  const s=document.getElementById("tStatSessions"); if(s) s.textContent=works.length;
  const f=document.getElementById("tStatFocus");    if(f) f.textContent=focusSec>=3600?`${(focusSec/3600).toFixed(1)}h`:`${Math.round(focusSec/60)}m`;
  const t=document.getElementById("tStatToday");    if(t) t.textContent=today;
  const list=document.getElementById("trackLogList");
  if (list) {
    list.innerHTML = !log.length
      ? `<div class="track-empty">No sessions yet. Complete a Pomodoro to start tracking.</div>`
      : log.slice(0,50).map(e=>{
          const d=new Date(e.ts);
          const dur=e.dur>=3600?`${Math.floor(e.dur/3600)}h ${Math.floor((e.dur%3600)/60)}m`:`${Math.floor(e.dur/60)}m`;
          const lbl=e.mode==="work"?"Work":e.mode==="break"?"Short Break":"Long Break";
          return `<div class="track-log-item"><span class="tl-label">${lbl}</span><span class="tl-dur">${dur}</span><span class="tl-time">${d.toLocaleDateString([],{month:"short",day:"numeric"})} ${d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span></div>`;
        }).join("");
  }
  dlg.removeAttribute("hidden");
  if (window.lucide) window.lucide.createIcons({attrs:{"stroke-width":1.8}});
};

const closeTrackDialog = () => { const d=document.getElementById("trackDialog"); if(d) d.setAttribute("hidden",""); };

// Show/hide timer ctrl bar based on scroll into time-tools section
const attachTimerBarVisibility = () => {
  const section = document.getElementById("time-tools");
  const bar     = document.getElementById("timerCtrlBar");
  if (!section || !bar) return;
  const obs = new IntersectionObserver(([entry]) => {
    bar.hidden = !entry.isIntersecting;
  }, { threshold: 0.05 });
  obs.observe(section);
};

document.addEventListener("change", (e) => {
  const target = e.target;
  if (!(target instanceof HTMLElement)) return;
  if (target.id === "chatSortOrder") {
    applyChatPreference("sortOrder", target.value === "asc" ? "asc" : "desc");
    setChatFeedback(`Messages sorted ${target.value === "asc" ? "oldest first" : "newest first"}.`, "success");
    return;
  }
  if (target.id === "chatDefaultVisibility") {
    const visibility = target.value === "private" ? "private" : "public";
    applyChatPreference("defaultVisibility", visibility);
    setChatFeedback(`Default post visibility set to ${visibility}.`, "success");
    return;
  }
  if (target.id === "autoBackupToggle" || target.id === "backupDialogEnabled") {
    updateBackupSettings({ autoBackupEnabled: !!target.checked });
    return;
  }
  if (target.id === "backupTimingSelect" || target.id === "backupDialogTiming") {
    updateBackupSettings({ backupTiming: target.value === "everyopen" ? "everyopen" : "daily" });
    return;
  }
  if (target.id === "autoBackupAutoDownload" || target.id === "backupDialogAutoDownload") {
    updateBackupSettings({ autoBackupAutoDownload: !!target.checked });
    return;
  }
  if (target.id === "autoBackupNotifToggle" || target.id === "backupDialogNotif") {
    updateBackupSettings({ autoBackupNotif: !!target.checked });
    return;
  }
  if (target.id === BACKUP_IMPORT_INPUT_ID) {
    const file = target.files?.[0];
    if (!file) return;
    file.text()
      .then((text) => JSON.parse(text))
      .then((payload) => {
        if (!payload?.userSettings || !payload?.modes?.hsc || !payload?.modes?.ssc) {
          throw new Error("Invalid Study OS backup structure.");
        }
        pushVaultEntry(payload, "import");
        applyBackupPayload(payload);
        showBackupBanner("Backup imported", "JSON backup loaded and restored into this browser.");
      })
      .catch(() => {
        showBackupBanner("Import failed", "The selected file is not a valid Study OS backup JSON.");
      })
      .finally(() => {
        target.value = "";
      });
    return;
  }
});



window.addEventListener("load", () => {
  if (window.lucide) {
    window.lucide.createIcons({ attrs: { "stroke-width": 1.8 } });
  }
  syncBackupSettingControls();
  maybeRunAutoBackup();
});
    </script>
