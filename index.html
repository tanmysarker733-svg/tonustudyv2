// ── Syllabus helpers ──────────────────────────────────────────────────────────
// Priority order: dl > adv > adm > frb > os
const TRACK_PRIORITY = [
  { key: 'dl',  done: 'doneDL',  total: 'totalDL'  },
  { key: 'adv', done: 'doneAdv', total: 'totalAdv' },
  { key: 'adm', done: 'doneAdm', total: 'totalAdm' },
  { key: 'frb', done: 'doneFRB', total: 'totalFRB' },
  { key: 'os',  done: 'doneOS',  total: 'totalOS'  },
];

const ensureChapterShape = (ch) => {
  ch.donePerc = ch.donePerc ?? 0;
  ch.viewStyle = ch.viewStyle || (ch.isPerc ? "perc" : "class");
  ch.tracks = { dl: true, adv: false, adm: false, frb: false, os: false, ...(ch.tracks || {}) };
  ch.doneDL = ch.doneDL ?? 0; ch.totalDL = ch.totalDL ?? 10;
  ch.doneAdv = ch.doneAdv ?? 0; ch.totalAdv = ch.totalAdv ?? ch.totalDL;
  ch.doneAdm = ch.doneAdm ?? 0; ch.totalAdm = ch.totalAdm ?? ch.totalDL;
  ch.doneFRB = ch.doneFRB ?? 0; ch.totalFRB = ch.totalFRB ?? 5;
  ch.doneOS = ch.doneOS ?? 0; ch.totalOS = ch.totalOS ?? 1;
  ch.solvedQS = ch.solvedQS ?? 0; ch.totalQS = ch.totalQS ?? 3;
  return ch;
};

const chapterPct = (ch) => {
  ch = ensureChapterShape(ch);
  if (ch.viewStyle === 'perc') return Math.round(ch.donePerc || 0);
  // Use highest-priority active track for pct
  for (const t of TRACK_PRIORITY) {
    if (!ch.tracks[t.key]) continue;
    const total = ch[t.total] || 1;
    return Math.round((ch[t.done] / total) * 100);
  }
  return 0;
};

const chapterStatus = (ch) => {
  const p = chapterPct(ch);
  return p >= 95 ? "done" : p >= 5 ? "run" : "pending";
};

// bar/dot color by threshold
const pctColor = (p) => p >= 95 ? "#10b981" : p >= 5 ? "#f59e0b" : "#ef4444";

const d = (a,si,pi,ci) => `data-action="${a}" data-si="${si}" data-pi="${pi}" data-ci="${ci}"`;
const sliderStyle = (done, total, color = "var(--subject-accent,#38bdf8)") => {
  const safeTotal = Math.max(1, Number(total) || 1);
  const pct = Math.max(0, Math.min(100, Math.round(((Number(done) || 0) / safeTotal) * 100)));
  return `style="--slider-pct:${pct}%;--slider-color:${color}"`;
};

      <button class="ch-btn ch-btn--sm cls-total-dec" title="Total -" ${d(action+'-total-dec',si,pi,ci)}>T-</button>
    </div>
  </div>
  <input class="ch-slider" type="range" min="0" max="${total}" value="${done}" ${d(action+'-slide',si,pi,ci)} ${sliderStyle(done, total)}>`;

const renderChapterBarTip = (ch, index) => {
  ch = ensureChapterShape(ch);
  const rows = [];
  if (ch.viewStyle === "perc") {
    rows.push(["Progress", `${Math.round(ch.donePerc || 0)}%`]);
  } else {
    [
      ["Detailed", "dl", "doneDL", "totalDL"],
      ["Advanced", "adv", "doneAdv", "totalAdv"],
      ["Admission", "adm", "doneAdm", "totalAdm"],
      ["FRB", "frb", "doneFRB", "totalFRB"],
      ["1-Shot", "os", "doneOS", "totalOS"],
    ].forEach(([label, key, doneKey, totalKey]) => {
      if (ch.tracks[key]) rows.push([label, `${ch[doneKey] || 0}/${ch[totalKey] || 1}`]);
    });
  }
  rows.push(["Board Solve", `${ch.solvedQS || 0}/${ch.totalQS || 1}`]);
  return `
    <span class="chapter-bar-tip" role="tooltip">
      <span class="chapter-bar-tip__title">${escapeHtml(ch.name || `Chapter ${index + 1}`)}</span>
      ${rows.map(([label, value]) => `
        <span class="chapter-bar-tip__row">
          <span>${escapeHtml(label)}</span>
          <strong>${escapeHtml(value)}</strong>
        </span>`).join("")}
    </span>`;
};

const renderChapterBars = (chapters) => `
  <div class="chapter-bars">
    ${chapters.map((ch, index) => {
      const pct = chapterPct(ch);
      const status = pct >= 95 ? "done" : pct >= 5 ? "run" : "pending";
      return `<span class="chapter-bar-container" tabindex="0" data-chapter-tip data-ci="${index}" aria-label="${escapeHtml(ch.name)} progress details">
        <span class="chapter-bar chapter-bar--${status}"></span>
        <small>${index + 1}</small>
        ${renderChapterBarTip(ch, index)}
      </span>`;
    }).join('')}
  </div>`;

const paperProgressStats = (chapters = []) => {
  const total = chapters.length;
  const done = chapters.filter(ch => chapterStatus(ch) === "done").length;
  const pct = total ? Math.round(chapters.reduce((sum, ch) => sum + chapterPct(ch), 0) / total) : 0;
  return { total, done, pct };
};

  const stats = paperProgressStats(paper.chapters);
  return `

        <strong>${stats.pct}%</strong>

};

const subjectCard = (subject, index) => {
  const papers = subject.hasPapers
    ? subject.papers
    : [{ title: "Chapters", chapters: subject.chapters }];
  const visual = subjectVisuals[index % subjectVisuals.length];
  const total = countChapters(subject);
  const allChs = papers.flatMap(p => p.chapters);
  const done = allChs.filter(c => chapterStatus(c) === "done").length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  
  return `
  <article class="subject-card interactive-card ${subject.hasPapers ? "" : "subject-card--compact"}" data-si="${index}" style="--subject-accent:${visual.accent};--subject-soft:${visual.soft};">

          <p class="subj-prog-text" id="subj-prog-${index}">${done}/${total} chapters · ${pct}%</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="subj-prog-ring">
          <svg viewBox="0 0 36 36" width="40" height="40">
            <circle cx="18" cy="18" r="15" fill="none" stroke="var(--border)" stroke-width="3"/>
            <circle cx="18" cy="18" r="15" fill="none" stroke="${visual.accent}" stroke-width="3"
              stroke-dasharray="94.2" stroke-dashoffset="${Math.round(94.2 - (pct / 100) * 94.2)}"
              stroke-linecap="round" transform="rotate(-90 18 18)" id="subj-ring-${index}"/>
          </svg>
          <span class="ring-pct" id="subj-ring-pct-${index}">${pct}%</span>
        </div>
        <button class="subj-settings-btn" data-action="subj-settings-toggle" data-si="${index}" title="Settings">
          ⚙ Settings
        </button>
      </div>
    </div>
    ${subjectSettingsPanel(subject, index)}
    <div class="paper-stack" id="papers-${index}">
      ${papers.map((paper, pi) => renderPaperSection(paper, index, pi)).join("")}
    </div>
  </article>`;
};

const colorInput = (id, value, disabled = true) =>
  `<input class="color-picker" id="${escapeHtml(id)}" type="color" value="${escapeHtml(value)}" ${disabled ? "disabled" : ""} />`;

const checkbox = (id, checked = false, disabled = true) =>
  `<input class="settings-check" id="${escapeHtml(id)}" type="checkbox" ${checked ? "checked" : ""} ${disabled ? "disabled" : ""} />`;

const selectInput = (id, options, selected, disabled = true) => `
  <select class="settings-input" id="${escapeHtml(id)}" ${disabled ? "disabled" : ""}>
    ${options.map((option) =>
      `<option value="${escapeHtml(option.value)}" ${option.value === selected ? "selected" : ""}>${escapeHtml(option.label)}</option>`
    ).join("")}
  </select>
`;

const range = (id, min, max, value) =>
  `<input class="settings-range" id="${escapeHtml(id)}" type="range" min="${min}" max="${max}" value="${value}" disabled />`;

const numberStepper = (id, min, max, value) => `
  <div class="cfg-stepper">
    <button class="cfg-arrow-btn" type="button" disabled>${icon("chevron-left", "Decrease")}</button>
    <input class="cfg-val-input" id="${escapeHtml(id)}" type="number" min="${min}" max="${max}" value="${value}" disabled />
    <button class="cfg-arrow-btn" type="button" disabled>${icon("chevron-right", "Increase")}</button>
  </div>
`;

const settingsNumberInput = (id, min, max, value) =>
  `<input class="settings-input" id="${escapeHtml(id)}" type="number" min="${min}" max="${max}" value="${escapeHtml(value)}" />`;

const row = (label, control, detail = "") => `
  <div class="settings-row">
    <span>
      <strong>${escapeHtml(label)}</strong>
      ${detail ? `<small>${escapeHtml(detail)}</small>` : ""}
    </span>
    ${control}
  </div>
`;

const group = (title, body) => `
  <div class="settings-group settings-group--stack">
    <h4>${escapeHtml(title)}</h4>
    ${body}
  </div>
`;

const previewButton = (label, sublabel = "", active = false) => `
  <button class="btn-small ${active ? "btn-small--active" : ""}" type="button" disabled>
    <span>${escapeHtml(label)}</span>
    ${sublabel ? `<small>${escapeHtml(sublabel)}</small>` : ""}
  </button>
`;

const tabButton = (id, label, iconName, active = false) => `
  <button

`;

const pane = (id, body, active = false) => `

const batchOptions = (startYear, endYear, selectedValue) => {
  const normalized = String(selectedValue || "").trim();
  const options = [`<option value="" ${normalized ? "" : "selected"}>N/A</option>`];
  for (let year = startYear; year <= endYear; year += 1) {
    const value = String(year);
    options.push(`<option value="${value}" ${normalized === value ? "selected" : ""}>${value}</option>`);
  }
  return options.join("");
};

const accountField = (id, label, value, placeholder = "") => {

`;
};

const backupDateLabel = (value) => {
  if (!value) return "Just now";
  try {
    return new Date(value).toLocaleString("en-BD", {
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit",
    });
  } catch(_) {
    return String(value);
  }
};

const safeJSONParse = (str, fallback = null) => {
  try {
    return str ? JSON.parse(str) : fallback;
  } catch (_) {
    return fallback;
  }
};

const readVaultBackups = () => {
  try {
    const raw = localStorage.getItem(BACKUP_VAULT_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch(_) {
    return [];
  }
};

const writeVaultBackups = (items) => {
  try { localStorage.setItem(BACKUP_VAULT_KEY, JSON.stringify(items.slice(0, 90))); } catch(_) {}
};

const loadModeSnapshot = (suffix = "") => {
  const modeSuffix = suffix ? `-${suffix}` : "";
  const syl = localStorage.getItem(`${SYL_KEY}${modeSuffix}`);
  const cfg = localStorage.getItem(`${CHRONOS_CFG_KEY}${modeSuffix}`);
  const logs = localStorage.getItem(`${CHRONOS_LOG_KEY}${modeSuffix}`);
  return {
    syllabus: safeJSONParse(syl),
    chronosConfig: safeJSONParse(cfg),
    studyLogs: safeJSONParse(logs),
  };
};

const createBackupPayload = (reason = "manual") => ({
  version: 1,
  exportedAt: new Date().toISOString(),
  reason,
  app: { ...APP_META },
  activeStudyMode: currentStudyMode(),
  userSettings: scaffoldState.userSettings,
  chatPrefs: chatState.prefs,
  chatProfile: chatState.profile,
  localLogin: readRenderableLoginSession(),
  pomodoroTrackLog: readTrackLog(),
  modes: {
    hsc: loadModeSnapshot(""),
    ssc: loadModeSnapshot("ssc-v1"),
  },
});

const downloadJsonFile = (payload, filenamePrefix = "study-os-backup") => {
  const text = JSON.stringify(payload, null, 2);
  const blob = new Blob([text], { type: "application/json;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${filenamePrefix}-${dateKey(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

const showBackupBanner = (title, detail = "") => {
  if (!scaffoldState.userSettings.autoBackupNotif) return;
  const node = document.getElementById("backupBanner");
  if (!node) return;
  node.hidden = false;
  node.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(detail)}</span>`;
  clearTimeout(showBackupBanner.timer);
  showBackupBanner.timer = setTimeout(() => {
    node.hidden = true;
  }, 3400);
};

const pushVaultEntry = (payload, source = "manual") => {
  const items = readVaultBackups();
  const entry = {
    id: window.crypto?.randomUUID?.() || `vault-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
    createdAt: payload.exportedAt,
    source,
    studyMode: payload.activeStudyMode,
    payload,
  };
  writeVaultBackups([entry, ...items]);
  return entry;
};

const persistBackupSnapshot = (reason = "manual", options = {}) => {
  const payload = createBackupPayload(reason);
  const entry = pushVaultEntry(payload, options.source || reason);
  if (options.downloadJson) downloadJsonFile(payload, "hsc-study-os-backup");
  if (options.showBanner !== false) {
    showBackupBanner(
      options.downloadJson ? "Backup downloaded" : "Vault snapshot saved",
      `${backupDateLabel(entry.createdAt)} • ${entry.studyMode.toUpperCase()} mode`
    );
  }
  return entry;
};

const applyBackupPayload = (payload) => {
  if (!payload || typeof payload !== "object") throw new Error("Invalid backup file.");
  if (!payload.userSettings || !payload.modes?.hsc || !payload.modes?.ssc) throw new Error("Backup structure is incomplete.");
  localStorage.setItem(USER_SETTINGS_KEY, JSON.stringify({ ...defaultUserSettings, ...payload.userSettings }));
  localStorage.setItem(CHAT_PREFS_KEY, JSON.stringify(normalizeChatPrefs(payload.chatPrefs || {})));
  localStorage.setItem(CHAT_PROFILE_KEY, JSON.stringify(payload.chatProfile?.id ? payload.chatProfile : createChatProfile()));
  if (payload.localLogin) {
    localStorage.setItem(LOCAL_LOGIN_KEY, JSON.stringify(payload.localLogin));
    sessionStorage.removeItem(LOCAL_LOGIN_KEY);
  }
  if (payload.pomodoroTrackLog) {
    writeTrackLog(payload.pomodoroTrackLog);
  }
  const writeMode = (suffix, modePayload) => {
    const modeSuffix = suffix ? `-${suffix}` : "";
    if (modePayload?.syllabus) localStorage.setItem(`${SYL_KEY}${modeSuffix}`, JSON.stringify(modePayload.syllabus));
    if (modePayload?.chronosConfig) localStorage.setItem(`${CHRONOS_CFG_KEY}${modeSuffix}`, JSON.stringify(modePayload.chronosConfig));
    if (modePayload?.studyLogs) localStorage.setItem(`${CHRONOS_LOG_KEY}${modeSuffix}`, JSON.stringify(modePayload.studyLogs));
  };
  writeMode("", payload.modes.hsc);
  writeMode("ssc-v1", payload.modes.ssc);
  scaffoldState.userSettings = loadUserSettings();
  chatState.prefs = loadChatPrefs();
  chatState.profile = loadChatProfile();
  scaffoldState.graphConfig = { ...defaultGraphConfig };
  scaffoldState.syllabus = createDefaultSyllabus(scaffoldState.userSettings.studyMode);
  restoreSavedSyllabus();
  loadChronosConfig();
  loadStudyLogs();
  mountApp();
};

function updateLocalWriteTimestamp() {
  try {
    localStorage.setItem("hsc-last-local-write-time", new Date().toISOString());
  } catch(_) {}
}

function getSyncDocId() {
  const session = readLocalLoginSession();
  if (session && session.uid) {
    return session.uid;
  }
  if (session && session.mode === "email" && session.email) {
    return `email-${session.email.toLowerCase().replace(/[^a-z0-9@.-]/g, "_")}`;
  }
  return `guest-${chatState.profile?.id || "unknown"}`;
}

const cloudSyncState = {
  status: "idle", // 'idle', 'syncing', 'success', 'error'
  lastSynced: null, // Date object
  lastError: null,
};

async function saveToCloud(silent = false) {
  if (!chatState.db) {
    if (!silent) alert("Firestore is not connected. Please check your internet connection.");
    return;
  }
  cloudSyncState.status = "syncing";
  if (!silent) renderSyncStatusUI();
  try {
    const docId = getSyncDocId();
    const payload = createBackupPayload("cloud-sync");
    await chatState.db.collection("hsc_study_data_forever").doc(docId).set({
      payload: JSON.stringify(payload),
      updatedAt: new Date().toISOString(),
      email: payload.localLogin?.email || "guest",
      profileId: chatState.profile?.id || "unknown"
    });
    cloudSyncState.status = "success";
    cloudSyncState.lastSynced = new Date();
    cloudSyncState.lastError = null;
    if (!silent) {
      showBackupBanner("Synced to Cloud", "Your progress is saved forever.");
    }
  } catch (err) {
    cloudSyncState.status = "error";
    cloudSyncState.lastError = err.message;
    console.error("Cloud save failed:", err);
    if (!silent) alert(`Cloud sync failed: ${err.message}`);
  }
  renderSyncStatusUI();
}

async function loadFromCloud(silent = false) {
  if (!chatState.db) {
    if (!silent) alert("Firestore is not connected.");
    return;
  }
  cloudSyncState.status = "syncing";
  if (!silent) renderSyncStatusUI();
  try {
    const docId = getSyncDocId();
    const doc = await chatState.db.collection("hsc_study_data_forever").doc(docId).get();
    if (!doc.exists) {
      cloudSyncState.status = "idle";
      if (!silent) alert("No study data found in the cloud for this account.");
      renderSyncStatusUI();
      return;
    }
    const data = doc.data();
    if (!data.payload) {
      throw new Error("Cloud document has invalid format.");
    }
    const payload = JSON.parse(data.payload);
    
    if (!silent) {
      const confirmRestore = confirm(`Found cloud backup from ${new Date(data.updatedAt).toLocaleString()}.\nDo you want to restore it? This will overwrite your local progress.`);
      if (!confirmRestore) {
        cloudSyncState.status = "idle";
        renderSyncStatusUI();
        return;
      }
    }
    
    applyBackupPayload(payload);
    cloudSyncState.status = "success";
    cloudSyncState.lastSynced = new Date(data.updatedAt || Date.now());
    cloudSyncState.lastError = null;
    if (!silent) {
      showBackupBanner("Cloud Restore Done", "Progress restored from cloud.");
    }
  } catch (err) {
    cloudSyncState.status = "error";
    cloudSyncState.lastError = err.message;
    console.error("Cloud restore failed:", err);
    if (!silent) alert(`Cloud restore failed: ${err.message}`);
  }
  renderSyncStatusUI();
}

let cloudSaveTimeout = null;
function triggerCloudSaveDebounced() {
  if (!chatState.db) return;
  const session = readLocalLoginSession();
  if (!session) return; // Only sync if logged in
  clearTimeout(cloudSaveTimeout);
  cloudSaveTimeout = setTimeout(() => {
    saveToCloud(true);
  }, 10000); // 10s debounce
}

async function syncChDataOnLogin() {
  if (!chatState.db) return;
  try {
    const docId = getSyncDocId();
    const doc = await chatState.db.collection("hsc_study_data_forever").doc(docId).get();
    if (doc.exists) {
      const data = doc.data();
      if (data.payload) {
        const payload = JSON.parse(data.payload);
        
        const isLocalDefault = !scaffoldState.userSettings.customName && 
                               scaffoldState.syllabus.every(s => {
                                 const papers = s.hasPapers ? s.papers : [{ chapters: s.chapters }];
                                 return papers.every(p => p.chapters.every(ch => !ch.doneDL && !ch.donePerc));
                               });
                               
        const localTime = localStorage.getItem("hsc-last-local-write-time");
        const cloudTime = data.updatedAt;
        
        if (isLocalDefault || !localTime || new Date(cloudTime) > new Date(localTime)) {
          applyBackupPayload(payload);
          cloudSyncState.lastSynced = new Date(cloudTime);
          showBackupBanner("Cloud Sync Active", "Restored your progress from cloud.");
          renderSyncStatusUI();
        }
      }
    }
  } catch (err) {
    console.error("Auto cloud load failed:", err);
  }
}

function renderSyncStatusUI() {
  const indicator = document.getElementById("cloudSyncIndicator");
  const account = document.getElementById("cloudSyncAccount");
  const time = document.getElementById("cloudSyncTime");
  const autoSpan = document.getElementById("cloudSyncAuto");
  
  if (!indicator) return;
  
  if (!chatState.db) {
    indicator.textContent = "Disconnected";
    indicator.style.background = "rgba(239, 68, 68, 0.1)";
    indicator.style.color = "#ef4444";
  } else if (cloudSyncState.status === "syncing") {
    indicator.textContent = "Syncing...";
    indicator.style.background = "rgba(245, 158, 11, 0.1)";
    indicator.style.color = "#f59e0b";
  } else if (cloudSyncState.status === "error") {
    indicator.textContent = "Error";
    indicator.style.background = "rgba(239, 68, 68, 0.1)";
    indicator.style.color = "#ef4444";
  } else {
    indicator.textContent = "Connected";
    indicator.style.background = "rgba(16, 185, 129, 0.1)";
    indicator.style.color = "#10b981";
  }
  
  const session = readLocalLoginSession();
  if (session && session.mode === "email" && session.email) {
    account.textContent = session.email;
  } else if (session && session.mode === "google") {
    account.textContent = "Google Account";
  } else {
    account.textContent = `Guest (${(chatState.profile?.id || "N/A").slice(0, 8)}...)`;
  }
  
  if (cloudSyncState.lastSynced) {
    time.textContent = cloudSyncState.lastSynced.toLocaleTimeString();
  } else {
    time.textContent = "Never";
  }
  
  if (session) {
    autoSpan.textContent = "Enabled (10s debounce)";
    autoSpan.style.color = "#10b981";
  } else {
    autoSpan.textContent = "Disabled (Log in to enable)";
    autoSpan.style.color = "#ef4444";
  }
}

const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
const prefersReducedMotion = () => window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const canUseHoverTilt = () => window.matchMedia("(hover: hover) and (pointer: fine)").matches;

const attachCardTilt = () => {
  if (prefersReducedMotion() || !canUseHoverTilt()) return;
  const cards = document.querySelectorAll(".interactive-card");
  cards.forEach((card) => {
    let frame = 0;
    card.addEventListener("pointermove", (event) => {
      if (frame) cancelAnimationFrame(frame);
      frame = requestAnimationFrame(() => {
        const rect = card.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const rotateX = clamp(((y - rect.height / 2) / rect.height) * -10, -7, 7);
        const rotateY = clamp(((x - rect.width / 2) / rect.width) * 10, -7, 7);
        const glowX = clamp((x / rect.width) * 100, 0, 100);
        const glowY = clamp((y / rect.height) * 100, 0, 100);
        card.style.setProperty("--tilt-x", `${rotateX}deg`);
        card.style.setProperty("--tilt-y", `${rotateY}deg`);
        card.style.setProperty("--glow-x", `${glowX}%`);
        card.style.setProperty("--glow-y", `${glowY}%`);
        card.classList.add("is-hovering");
      });
    });
    card.addEventListener("pointerleave", () => {
      if (frame) cancelAnimationFrame(frame);
      frame = 0;
      card.classList.remove("is-hovering");
      card.style.removeProperty("--tilt-x");
      card.style.removeProperty("--tilt-y");
      card.style.removeProperty("--glow-x");
      card.style.removeProperty("--glow-y");
    });
  });
};

const attachScrollReveal = () => {
  const revealNodes = document.querySelectorAll(
    ".hero-strip__content, .unit-section__header, .dashboard-panel, .status-strip, .plain-panel, .analytics-panel, .subject-card, .settings-group, .chat-shell, .account-card, .backup-timeline > div"
  );
  revealNodes.forEach((node, index) => {
    node.classList.add("reveal-ready");
    node.style.setProperty("--reveal-delay", `${Math.min(index * 28, 220)}ms`);
  });
  if (prefersReducedMotion()) {
    revealNodes.forEach((node) => node.classList.add("is-visible"));
    return;
  }
  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add("is-visible");
        observer.unobserve(entry.target);
      });
    },
    { rootMargin: "0px 0px -8% 0px", threshold: 0.12 }
  );
  revealNodes.forEach((node) => observer.observe(node));
};

const attachScrollNav = () => {
  const nav = document.querySelector(".top-nav");
  const navLinks = [...document.querySelectorAll("[data-nav-target]")];
  const sections = navLinks.map((link) => document.getElementById(link.dataset.navTarget)).filter(Boolean);
  if (!nav) return;
  let lastY = window.scrollY;
  let ticking = false;
  const updateNav = () => {
    const currentY = window.scrollY;
    const scrollingDown = currentY > lastY;
    const shouldHide = scrollingDown && currentY > 360 && currentY - lastY > 4;
    nav.classList.toggle("nav-scrolled", currentY > 16);
    nav.classList.toggle("nav-hidden", shouldHide);
    document.documentElement.style.setProperty("--scroll-drift", `${Math.round(currentY * -0.035)}px`);
    let activeId = sections[0]?.id;
    for (const section of sections) {
      const rect = section.getBoundingClientRect();
      if (rect.top <= 120) activeId = section.id;
    }
    navLinks.forEach((link) => {
      link.classList.toggle("is-active", link.dataset.navTarget === activeId);
    });
    lastY = currentY;
    ticking = false;
  };
  window.addEventListener("scroll", () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(updateNav);
  }, { passive: true });
  updateNav();
};

const attachSmoothAnchorOffset = () => {
  document.querySelectorAll('a[href^="#"]').forEach((link) => {
    link.addEventListener("click", (event) => {
      const id = link.getAttribute("href")?.slice(1);
      const target = id ? document.getElementById(id) : null;
      if (!target) return;
      event.preventDefault();
      target.scrollIntoView({ behavior: prefersReducedMotion() ? "auto" : "smooth", block: "start" });
      if (id === "chat") {
        setTimeout(() => {
          scrollChatToBottom("smooth");
        }, 320);
      }
    });
  });
};

const attachSettingsTabs = () => {
  const tabButtons = [...document.querySelectorAll("[data-settings-tab]")];
  const panes = [...document.querySelectorAll("[data-settings-pane]")];
  if (!tabButtons.length || !panes.length) return;
  tabButtons.forEach((button) => {
    button.addEventListener("click", () => {
      const target = button.dataset.settingsTab;
      tabButtons.forEach((item) => item.classList.toggle("settings-tab--active", item === button));
      panes.forEach((pane) => pane.classList.toggle("settings-pane--active", pane.dataset.settingsPane === target));
    });
  });
};

const attachVisualEffects = () => {
  attachScrollReveal();
  attachScrollNav();
  attachSmoothAnchorOffset();
  attachSettingsTabs();
  attachCardTilt();
};

const LOCAL_LOGIN_KEY = "hsc-local-login-session-v1";

const readLocalLoginSession = () => {
  try {
    const raw = localStorage.getItem(LOCAL_LOGIN_KEY) || sessionStorage.getItem(LOCAL_LOGIN_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(_) {
    return null;
  }
};

const writeLocalLoginSession = (session, remember = true) => {
  try {
    const payload = JSON.stringify(session);
    if (remember) {
      localStorage.setItem(LOCAL_LOGIN_KEY, payload);
      sessionStorage.removeItem(LOCAL_LOGIN_KEY);
    } else {
      sessionStorage.setItem(LOCAL_LOGIN_KEY, payload);
      localStorage.removeItem(LOCAL_LOGIN_KEY);
    }
  } catch(_) {}
};

const clearLocalLoginSession = () => {
  try {
    localStorage.removeItem(LOCAL_LOGIN_KEY);
    sessionStorage.removeItem(LOCAL_LOGIN_KEY);
  } catch(_) {}
};

const ensureFirebaseInitialized = () => {
  if (!window.firebase) {
    throw new Error("Firebase library failed to load. Check your internet connection.");
  }
  return window.firebase.apps?.length
    ? window.firebase.app()
    : window.firebase.initializeApp(CHAT_FIREBASE_CONFIG);
};

const loginWithGoogle = () => {
  try {
    const app = ensureFirebaseInitialized();
    const provider = new window.firebase.auth.GoogleAuthProvider();
    showLoginFeedback("Connecting to Google...");
    window.firebase.auth().signInWithPopup(provider)
      .then((result) => {
        const user = result.user;
        completeLocalLogin({
          mode: "google",
          email: user.email,
          uid: user.uid,
          createdAt: Date.now()
        }, true);
        showLoginFeedback("");
      })
      .catch((error) => {
        if (error.code === "auth/popup-blocked" || error.code === "auth/cancelled-popup-request") {
          showLoginFeedback("Popup blocked or failed. Redirecting to Google...");
          window.firebase.auth().signInWithRedirect(provider);
        } else {
          showLoginFeedback(`Google login failed: ${error.message}`);
        }
      });
  } catch (error) {
    showLoginFeedback(error.message);
  }
};

const loginAsGuest = (remember = true) => {
  try {
    ensureFirebaseInitialized();
    showLoginFeedback("Creating guest session...");
    window.firebase.auth().signInAnonymously()
      .then((result) => {
        completeLocalLogin({
          mode: "guest",
          uid: result.user.uid,
          createdAt: Date.now()
        }, remember);
        showLoginFeedback("");
      })
      .catch((error) => {
        showLoginFeedback(`Guest login failed: ${error.message}`);
      });

    showLoginFeedback(error.message);
  }
};

const getLoginDisplayName = (session) => {
  if (!session) return "";
  if (session.mode === "guest") return "Guest";
  if (session.mode === "google") return "Google User";
  const prefix = String(session.email || "").split("@")[0] || "Student";
  return prefix.replace(/[._-]+/g, " ").replace(/\b\w/g, (char) => char.toUpperCase());
};

const applyLocalLoginSession = (session) => {
  if (!session) return;
  const displayName = getLoginDisplayName(session);
  if (displayName && !String(scaffoldState.userSettings.customName || "").trim()) {
    scaffoldState.userSettings.customName = displayName;
    saveUserSettings();
  }
  document.body.classList.remove("login-locked");
  document.body.classList.add("login-ready");
};

const showLoginFeedback = (message) => {
  const feedback = document.getElementById("loginFeedback");
  if (feedback) feedback.textContent = message;
};

const completeLocalLogin = (session, remember = true) => {
  writeLocalLoginSession(session, remember);
  applyLocalLoginSession(session);
  mountApp();
};

const returnToLoginScreen = () => {
  clearLocalLoginSession();
  closeSettingsDialog?.();
  closeAccountDialog?.();
  closeBackupDialog?.();
  document.body.classList.add("login-locked");
  document.body.classList.remove("login-ready");
  showLoginFeedback("");
  try {
    if (window.firebase?.apps?.length) {
      window.firebase.auth().signOut().catch(() => {});
    }
  } catch (_) {}
};

let currentLoginMode = "login";

const attachLocalLogin = () => {
  // Sync Firebase Auth state dynamically
  try {
    if (window.firebase) {
      ensureFirebaseInitialized();
      window.firebase.auth().onAuthStateChanged((user) => {
        if (user) {
          const session = readLocalLoginSession();
          if (!session || session.uid !== user.uid) {
            completeLocalLogin({
              mode: user.isAnonymous ? "guest" : (user.providerData[0]?.providerId === "google.com" ? "google" : "email"),
              email: user.email,
              uid: user.uid,
              createdAt: Date.now()
            }, true);
          }
        } else {
          const session = readLocalLoginSession();
          if (session && session.mode !== "guest") {
            returnToLoginScreen();
          }
        }
      });
    }
  } catch (_) {}

  const saved = readLocalLoginSession();
  if (saved) {
    applyLocalLoginSession(saved);
    mountApp();
    return;
  }

  // Handle redirect login result if user returns from Google Sign-In redirect
  try {
    if (window.firebase) {
      ensureFirebaseInitialized();
      window.firebase.auth().getRedirectResult()
        .then((result) => {
          if (result && result.user) {
            completeLocalLogin({
              mode: "google",
              email: result.user.email,
              uid: result.user.uid,
              createdAt: Date.now()
            }, true);
          }
        })
        .catch((error) => {
          showLoginFeedback(`Google login failed: ${error.message}`);
        });
    }
  } catch (_) {}

  const toggleBtn = document.getElementById("toggleLoginMode");
  toggleBtn?.addEventListener("click", (event) => {
    event.preventDefault();
    const titleEl = document.querySelector(".login-title");
    const submitTextEl = document.querySelector(".login-submit span");
    const toggleLinkEl = document.getElementById("toggleLoginMode");
    const labelRow = document.getElementById("loginToggleRow");
    
    if (currentLoginMode === "login") {
      currentLoginMode = "register";
      if (titleEl) titleEl.textContent = "Create Account";
      if (submitTextEl) submitTextEl.textContent = "Sign Up with Email";
      if (labelRow) {
        labelRow.childNodes[0].textContent = "Already have an account? ";
      }
      if (toggleLinkEl) toggleLinkEl.textContent = "Log in";
    } else {
      currentLoginMode = "login";
      if (titleEl) titleEl.textContent = "Welcome back";
      if (submitTextEl) submitTextEl.textContent = "Login with email";
      if (labelRow) {
        labelRow.childNodes[0].textContent = "Don't have an account? ";
      }
      if (toggleLinkEl) toggleLinkEl.textContent = "Create one";
    }
    showLoginFeedback("");
  });

  const form = document.getElementById("localLoginForm");
  form?.addEventListener("submit", (event) => {
    event.preventDefault();
    const email = document.getElementById("loginEmail")?.value.trim();
    const password = document.getElementById("loginPassword")?.value || "";
    const remember = document.getElementById("loginRemember")?.checked !== false;
    
    if (!email || !email.includes("@")) {
      showLoginFeedback("Enter a valid email to continue.");
      return;
    }
    if (password.length < 6) {
      showLoginFeedback("Password must be at least 6 characters.");
      return;
    }

    try {
      const app = ensureFirebaseInitialized();
      showLoginFeedback(currentLoginMode === "login" ? "Logging in..." : "Creating account...");
      
      if (currentLoginMode === "login") {
        window.firebase.auth().signInWithEmailAndPassword(email, password)
          .then((result) => {
            const user = result.user;
            completeLocalLogin({
              mode: "email",
              email: user.email,
              uid: user.uid,
              createdAt: Date.now()
            }, remember);
            showLoginFeedback("");
          })
          .catch((error) => {
            showLoginFeedback(error.message);
          });
      } else {
        window.firebase.auth().createUserWithEmailAndPassword(email, password)
          .then((result) => {
            const user = result.user;
            completeLocalLogin({
              mode: "email",
              email: user.email,
              uid: user.uid,
              createdAt: Date.now()
            }, remember);
            showLoginFeedback("");
          })
          .catch((error) => {
            showLoginFeedback(error.message);
          });
      }
    } catch (error) {
      showLoginFeedback(error.message);
    }
  });
};

const requireTripleWarning = (btn, baseLabel, dangerLabel = "Delete") => {
  const step = Math.min(3, parseInt(btn.dataset.confirmStep || "0", 10) + 1);
  if (step < 3) {
    btn.dataset.confirmStep = String(step);
    btn.textContent = `Warning ${step}/3: ${dangerLabel}?`;
    btn.style.background = "rgba(239,68,68,.24)";
    clearTimeout(btn._warnTimer);
    btn._warnTimer = setTimeout(() => {
      btn.dataset.confirmStep = "0";
      btn.textContent = baseLabel;
      btn.style.background = "";
    }, 3000);
    return false;
  }
  btn.dataset.confirmStep = "0";
  btn.textContent = baseLabel;
  btn.style.background = "";
  return true;
};

  const pctEl = row.querySelector(".ch-pct");

  const plate = document.getElementById(`ch-${si}-${pi}-${ci}-plate`);
